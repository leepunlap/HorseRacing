<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HorseLab</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/static/vendor/apexcharts.min.js"></script>
<script src="/static/vendor/socket.io.min.js"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --border: #2a3140;
    --text: #d8e0ee;
    --muted: #8290a8;
    --accent: #5ec0ff;
    --good: #4dd17a;
    --warn: #f0c247;
    --bad: #f06262;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
               font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  /* Header is a flat single row, 48px tall, with the tab strip stretching
     vertically so each tab's underline sits flush with the header's bottom
     border. --header-h is the value sticky table headers offset against. */
  :root { --header-h: 48px; }
  header { padding: 0 20px; border-bottom: 1px solid var(--border);
           display: flex; align-items: stretch; gap: 8px;
           background: var(--panel); min-height: var(--header-h);
           position: sticky; top: 0; z-index: 100; }
  header > * { align-self: center; }     /* default: vertical-center everything */
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.2px;
              white-space: nowrap; }
  header .spacer { flex: 1; }
  header .status { font-family: var(--mono); color: var(--muted); font-size: 12px;
                   white-space: nowrap; }
  header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
                       background: var(--muted); margin-right: 6px; vertical-align: middle; }
  header .status.ok .dot { background: var(--good); }
  header .status.warn .dot { background: var(--warn); }
  header .status.bad .dot { background: var(--bad); }
  /* Tabs: stretch full header height so the bottom border sits at the header
     edge. No overflow-x / overflow-y so no scrollbars ever appear here; if
     a viewport is too narrow the buttons just shrink their padding (they're
     content-sized via flex defaults). With only 7 tabs this is plenty. */
  header nav { display: flex; gap: 0; align-self: stretch; margin-left: 8px; }
  header nav button { background: transparent; color: var(--muted); border: 0;
                      border-bottom: 2px solid transparent; border-radius: 0;
                      padding: 0 14px; cursor: pointer; font: inherit; font-size: 13px;
                      white-space: nowrap;
                      display: inline-flex; align-items: center; }
  header nav button:hover { color: var(--text); }
  header nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  main { padding: 20px; margin: 0; max-width: none; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
           padding: 16px; margin-bottom: 16px; }
  .panel h2 { margin: 0 0 12px 0; font-size: 14px; font-weight: 600;
              color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .row > .panel { flex: 1; min-width: 280px; }
  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 6px 16px; align-items: baseline; }
  .kv dt { color: var(--muted); font-size: 12px; }
  .kv dd { margin: 0; font-family: var(--mono); font-size: 13px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table th, table td { padding: 8px 10px; text-align: left;
                       border-bottom: 1px solid var(--border);
                       /* subtle vertical column separator */
                       border-right: 1px solid rgba(42,49,64,0.5); }
  table th:last-child, table td:last-child { border-right: 0; }
  table th { color: var(--muted); font-weight: 500; font-size: 12px;
             text-transform: uppercase; letter-spacing: 0.3px;
             background: rgba(94,192,255,0.05);
             border-bottom: 2px solid var(--border);
             /* offset below the sticky header so they stack instead of overlap */
             position: sticky; top: var(--header-h); z-index: 1; }
  /* Numeric cells: monospaced + right-aligned + slight tint so they pop visually
     against the text columns next to them. */
  table th.num, table td.num { font-family: var(--mono); text-align: right;
                               background: rgba(255,255,255,0.012); }
  /* Numeric headers — keep tint above the body cells */
  table th.num { background: rgba(94,192,255,0.07); }
  /* Zebra striping for body rows (even/odd) — easier scanning across wide tables */
  table tbody tr:nth-child(even) td { background: rgba(255,255,255,0.018); }
  table tbody tr:nth-child(even) td.num { background: rgba(255,255,255,0.030); }
  /* Hover wins over zebra */
  table tbody tr:hover td { background: rgba(94,192,255,0.07); }
  table tbody tr:hover td.num { background: rgba(94,192,255,0.09); }
  /* Row-state classes (winner/placed in race viewer) override zebra too */
  .race-block table tr.winner td { background: rgba(77,209,122,0.10) !important; }
  .race-block table tr.placed td { background: rgba(94,192,255,0.06) !important; }
  button.btn { background: var(--accent); color: #061a2a; border: 0; border-radius: 4px;
               padding: 6px 12px; cursor: pointer; font: inherit; font-size: 13px;
               font-weight: 500; }
  button.btn:hover { filter: brightness(1.1); }
  button.btn.ghost { background: transparent; color: var(--accent);
                     border: 1px solid var(--accent); }
  button.btn.danger { background: var(--bad); color: #200; }
  button.btn:disabled { opacity: 0.5; cursor: not-allowed; }
  input, select, textarea { background: var(--bg); color: var(--text);
                            border: 1px solid var(--border); border-radius: 4px;
                            padding: 6px 8px; font: inherit; font-size: 13px; }
  input[type=date] { font-family: var(--mono); }
  /* Login: full-viewport flex centre with a card containing the form. */
  .login-wrap { min-height: 100vh; display: flex; align-items: center;
                justify-content: center; padding: 20px; }
  .login-card { background: var(--panel); border: 1px solid var(--border);
                border-radius: 8px; padding: 28px 26px; width: 100%; max-width: 380px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
  .login-card .login-hdr { display: flex; align-items: baseline;
                            justify-content: space-between; margin-bottom: 6px; }
  .login-card .login-hdr h1 { margin: 0; font-size: 22px; font-weight: 600;
                               letter-spacing: -0.3px; }
  .login-card .subtitle { color: var(--muted); font-size: 13px; margin: 0 0 22px 0; }
  .login-card label.fld { display: block; font-size: 11px; color: var(--muted);
                           text-transform: uppercase; letter-spacing: 0.5px;
                           margin: 0 0 6px 0; }
  .login-card input[type=password] { width: 100%; padding: 10px 12px; font-size: 14px;
                                      box-sizing: border-box; }
  .login-card input[type=password]:focus { outline: none; border-color: var(--accent); }
  .login-card .remember { display: flex; align-items: center; gap: 8px;
                           margin: 14px 0 0 0; font-size: 12.5px; color: var(--muted);
                           cursor: pointer; user-select: none; }
  .login-card .remember input { accent-color: var(--accent); cursor: pointer; }
  .login-card .login-submit { width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
                               margin-top: 18px; }
  .login-card .err { color: var(--bad); font-size: 12px; margin-top: 10px; min-height: 14px;
                      text-align: center; }
  .login-card .footer { color: var(--muted); font-size: 11px; text-align: center;
                         margin-top: 22px; padding-top: 14px;
                         border-top: 1px solid var(--border); font-family: var(--mono); }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px;
          font-family: var(--mono); }
  .pill.good { background: rgba(77,209,122,0.15); color: var(--good); }
  .pill.bad  { background: rgba(240,98,98,0.15);  color: var(--bad); }
  .pill.warn { background: rgba(240,194,71,0.15); color: var(--warn); }
  .pill.muted { background: rgba(130,144,168,0.15); color: var(--muted); }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
  pre.json { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
             padding: 10px; font-size: 12px; max-height: 320px; overflow: auto;
             font-family: var(--mono); white-space: pre-wrap; }
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar label { font-size: 12px; color: var(--muted); }
  .log { font-family: var(--mono); font-size: 12px; max-height: 200px; overflow: auto;
         background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
         padding: 8px; }
  .log .ts { color: var(--muted); margin-right: 6px; }

  /* Features tab */
  .lang-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 4px;
                 overflow: hidden; }
  .lang-toggle button { background: transparent; color: var(--muted); border: 0;
                        padding: 4px 12px; cursor: pointer; font: inherit; font-size: 12px; }
  .lang-toggle button.active { background: var(--accent); color: #061a2a; }
  .feature-search { flex: 1; max-width: 400px; }

  /* One tab per category — wraps to a second row if too many for one line */
  .cat-tabs { display: flex; flex-wrap: wrap; gap: 4px 0;
              padding-bottom: 4px; margin-bottom: 16px;
              border-bottom: 1px solid var(--border); }
  .cat-tab { background: transparent; color: var(--muted); border: 0;
             border-bottom: 2px solid transparent; padding: 8px 12px; cursor: pointer;
             font: inherit; font-size: 12px; white-space: nowrap;
             display: inline-flex; align-items: baseline; gap: 6px;
             border-radius: 0; }
  .cat-tab:hover { color: var(--text); }
  .cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .cat-tab.dim { opacity: 0.35; }
  .cat-tab .cat-num { font-family: var(--mono); color: var(--muted); font-size: 11px; }
  .cat-tab .cat-count { font-family: var(--mono); font-size: 10px; color: var(--muted);
                        background: rgba(255,255,255,0.04); padding: 1px 6px;
                        border-radius: 8px; }
  .cat-tab.active .cat-count { background: rgba(94,192,255,0.15); color: var(--accent); }
  .cat-grid-hdr { margin: 16px 0 8px 0; font-size: 13px; font-weight: 600;
                  color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .cat-grid-hdr .cat-count { font-family: var(--mono); font-size: 11px;
                             background: rgba(94,192,255,0.10); color: var(--accent);
                             padding: 1px 6px; border-radius: 8px; margin-left: 6px; }

  /* Card grid: auto-fill columns, min 320px, fill the width */
  .feature-grid { display: grid; gap: 12px;
                  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
  .feature-card { background: var(--bg); border: 1px solid var(--border);
                  border-radius: 6px; padding: 12px 14px;
                  display: flex; flex-direction: column; gap: 8px; }
  .feature-card .fc-head { display: flex; align-items: baseline; gap: 8px;
                            flex-wrap: wrap; }
  .feature-card .fc-head .fid { font-family: var(--mono); color: var(--muted);
                                 font-size: 11px; padding: 2px 6px;
                                 background: rgba(255,255,255,0.04); border-radius: 4px;
                                 flex-shrink: 0; }
  .feature-card .fc-head .name { font-weight: 500; flex: 1 1 auto; min-width: 0;
                                 white-space: normal; word-break: break-word; }
  /* Importance bar + score on their own line (never squeezes the name) */
  .feature-card .fc-imp { display: flex; align-items: center; gap: 8px; }
  .feature-card .fc-imp-label { font-size: 10px; color: var(--muted); flex: 0 0 auto;
                                text-transform: uppercase; letter-spacing: .04em; }
  .feature-card .fc-imp .imp-bar { flex: 1 1 auto; min-width: 60px; max-width: none;
                                   height: 6px; background: rgba(255,255,255,0.07);
                                   border-radius: 4px; overflow: hidden; }
  .feature-card .fc-imp .imp-bar > i { display: block; height: 100%; background: var(--good); }
  .feature-card .fc-imp .imp-gain { font-family: var(--mono); font-size: 11.5px; color: var(--text);
                                    min-width: 48px; text-align: right; flex: 0 0 auto; }
  /* Credit pill now lives on the title line, right next to the name */
  .feature-card .fc-head .src { font-family: var(--mono); font-size: 11px;
                                 background: rgba(94,192,255,0.10); color: var(--accent);
                                 padding: 1px 6px; border-radius: 8px;
                                 flex-shrink: 0; }
  .feature-card .fc-head .pill { flex-shrink: 0; }
  /* Collapse/expand chevron in upper right */
  .feature-card .fc-toggle { background: transparent; color: var(--muted);
                              border: 0; cursor: pointer; padding: 0 4px;
                              font-size: 14px; line-height: 1;
                              flex-shrink: 0; }
  .feature-card .fc-toggle:hover { color: var(--accent); }
  /* Hide notes + source links by default; reveal when card is .open */
  .feature-card .fc-notes,
  .feature-card .fc-sources { display: none; }
  .feature-card.open .fc-notes { display: block; }
  .feature-card.open .fc-sources { display: flex; }
  .feature-card .fc-desc { color: var(--text); font-size: 12.5px; line-height: 1.5; }
  .feature-card .fc-notes { color: var(--muted); white-space: pre-wrap;
                            background: rgba(255,255,255,0.02);
                            border-left: 2px solid var(--border);
                            padding: 8px 10px; margin: 0;
                            font-size: 11.5px; line-height: 1.55; }
  .feature-card .fc-sources { display: flex; gap: 4px; flex-wrap: wrap; margin-top: auto;
                              padding-top: 6px; border-top: 1px dashed var(--border); }
  .feature-card .fc-sources a { font-family: var(--mono); font-size: 10.5px;
                                 background: rgba(94,192,255,0.08); color: var(--accent);
                                 padding: 2px 7px; border-radius: 6px;
                                 text-decoration: none; }
  .feature-card .fc-sources a:hover { background: var(--accent); color: #061a2a; }
  .biblio-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .biblio-row .bid { font-family: var(--mono); color: var(--accent);
                     background: rgba(94,192,255,0.10); padding: 2px 8px;
                     border-radius: 8px; font-size: 12px; }
  .biblio-row .author { font-weight: 500; margin-left: 8px; }
  .biblio-row .year { color: var(--muted); font-family: var(--mono); margin-left: 4px; }
  .biblio-row .title { font-style: italic; color: var(--muted); margin-top: 4px; }
  .biblio-row a { font-size: 11px; word-break: break-all; }

  /* Race viewer */
  /* Horizontal cascade: three "label : chips wrapping" rows stacked
     vertically. Lives inside .races-toolbar so it shares the panel's top
     row with the page title and 策略 selector. */
  .date-cascade-h { display: flex; flex-direction: column; gap: 4px;
                    flex: 1 1 320px; min-width: 0; }
  .cascade-row { display: flex; align-items: baseline; gap: 8px; }
  .cascade-label { font-size: 11px; color: var(--muted);
                   text-transform: uppercase; letter-spacing: 0.5px;
                   min-width: 48px; text-align: right; flex: 0 0 48px; }
  /* In-row separator + secondary label (e.g. 月 inline after the year
     chips when the two collapse onto a single row). */
  .cascade-sublabel { font-size: 11px; color: var(--muted);
                      text-transform: uppercase; letter-spacing: 0.5px;
                      padding-left: 6px; margin-left: 4px;
                      border-left: 1px solid var(--border); }
  .cascade-chips { display: flex; flex-wrap: wrap; gap: 4px;
                   align-items: center; flex: 1 1 auto; min-width: 0; }
  .cascade-chips .date-chip { padding: 3px 8px; font-size: 11px; line-height: 1.2;
                              white-space: nowrap;
                              display: inline-flex; align-items: center; }
  /* Toolbar that contains 賽事 title, 策略 selector, and the cascade rows
     side-by-side on the same horizontal strip. */
  .races-toolbar { display: flex; gap: 12px; align-items: flex-start;
                   margin-bottom: 8px; flex-wrap: wrap; }
  .races-toolbar-strat { display: flex; align-items: center; gap: 6px; }
  .date-picker { display: flex; flex-wrap: wrap; gap: 4px; max-height: 120px;
                 overflow-y: auto; padding: 6px; border: 1px solid var(--border);
                 border-radius: 4px; background: var(--bg); margin-bottom: 12px; }
  .date-chip {
    font-family: var(--mono); font-size: 11px; padding: 3px 8px;
    background: rgba(94,192,255,0.08); color: var(--accent);
    border: 1px solid transparent; border-radius: 4px; cursor: pointer;
    white-space: nowrap;
  }
  .date-chip:hover { border-color: var(--accent); }
  .date-chip.active { background: var(--accent); color: #061a2a; }
  .date-chip.has-pred { background: rgba(77,209,122,0.08); color: var(--good); }
  .date-chip.has-pred.active { background: var(--good); color: #021a09; }
  /* Compact races-panel — drop padding + margins so the page header
     takes <80px instead of ~160px. */
  .races-panel { padding: 8px 12px; margin-bottom: 10px; }
  .races-panel .toolbar { margin-bottom: 4px; }
  /* Cap the chip row's visible height so a 30+ day list doesn't blow up
     the panel. Overflowed chips become scrollable within the row. */
  .races-panel .cascade-chips { max-height: 56px; overflow-y: auto; }
  .race-block { border: 1px solid var(--border); border-radius: 6px;
                margin-bottom: 16px; }
  .race-block .race-hdr {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    background: rgba(94,192,255,0.04);
  }
  .race-block .race-num { font-weight: 600; }
  .race-block .race-hdr .meta { color: var(--muted); font-size: 12px; }
  .race-block .race-body { padding: 0 8px; }
  .race-block table { font-size: 12px; }
  .race-block table td.bet { color: var(--good); font-weight: 600; }
  .race-block table tr.winner td { background: rgba(77,209,122,0.06); }
  .race-block table tr.placed td { background: rgba(94,192,255,0.04); }
  .race-block table td.h-name { max-width: 200px; overflow: hidden;
                                white-space: nowrap; text-overflow: ellipsis; }
  /* Assessment column: prose, allow wrapping (constrained width) */
  .race-block table td.assessment { max-width: 380px; white-space: normal;
                                    line-height: 1.4; color: var(--muted); font-size: 11.5px; }
  /* Compact race table: 2-line stacked cells. The primary value is the
     `<div>` directly inside the <td>; the secondary value sits inside
     `.sub` and renders at a smaller, muted size below it. Lets a single
     cell carry "main / detail" (e.g. odds / market p, jockey / trainer,
     time / lbw, model p / edge) and brings the column count down from
     17 → 9 without losing data. */
  .race-block table.compact td { padding: 4px 6px; line-height: 1.25;
                                 vertical-align: top; }
  .race-block table.compact td .sub { font-size: 10.5px; color: var(--muted);
                                      margin-top: 1px; }
  .race-block table.compact td .sub.pnl-win { color: var(--good); font-weight: 600; }
  .race-block table.compact td .sub.pnl-lose { color: var(--bad); font-weight: 600; }
  .race-block table.compact td.h-name { max-width: 180px; }
  .race-block table.compact td.assessment { max-width: 320px; }
  .race-block table.compact td.assessment .bet-mark { color: var(--good);
                                                       font-weight: 700;
                                                       font-size: 11px;
                                                       margin-bottom: 2px; }
  .race-block table.compact td.assessment .drivers { color: var(--muted);
                                                      line-height: 1.35; }
  .race-block table td.pnl-win { color: var(--good); font-weight: 600; }
  .race-block table td.pnl-lose { color: var(--bad); }
  /* Inline pnl colour for stacked rows inside a single TD (本日下注 4-row
     cell): the TD itself can't be win/lose because some rows are bet
     wins, others bet losses, others non-bet em-dashes. Colour the inner
     <b> element directly. */
  .race-block table td b.pnl-win  { color: var(--good); font-weight: 700; }
  .race-block table td b.pnl-lose { color: var(--bad);  font-weight: 700; }
  /* Predicted-rank cell tints: green when the actual winner was the model's
     top pick; lighter blue when the winner was in the model's top-3. */
  .race-block table td.pred-hit  { background: rgba(77,209,122,0.30) !important;
                                    color: var(--good); font-weight: 700; }
  .race-block table td.pred-near { background: rgba(94,192,255,0.20) !important;
                                    color: var(--accent); font-weight: 600; }
  .race-block .dividends { padding: 8px 16px; border-top: 1px solid var(--border);
                           font-family: var(--mono); font-size: 11px;
                           color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .race-block .dividends b { color: var(--text); font-weight: 500; }

  /* Loading state: dim the race blocks + bets summary while a new fetch
     is in flight so the user sees their selection acknowledged immediately
     instead of staring at stale data. */
  .races-loading-wrap { position: relative; }
  .races-loading-wrap.is-loading > * {
    opacity: 0.35;
    pointer-events: none;
    filter: grayscale(0.4) blur(0.5px);
    transition: opacity 0.15s ease, filter 0.15s ease;
  }
  .races-loading-wrap.is-loading::after {
    content: '';
    position: absolute;
    top: 96px; left: 50%;
    margin-left: -22px;
    width: 44px; height: 44px;
    border: 4px solid var(--border);
    border-top-color: var(--accent, #5ec0ff);
    border-radius: 50%;
    animation: rpSpin 0.9s linear infinite;
    z-index: 2;
  }
  .races-loading-wrap.is-loading::before {
    content: attr(data-loading-text);
    position: absolute;
    top: 152px; left: 0; right: 0;
    text-align: center;
    color: var(--accent, #5ec0ff);
    font-size: 13px; letter-spacing: 0.5px;
    z-index: 2;
    text-transform: uppercase;
  }
  @keyframes rpSpin { to { transform: rotate(360deg); } }

  /* Strategy dashboard cards */
  .stat-card { background: var(--panel); border: 1px solid var(--border);
               border-radius: 4px; padding: 12px 16px; flex: 1; min-width: 140px; }
  .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase;
                      letter-spacing: 0.5px; }
  .stat-card .value { font-family: var(--mono); font-size: 20px; font-weight: 600;
                      margin-top: 4px; }
  .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stat-card.good .value { color: var(--good); }
  .stat-card.bad .value { color: var(--bad); }

<body>

<div id="root"></div>

<script>
'use strict';

// ─── Token storage ──────────────────────────────────────────────────────────
const TOKEN_KEY = 'horselab_token';
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }

// ─── UI state persistence ───────────────────────────────────────────────────
// Single JSON blob keyed under `horselab_ui` carries every piece of
// session-survivable UI state (current tab, language, search box, expanded
// rows…). Pages call `saveUi({key: value})` to patch fields; `loadUi()` reads.
// Designed to grow: add a new field, save it on change, restore it in boot().
const UI_KEY = 'horselab_ui';

function loadUi() {
  try {
    const raw = localStorage.getItem(UI_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveUi(patch) {
  const cur = loadUi();
  const next = { ...cur, ...patch };
  try { localStorage.setItem(UI_KEY, JSON.stringify(next)); } catch (e) {}
}

// One-time migration: an older build stored `feat_lang` as its own key.
// Fold it into the unified blob the first time we see it.
(function migrateLegacyUi() {
  const ui = loadUi();
  const legacy = localStorage.getItem('feat_lang');
  if (legacy && !ui.lang) {
    saveUi({ lang: legacy });
    localStorage.removeItem('feat_lang');
  }
})();

// ─── Fetch helpers ──────────────────────────────────────────────────────────
// In-flight auto-login promise — coalesces concurrent 401s so we only log in
// once even if a tab's loaders all 401 in parallel after a server restart.
let _reloginInflight = null;

async function ensureLoggedIn() {
  if (getToken()) return true;
  const pw = loadUi().rememberedPw;
  if (!pw) return false;
  if (!_reloginInflight) {
    _reloginInflight = (async () => {
      try {
        await login(pw);
        pushLog(`[auth] ${t('自動重新登入', 'auto re-login')}`);
        connectWs();
        return true;
      } catch (e) {
        // Wrong password (or other login failure) — wipe the stored creds so
        // we don't keep looping; the user will see the login form next render.
        saveUi({ rememberedPw: null });
        return false;
      } finally {
        // Clear AFTER returning so concurrent waiters see the same outcome.
        setTimeout(() => { _reloginInflight = null; }, 0);
      }
    })();
  }
  return _reloginInflight;
}

async function api(path, opts = {}, _retried = false) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const r = await fetch(path, { ...opts, headers });
  if (r.status === 401) {
    setToken(null);
    // Auto-retry once with remembered creds; fall back to login view if it fails.
    if (!_retried && await ensureLoggedIn()) {
      return api(path, opts, true);
    }
    render();  // re-renders into loginView() since getToken() is now null
    throw new Error('unauthenticated');
  }
  const ct = r.headers.get('content-type') || '';
  const body = ct.includes('json') ? await r.json() : await r.text();
  if (!r.ok) throw new Error(typeof body === 'string' ? body : (body.detail || `HTTP ${r.status}`));
  return body;
}

// ─── State ──────────────────────────────────────────────────────────────────
// `state` is the in-memory mirror. Fields marked PERSIST are re-hydrated from
// the UI blob at boot and re-saved whenever they change.
const _ui = loadUi();
const state = {
  tab: _ui.tab || 'dashboard',         // PERSIST
  health: null,
  liveStatus: null,
  schemaInfo: null,
  strategies: [],
  scrapers: {},
  schedules: [],
  checkpoints: {},
  selectedStrategy: null,
  strategyHealth: null,
  strategyAudit: null,
  // Bet-strategy selection — shared by Strategy + Races pages so the two
  // selectors mirror each other. The list reloads whenever the current
  // model changes via loadStrategyDetail / loadRaces.
  betStrategies: [],
  betStrategy: _ui.betStrategy || _ui.dashBetStrategy || _ui.raceBetStrategy || null,  // PERSIST
  auditFrom: _ui.auditFrom || '2026-01-01',  // PERSIST
  auditTo: _ui.auditTo || '2026-05-24',      // PERSIST
  logs: [],
  ws: null,
  killSwitch: null,
  liveMode: null,
  features: null,
  bibliography: null,
  lang: _ui.lang || 'zh',      // PERSIST
  featSearch: _ui.featSearch || '',    // PERSIST
  featOpen: new Set(_ui.featOpen || []),     // PERSIST — expanded H-ids
  catCollapsed: new Set(_ui.catCollapsed || []),  // PERSIST — collapsed category ids
  featTab: _ui.featTab || 'catalog',   // PERSIST — 'catalog' | 'bibliography' | 'importance'
  featCat: _ui.featCat || null,        // PERSIST — active category id (1-15) for catalog view
  featStrategy: _ui.featStrategy || null,  // PERSIST — strategy id for the importance view
  featureCards: null,                  // /api/strategies/{id}/feature_cards payload
  // Race viewer (cascading: year → month → race day)
  raceYear: _ui.raceYear || null,      // PERSIST — "2026"
  raceMonth: _ui.raceMonth || null,    // PERSIST — "05"
  raceDate: _ui.raceDate || null,      // PERSIST — "2026-05-24"
  raceStrategy: _ui.raceStrategy || null,  // PERSIST — strategy_id filter for Races tab
  raceDates: null,                     // list of {date, races, results, predicted_races}
  raceData: null,                      // current date's race cards
  raceNews: null,                      // /api/race_news — AI preview overlay
  // Strategy dashboard
  dashStrategy: _ui.dashStrategy || null,  // PERSIST — selected strategy id
  dashData: null,                      // dashboard payload
  // Live status model (processes + tasks). Seeded by GET /api/status, then
  // kept current by folding 'status' socket.io events. Times are in server
  // epoch seconds; `skew` aligns them to the browser clock for live ticking.
  st: { procs: {}, tasks: {}, skew: 0, wsUp: false, errors: [] },
  stTick: null,                        // setInterval handle for ticking timers
  coverage: [],                        // /api/scrapers/coverage — desc + counts + date range
  upcoming: null,                      // /api/upcoming — next-meeting pipeline readiness
};

function pushLog(msg) {
  const ts = new Date().toTimeString().slice(0, 8);
  state.logs.unshift({ ts, msg });
  state.logs = state.logs.slice(0, 100);
  const log = document.getElementById('progressLog');
  if (log) renderLog(log);
}

// i18n: tiny inline helper. `t('中文', 'English')` picks the active language.
// Used everywhere a user-facing string needs translation; technical labels
// (cron, JSON, etc.) stay in English.
function t(zh, en) { return state.lang === 'zh' ? zh : en; }

// ─── Socket.IO progress stream (backed by Redis; see utils/emit.py) ──────────
// One Socket.IO connection replaces the old raw /ws/progress WebSocket. The
// server emits a single 'progress' event; we route on the payload's `type`
// exactly as before. Out-of-process jobs (cron scripts) publish the same
// payloads via Redis, so they land here too. socket.io handles reconnect, so
// the old manual 5s retry loop is gone.
function handleProgress(m) {
  if (m.type === 'scraper_log') pushLog(m.text || JSON.stringify(m));
  else if (m.type === 'lifecycle') pushLog(`[lifecycle] ${m.phase} pid=${m.pid || ''}`);
  else if (m.type === 'race_settled') {
    pushLog(`[race_settled] ${m.date} ${m.course} R${m.race_no}`);
    // If the user is on the 賽事 page viewing the just-settled date, reload so
    // the row flips from "未派彩" to 命中/失敗 + pnl. Skip otherwise so we
    // don't fight other tabs.
    if (state.tab === 'races' && state.raceDate === m.date) {
      loadRaces().catch(() => {});
    }
  }
}

function connectWs() {
  const token = getToken();
  if (!token) return;
  if (state.ws) { try { state.ws.disconnect(); } catch (e) {} }
  // Same-origin; socket.io defaults to path /socket.io. Token is validated in
  // the server's connect handler against the REST API's token set.
  const sock = io({
    auth: { token },
    // Connect straight over WebSocket (nginx is configured for the upgrade).
    // Skipping the long-polling phase avoids the polling→WebSocket upgrade
    // race that logged benign 'Session is disconnected' / 400s server-side.
    transports: ['websocket'],
    reconnection: true,
    reconnectionDelay: 2000,
    reconnectionDelayMax: 10000,
  });
  sock.on('progress', (m) => {
    try { handleProgress(m); }
    catch (e) { pushLog(`[ws-bad-payload] ${JSON.stringify(m)}`); }
  });
  sock.on('status', (ev) => {
    try { applyStatusEvent(ev); scheduleStatusRender(); }
    catch (e) { /* ignore malformed */ }
  });
  sock.on('connect', () => {
    state.st.wsUp = true;
    // Reconcile against the authoritative snapshot on every (re)connect so we
    // never drift after a dropped socket.
    loadStatus().then(scheduleStatusRender).catch(() => {});
  });
  sock.on('connect_error', (err) => { state.st.wsUp = false; pushLog(`[ws] ${err && err.message === 'unauthorized' ? 'auth rejected' : 'connect error'}`); scheduleStatusRender(); });
  sock.on('disconnect', (reason) => { state.st.wsUp = false; pushLog(`[ws] disconnected (${reason})`); scheduleStatusRender(); });
  state.ws = sock;
}

// ─── Live status model ───────────────────────────────────────────────────────
// serverNow(): current time in the server's epoch-seconds frame (so deltas vs
// started_at / finished_at are correct even if the browser clock differs).
function serverNow() { return Date.now() / 1000 - state.st.skew; }

async function loadCoverage() {
  const r = await api('/api/scrapers/coverage').catch(() => null);
  if (r && Array.isArray(r.sources)) state.coverage = r.sources;
}
let _covTimer = null;
function refreshCoverageSoon() {
  // A scraper just finished — record counts / date ranges changed. Debounce so
  // a burst of completions triggers a single refetch.
  if (_covTimer) clearTimeout(_covTimer);
  _covTimer = setTimeout(() => { loadCoverage().then(() => { if (state.tab === 'dashboard') renderCoverage(); }); }, 1500);
}
function descForSlug(slug) {
  const e = state.coverage.find(c => c.slug === slug);
  if (!e) return null;
  return state.lang === 'zh' ? e.zh : e.en;
}

async function loadStatus() {
  const snap = await api('/api/status').catch(() => null);
  if (!snap) return;
  state.st.skew = Date.now() / 1000 - (snap.now || Date.now() / 1000);
  const procs = {}, tasks = {};
  for (const p of (snap.processes || [])) {
    procs[p.name] = {
      name: p.name, ptype: p.ptype, started_at: p.started_at,
      last_beat: (snap.now || 0) - (p.last_beat_s_ago || 0),
      activity: p.activity, stopped: p.state === 'stopped',
      error_count: p.error_count || 0, pid: p.pid,
    };
  }
  for (const t of (snap.tasks || [])) {
    tasks[t.task_id] = {
      task_id: t.task_id, process: t.process, group: t.group, title: t.title,
      state: t.state, done: t.done || 0, total: t.total,
      started_at: t.started_at, finished_at: t.finished_at,
      msg: t.msg, error: t.error,
    };
  }
  state.st.procs = procs;
  state.st.tasks = tasks;
}

// Fold one live 'status' event into the client model (mirrors status.Registry).
function applyStatusEvent(ev) {
  const ts = ev.ts || serverNow();
  if (ev.kind === 'process') {
    const p = state.st.procs[ev.name] || (state.st.procs[ev.name] = {
      name: ev.name, started_at: ts, error_count: 0,
    });
    p.ptype = ev.ptype || p.ptype || 'loop';
    p.last_beat = ts;
    if (ev.event === 'up') { p.started_at = ts; p.stopped = false; }
    if (ev.activity) p.activity = ev.activity;
    if (ev.pid != null) p.pid = ev.pid;
    if (ev.event === 'down') { p.stopped = true; p.activity = ev.activity || 'stopped'; }
  } else if (ev.kind === 'task') {
    const id = ev.task_id;
    if (ev.event === 'start') {
      state.st.tasks[id] = {
        task_id: id, process: ev.process || '?', group: ev.group || ev.process || '?',
        title: ev.title || id, state: 'running', done: 0, total: ev.total,
        started_at: ts, finished_at: null, msg: null, error: null,
      };
    } else {
      const t = state.st.tasks[id] || (state.st.tasks[id] = {
        task_id: id, process: '?', group: '?', title: id, state: 'running',
        done: 0, total: null, started_at: ts, finished_at: null, msg: null, error: null,
      });
      if (ev.event === 'step') {
        if (ev.done != null) t.done = ev.done; else t.done = (t.done || 0) + (ev.advance || 1);
        if (ev.total != null) t.total = ev.total;
        if (ev.msg) t.msg = ev.msg;
      } else if (ev.event === 'done') {
        t.state = 'done'; t.finished_at = ts;
        if (t.total) t.done = t.total;
        if (ev.msg) t.msg = ev.msg;
        if (t.process === 'scraper') refreshCoverageSoon();
      } else if (ev.event === 'error') {
        t.state = 'error'; t.finished_at = ts; t.error = ev.error || 'error';
        const p = state.st.procs[t.process];
        if (p) p.error_count = (p.error_count || 0) + 1;
        state.st.errors.unshift({ when: ts, process: t.process, title: t.title, error: t.error });
        state.st.errors = state.st.errors.slice(0, 12);
        if (t.process === 'scraper') refreshCoverageSoon();
      }
    }
  }
}

// Throttled re-render of the dashboard (only when it's the active tab).
let _stRenderQueued = false;
function scheduleStatusRender() {
  updateProcsBadge();
  if (state.tab !== 'dashboard') return;
  if (_stRenderQueued) return;
  _stRenderQueued = true;
  requestAnimationFrame(() => { _stRenderQueued = false; renderStatusSections(); });
}

// 1s ticker so uptimes / ETAs advance smoothly between events.
function startStatusTicker() {
  if (state.stTick) return;
  state.stTick = setInterval(() => {
    if (state.tab === 'dashboard') renderStatusSections();
    updateProcsBadge();
  }, 1000);
}

function updateProcsBadge() {
  const el = document.getElementById('procsBadge');
  if (!el) return;
  const procs = Object.values(state.st.procs);
  const now = serverNow();
  const up = procs.filter(p => procState(p, now) === 'running').length;
  el.innerHTML = `<span class="sdot ${state.st.wsUp ? 'running' : 'stopped'}"></span>`
    + `${up} ${t('運行中', 'up')} · ${state.st.wsUp ? t('已連線', 'live') : t('斷線', 'offline')}`;
}

// ─── status formatting helpers ───────────────────────────────────────────────
function procState(p, now) {
  if (p.stopped) return 'stopped';
  if (p.ptype === 'oneshot') {
    const running = Object.values(state.st.tasks).some(t => t.process === p.name && t.state === 'running');
    return running ? 'running' : 'idle';
  }
  return (now - (p.last_beat || p.started_at || now)) > 150 ? 'stalled' : 'running';
}
function fmtDur(s) {
  s = Math.max(0, Math.round(s));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h) return `${h}h ${String(m).padStart(2,'0')}m ${String(sec).padStart(2,'0')}s`;
  if (m) return `${m}m ${String(sec).padStart(2,'0')}s`;
  return `${sec}s`;
}
function fmtClock(epoch) {
  return new Date(epoch * 1000).toTimeString().slice(0, 8);
}
function taskView(t, now) {
  const done = t.done || 0, total = t.total;
  const end = t.finished_at || now;
  const elapsed = end - (t.started_at || now);
  let pct = null, eta_s = null, eta_ts = null;
  if (total && total > 0) {
    pct = Math.max(0, Math.min(1, done / total));
    if (t.state === 'running' && done > 0) {
      eta_s = Math.round((elapsed / done) * Math.max(0, total - done));
      eta_ts = now + eta_s;
    }
  }
  return { done, total, pct, eta_s, eta_ts, elapsed };
}

async function loadStrategyDetail(id) {
  state.selectedStrategy = state.strategies.find(s => s.id === id) || null;
  state.dashStrategy = id;
  saveUi({ dashStrategy: id });
  // Fetch the summary + charts + bet-strategy list + (if not yet loaded)

  // feature-pill panel that now sits at the bottom of the page.
  const featuresPromise = state.features
    ? Promise.resolve(state.features)
    : api('/api/features').catch(() => null);
  const [dash, charts, features, betStrats] = await Promise.all([
    api(`/api/strategies/${id}/dashboard`).catch(e => ({ error: e.message })),
    api(`/api/strategies/${id}/charts`).catch(e => ({ error: e.message })),
    featuresPromise,
    api(`/api/strategies/${id}/bet_strategies`).catch(() => []),
  ]);
  state.dashData = dash;
  state.dashModelCharts = charts;            // raw model-level audit, kept for re-merges
  state.dashCharts = charts;
  state.betStrategies = Array.isArray(betStrats) ? betStrats : [];
  _reconcileBetStrategy();
  if (features && !state.features) state.features = features;
  state.strategyHealth = dash && !dash.error
    ? { windows: dash.calibration_trend }
    : null;
  state.strategyAudit = null;
  // If a bet strategy is selected, layer its ledger-derived series on top.
  await refreshDashCharts();
  render();
}

// Shared validator for state.betStrategy: drop it if it no longer belongs
// to the current model's bet-strategy list, then auto-select the first
// available one. Called from both loadStrategyDetail and loadRaces so the
// selection stays consistent across pages.
function _reconcileBetStrategy() {
  if (state.betStrategy != null) {
    const bsid = parseInt(state.betStrategy);
    if (!state.betStrategies.some(b => b.id === bsid)) {
      state.betStrategy = null;
      saveUi({ betStrategy: null });
    }
  }
  if (state.betStrategy == null && state.betStrategies.length > 0) {
    state.betStrategy = state.betStrategies[0].id;
    saveUi({ betStrategy: state.betStrategy });
  }
}

// Recompute state.dashCharts based on state.betStrategy. With no bet
// strategy selected, show the model-level audit unchanged. With one selected,
// fetch /api/bet_strategies/{id}/charts and overlay its ledger-derived series
// (cumulative_pnl, odds_buckets, segments, bankroll_path, totals) onto the
// model charts — leaves predictions-only series (reliability, kelly_scenarios,
// threshold_sweeps, top_n_scenarios) intact since they don't depend on which
// bet rule fires.
async function refreshDashCharts() {
  const base = state.dashModelCharts || {};
  const bsid = state.betStrategy;
  if (bsid == null) {
    state.dashCharts = base;
    return;
  }
  const bs = await api(`/api/bet_strategies/${bsid}/charts`).catch(() => null);
  if (!bs || bs.error) { state.dashCharts = base; return; }
  state.dashCharts = {
    ...base,
    cumulative_pnl: bs.cumulative_pnl,
    odds_buckets:   bs.odds_buckets,
    segments:       bs.segments,
    bankroll_path:  bs.bankroll_path,
    totals:         bs.totals,
    _bet_strategy:  { id: bsid, name: bs.name, name_en: bs.name_en, name_zh: bs.name_zh },
  };
}

async function loadRaces() {
  // Loading-state UX: dim the existing race grid + bets summary with a
  // spinner overlay as soon as fetching starts, so the user sees their
  // selection acknowledged immediately rather than waiting for the
  // network round-trip. Cleared when data lands.
  state.racesLoading = true;
  if (state.tab === 'races') render();

  // Always ensure state.strategies is populated — even if the user already
  // had a raceStrategy from their cookie, analyse() needs strat lookup to
  // work (otherwise every assessment cell silently shows '—').
  if (!state.strategies?.length) {
    state.strategies = await api('/api/strategies').catch(() => []);
  }
  // Default strategy filter to the first enabled one if still not set
  if (state.raceStrategy == null && state.strategies.length) {
    const def = state.strategies.find(s => s.enabled) || state.strategies[0];
    if (def) { state.raceStrategy = def.id; saveUi({ raceStrategy: state.raceStrategy }); }
  }
  // Date calendar
  const sid = state.raceStrategy;
  const qs = sid != null ? `?strategy_id=${sid}` : '';
  state.raceDates = await api(`/api/dates${qs}`).catch(e => ({ dates: [], error: e.message }));

  const dates = state.raceDates?.dates || [];
  // Backfill year/month from a saved raceDate (e.g. older cookie that only had raceDate)
  if (state.raceDate && (!state.raceYear || !state.raceMonth)) {
    state.raceYear = state.raceDate.slice(0, 4);
    state.raceMonth = state.raceDate.slice(5, 7);
    saveUi({ raceYear: state.raceYear, raceMonth: state.raceMonth });
  }
  // On first ever visit, drop the user onto the most recent predicted meeting
  // (or the latest meeting if no predictions exist yet).
  if (state.raceYear == null && dates.length) {
    const firstPred = dates.find(d => (d.predicted_races || 0) > 0) || dates[0];
    state.raceYear = firstPred.date.slice(0, 4);
    state.raceMonth = firstPred.date.slice(5, 7);
    state.raceDate = firstPred.date;
    saveUi({ raceYear: state.raceYear, raceMonth: state.raceMonth, raceDate: state.raceDate });
  }
  // Also pull the bet strategies list (used for the Races-page bet selector).
  if (sid != null) {
    state.betStrategies = await api(`/api/strategies/${sid}/bet_strategies`)
      .catch(() => []);
  } else {
    state.betStrategies = [];
  }
  _reconcileBetStrategy();
  // Fetch the selected date's race cards (if any selection)
  if (state.raceDate) {
    let dqs = sid != null ? `?strategy_id=${sid}` : '';
    if (state.betStrategy) {
      dqs += (dqs ? '&' : '?') + `bet_strategy_id=${state.betStrategy}`;
    }
    state.raceData = await api(`/api/races/${state.raceDate}${dqs}`)
      .catch(e => ({ races: [], error: e.message }));
    state.raceNews = await api(`/api/race_news/${state.raceDate}`).catch(() => null);
  } else {
    state.raceData = null;
    state.raceNews = null;
  }
  state.racesLoading = false;
  render();
}

// Bucket the flat /api/dates list by year and month for the cascading picker.
function bucketDatesByYearMonth(dates) {
  const out = {};
  for (const d of dates) {
    const yr = d.date.slice(0, 4);
    const mo = d.date.slice(5, 7);
    if (!out[yr]) out[yr] = { dates: [], months: {}, has_pred: false, races_total: 0, predicted_total: 0 };
    if (!out[yr].months[mo]) out[yr].months[mo] = { dates: [], has_pred: false, races_total: 0, predicted_total: 0 };
    out[yr].months[mo].dates.push(d);
    out[yr].dates.push(d);
    out[yr].races_total += d.races || 0;
    out[yr].predicted_total += d.predicted_races || 0;
    out[yr].months[mo].races_total += d.races || 0;
    out[yr].months[mo].predicted_total += d.predicted_races || 0;
    if ((d.predicted_races || 0) > 0) {
      out[yr].has_pred = true;
      out[yr].months[mo].has_pred = true;
    }
  }
  return out;
}

}

// Read a cron expression into a short human hint (covers the patterns we use).
function cronHint(expr) {
  const days = { '0': t('週日','Sun'), '1': t('週一','Mon'), '2': t('週二','Tue'),
                 '3': t('週三','Wed'), '4': t('週四','Thu'), '5': t('週五','Fri'), '6': t('週六','Sat') };
  const p = (expr || '').trim().split(/\s+/);
  if (p.length !== 5) return expr;
  const [mi, hr, dom, mon, dow] = p;
  const hhmm = (/^\d+$/.test(hr) && /^\d+$/.test(mi))
    ? `${String(hr).padStart(2,'0')}:${String(mi).padStart(2,'0')}` : expr;
  if (dom === '*' && mon === '*' && dow === '*') return `${t('每天','daily')} ${hhmm}`;
  if (dom === '*' && mon === '*' && days[dow]) return `${days[dow]} ${hhmm}`;
  return expr;
}

// Re-render ONLY the live-status sections (process grid, to-do list, errors) so
// the 1s ticker and event deltas don't rebuild the controls/log or lose state.
function renderStatusSections() {
  const grid = document.getElementById('procGrid');
  if (!grid) return;   // dashboard not mounted
  const now = serverNow();

  // ── process cards ──
  const procs = Object.values(state.st.procs).sort((a, b) => a.name.localeCompare(b.name));
  grid.innerHTML = procs.length ? procs.map(p => {
    const st = procState(p, now);
    const uptime = st === 'stopped' ? '—' : fmtDur(now - (p.started_at || now));
    const beat = Math.round(now - (p.last_beat || p.started_at || now));
    return `
      <div class="proc-card ${st}">
        <div class="pname"><span class="sdot ${st}"></span>${escapeHtml(p.name)}</div>
        <div class="pmeta">
          <div>${t('運行', 'uptime')} <span class="up">${uptime}</span></div>
          <div>${t('心跳', 'beat')} ${st === 'stopped' ? '—' : beat + 's ' + t('前', 'ago')}${
            p.error_count ? ` · <span class="perr">✗ ${p.error_count}</span>` : ''}</div>
        </div>
        <div class="pact" title="${escapeHtml(p.activity || '')}">${escapeHtml(p.activity || '—')}</div>
      </div>`;
  }).join('') : `<div class="empty">${t('尚無處理程序回報', 'no processes reporting yet')}</div>`;

  // ── to-do list, grouped by process ──
  const tasks = Object.values(state.st.tasks);
  const groups = {};
  for (const tk of tasks) (groups[tk.group || tk.process] = groups[tk.group || tk.process] || []).push(tk);
  const order = { running: 0, pending: 1, done: 2, error: 2 };
  const todo = document.getElementById('todoList');
  const groupKeys = Object.keys(groups).sort();
  todo.innerHTML = groupKeys.length ? groupKeys.map(g => {
    const rows = groups[g].sort((a, b) =>
      (order[a.state] - order[b.state]) || ((b.finished_at || b.started_at || 0) - (a.finished_at || a.started_at || 0)));
    return `<div class="todo-group"><div class="ghdr">${escapeHtml(g)}</div>${
      rows.map(tk => renderTodoRow(tk, now)).join('')}</div>`;
  }).join('') : `<div class="empty">${t('目前沒有任務', 'no tasks right now')}</div>`;

  // ── errors panel ──
  const errPanel = document.getElementById('errPanel');
  const errList = document.getElementById('errList');
  if (state.st.errors.length) {
    errPanel.style.display = '';
    errList.innerHTML = state.st.errors.map(e =>
      `<div class="err-row"><span class="ewhen">${fmtClock(e.when)}</span>${
        escapeHtml(e.process)} · ${escapeHtml(e.title)} — ${escapeHtml(e.error)}</div>`).join('');
  } else {
    errPanel.style.display = 'none';
  }
}

function renderTodoRow(tk, now) {
  const v = taskView(tk, now);
  const mark = { running: '<span class="spin">◐</span>', done: '✓', error: '✗', pending: '○' }[tk.state] || '○';
  // For scraper tasks, surface the bilingual description from the catalog.
  const slug = (tk.process === 'scraper' && /^scraper:\s*(.+)$/.exec(tk.title || ''));
  const desc = slug ? descForSlug(slug[1].trim()) : null;
  const titleHtml = escapeHtml(tk.title) + (desc ? ` <span style="color:var(--muted);font-size:11px">— ${escapeHtml(desc)}</span>` : '');
  let middle;
  if (tk.state === 'running' && v.total) {
    const eta = v.eta_s != null ? `~${fmtDur(v.eta_s)} ${t('剩餘', 'left')} (~${fmtClock(v.eta_ts)})` : '…';
    middle = `<div class="pbar"><i style="width:${Math.round((v.pct || 0) * 100)}%"></i></div>`
           + `<span class="teta">${v.done}/${v.total} · ${eta}</span>`;
  } else if (tk.state === 'running') {
    middle = `<span class="tmsg">${escapeHtml(tk.msg || t('進行中…', 'working…'))}</span>`
           + `<span class="teta">${fmtDur(v.elapsed)}</span>`;
  } else if (tk.state === 'error') {
    middle = `<span class="tmsg">${escapeHtml(tk.error || tk.msg || '')}</span>`;
  } else { // done
    middle = `<span class="tmsg">${escapeHtml(tk.msg || '')}</span>`
           + `<span class="teta">${fmtDur(v.elapsed)}</span>`;
  }
  return `<div class="todo ${tk.state}">
    <span class="mark">${mark}</span>
    <span class="ttitle">${titleHtml}</span>
    ${middle}
  </div>`;
}

// ─── Strategy feature-pill panel ────────────────────────────────────────────
// Bilingual condensed view of which features this strategy uses (green) vs
// disables (grey), grouped by the 15 catalogue categories. Pill labels follow
// the global language toggle (state.lang). Each pill carries a tooltip with
// the H-id + full description so users can hover to read context.
function renderStrategyFeaturePanel(strategy) {
  if (!strategy || !state.features?.categories) return '';
  let overrides = {};
  try {
    overrides = strategy.features_enabled_json
      ? JSON.parse(strategy.features_enabled_json) : {};
  } catch (e) { overrides = {}; }
  const lang = state.lang;

  // Pack everything (category-headers + pills) into ONE wrapping flex row so
  // there are no line breaks before/after each category title — categories
  // act as inline separators inside a single dense grid.
  let totalEnabled = 0, totalCount = 0;
  const items = [];
  (state.features.categories || []).forEach(cat => {
    let catEnabled = 0;
    const catPills = [];
    cat.features.forEach(f => {
      const enabled = (f.id in overrides) ? !!overrides[f.id] : !!f.enabled_default;
      if (enabled) { catEnabled++; totalEnabled++; }
      totalCount++;
      const nm = f[`name_${lang}`] || f.name_en;
      const desc = f[`description_${lang}`] || f.description_en || '';
      const titleText = `${f.id} · ${nm}\n${desc}`;
      catPills.push(
        `<span class="feat-pill ${enabled ? 'on' : 'off'}" title="${escapeHtml(titleText)}">` +
        `<span class="feat-pill-id">${f.id}</span>${escapeHtml(nm)}</span>`
      );
    });
    const catName = cat[`name_${lang}`];
    items.push(
      `<span class="feat-pill-cathdr-inline">${escapeHtml(catName)} <span class="muted">${catEnabled}/${cat.features.length}</span></span>`
    );
    items.push(...catPills);
  });

  return `
    <div class="panel">
      <h2>${t('使用中的特徵', 'Features in use')}
        <span class="muted" style="font-weight:400;font-size:13px">
          · ${totalEnabled} / ${totalCount} ${t('已啟用', 'enabled')}
        </span>
      </h2>
      <div class="feat-pill-grid">${items.join('')}</div>
    </div>
  `;
}


// ─── ApexCharts performance charts ──────────────────────────────────────────
// We render placeholder <div>s into the DOM and then asynchronously mount
// ApexCharts instances after the browser has painted them. Instances are
// tracked in `_apexCharts` so we can destroy them before re-mount (avoids
// memory leaks when the user clicks between strategies).

const _apexCharts = {};

function _destroyApexChart(id) {
  if (_apexCharts[id]) {
    try { _apexCharts[id].destroy(); } catch (e) {}
    delete _apexCharts[id];
  }
}

function _mountApexChart(id, options) {
  const el = document.getElementById(id);
  if (!el) { console.warn(`[chart ${id}] container not found`); return; }
  if (typeof ApexCharts === 'undefined') {
    console.warn(`[chart ${id}] ApexCharts library not loaded`);
    el.innerHTML = `<div class="empty">ApexCharts not loaded</div>`;
    return;
  }
  _destroyApexChart(id);
  try {
    const c = new ApexCharts(el, options);
    c.render().catch(err => {
      console.error(`[chart ${id}] render() failed:`, err);
      el.innerHTML = `<div class="empty">chart render error: ${escapeHtml(String(err))}</div>`;
    });
    _apexCharts[id] = c;
  } catch (err) {
    console.error(`[chart ${id}] construction failed:`, err, options);
    el.innerHTML = `<div class="empty">chart error: ${escapeHtml(String(err))}</div>`;
  }
}

// Project-wide default styling — applied to every chart.
function _baseOpts() {
  return {
    chart: { background: 'transparent', toolbar: { show: false }, fontFamily: 'inherit',
             foreColor: '#d8e0ee', animations: { enabled: true, speed: 300 } },
    grid: { borderColor: 'rgba(42,49,64,0.6)', strokeDashArray: 3,

// Shared "small ROI bar chart" pattern: items must each have {roi, n_bets,
// stake, payout, is_current, label_text}. Used by threshold-sweep + top-N.
function _roiBarOpts(items, opts = {}) {
  const cats = items.map(i => i.is_current ? `${i.label_text} ★` : i.label_text);
  const data = items.map(i => +(i.roi * 100).toFixed(2));
  return {
    ..._baseOpts(),
    chart: { ..._baseOpts().chart, type: 'bar', height: opts.height || 260 },
    series: [{ name: 'ROI %', data }],
    plotOptions: {
      bar: {
        columnWidth: '60%', borderRadius: 2,
        colors: { ranges: [
          { from: -1e9, to: -0.0001, color: '#f06262' },
          { from: 0,    to: 1e9,     color: '#4dd17a' },
        ]},
      },
    },
    fill:   { opacity: items.map(i => i.is_current ? 1.0 : 0.55) },
    stroke: { width:   items.map(i => i.is_current ? 2 : 0), colors: ['#5ec0ff'] },
    dataLabels: {
      enabled: true,
      formatter: (val, ctx) => {
        const it = items[ctx.dataPointIndex];
        return it.is_current ? `${val.toFixed(1)}%★` : `${val.toFixed(1)}%`;
      },
      style: { fontSize: '10px', colors: ['#d8e0ee'], fontWeight: 600 },
      offsetY: -14,
    },
    xaxis: {
      categories: cats,
      labels: { show: true, style: { colors: '#8290a8', fontSize: '11px' } },
      axisBorder: { show: true, color: 'rgba(42,49,64,0.6)' },
      axisTicks: { show: true, color: 'rgba(42,49,64,0.6)' },
    },
    yaxis: {
      title: { text: 'ROI %', style: { color: '#8290a8' } },
      labels: { formatter: v => v.toFixed(0) + '%', style: { colors: '#8290a8' } },
    },
    annotations: { yaxis: [{ y: 0, borderColor: '#8290a8', strokeDashArray: 0,
                             label: { borderColor: 'transparent', text: '' } }] },
    tooltip: { ..._baseOpts().tooltip,
               custom: ({ dataPointIndex }) => {
                 const it = items[dataPointIndex];
                 const sign = it.pnl >= 0 ? '+' : '-';
                 return `<div class="apex-tip">
                   <div><b>${it.label_text}</b>${it.is_current ? ' ★ ' + t('當前', '(current)') : ''}</div>
                   <div>ROI: <b style="color:${it.roi >= 0 ? '#4dd17a' : '#f06262'}">${(it.roi*100).toFixed(2)}%</b></div>
                   <div>${t('盈虧', 'PnL')}: ${sign}$${Math.abs(it.pnl).toFixed(0)}</div>
                   <div class="muted">${it.n_bets} ${t('注', 'bets')} · $${it.stake.toFixed(0)} → $${it.payout.toFixed(0)}</div>
                 </div>`;
               } },
    legend: { show: false },
  };
}

function sweepChartOpts(scenarios, fmtLabel) {

function dailyRacesStackChartOpts(points) {
  // Stacked bars: per race day, how the total race count splits into
  //   green: races where we placed a bet AND it won
  //   red:   races where we placed a bet AND it lost
  //   grey:  races we did NOT bet on
  // Sum = total_races for that day. Click jumps to the Races tab on that date.
  const categories = points.map(p => p.date);
  const wins       = points.map(p => p.daily_wins || 0);
  // Approximation: each placed bet is on a different race. In rare cases a
  // strategy could fire twice in the same race; this slightly over-counts
  // "bet-races" then, which would push the loss bar negative. Clamp to ≥0.
  const losses     = points.map(p => Math.max(0, (p.daily_bets || 0) - (p.daily_wins || 0)));
  const nobet      = points.map(p => Math.max(0, (p.total_races || 0) - (p.daily_bets || 0)));
  return {
    ..._baseOpts(),
    chart: { ..._baseOpts().chart, type: 'bar', height: 300, stacked: true,
             events: {
               dataPointSelection: (_e, _ctx, conf) => {
                 const date = points[conf.dataPointIndex]?.date;
                 if (!date) return;
                 state.raceDate = date;
                 state.raceYear = date.slice(0, 4);
                 state.raceMonth = date.slice(5, 7);
                 saveUi({ raceDate: state.raceDate, raceYear: state.raceYear,
                          raceMonth: state.raceMonth });
                 switchTab('races');
               },
             },
    },
    series: [
      { name: t('預測命中', 'Won'),         data: wins },
      { name: t('預測落敗', 'Lost'),         data: losses },
      { name: t('未下注', 'Not bet'),       data: nobet },
    ],
    colors: ['#4dd17a', '#f06262', 'rgba(130,144,168,0.45)'],
    plotOptions: { bar: { columnWidth: '60%', borderRadius: 0 } },
    dataLabels: { enabled: false },
    stroke: { width: 0 },
    xaxis: {
      categories, type: 'category',
      title: { text: t('賽事日期', 'Race date'), style: { color: '#8290a8' } },
      labels: { show: true, style: { colors: '#8290a8' }, rotate: -45,
                hideOverlappingLabels: true, trim: false },
      axisBorder: { show: true, color: 'rgba(42,49,64,0.6)' },
      axisTicks:  { show: true, color: 'rgba(42,49,64,0.6)' },
    },
    yaxis: {
      title: { text: t('場次數', 'Number of races'), style: { color: '#8290a8' } },
      labels: { formatter: v => v.toFixed(0), style: { colors: '#8290a8' } },
      forceNiceScale: true,
    },
    // Stacked bar: ApexCharts forces tooltip.intersect=true so each segment
    // is independently hoverable — that conflicts with shared=true. We don't
    // need shared because the custom handler returns the full day breakdown
    // regardless of which segment was hovered.
    tooltip: { ..._baseOpts().tooltip,
               shared: false, intersect: true,
               custom: ({ dataPointIndex }) => {
                 const p = points[dataPointIndex];
                 const wr = (p.daily_bets || 0) > 0
                   ? ((p.daily_wins / p.daily_bets) * 100).toFixed(1) + '%'
                   : '—';
                 return `<div class="apex-tip">
                   <div><b>${p.date}</b></div>
                   <div>${t('總場次', 'Total races')}: <b>${p.total_races || 0}</b></div>
                   <div style="color:#4dd17a">${t('命中', 'Won')}: ${p.daily_wins || 0}</div>
                   <div style="color:#f06262">${t('落敗', 'Lost')}: ${Math.max(0, (p.daily_bets||0)-(p.daily_wins||0))}</div>
                   <div class="muted">${t('未下注', 'Not bet')}: ${Math.max(0, (p.total_races||0)-(p.daily_bets||0))}</div>
                   <div class="muted">${t('下注勝率', 'Bet win-rate')}: ${wr}</div>
                 </div>`;
               } },
    legend: { position: 'top', horizontalAlign: 'right' },
  };
}

function cumPnlChartOpts(points, overlays = []) {
  // `points` is the model's audit-style cumulative-PnL (from /api/charts).
  // `overlays` is an array of bet-strategy curves: each { name, chart_color,
  //   points: [{date, cumulative_pnl, n_bets, ...}] } from
  //   /api/bet_strategies/{id}/curve. Drawn as additional line series so
  //   the user can compare bet rules visually.
  const lastPnl = points.length ? points[points.length - 1].pnl_cum : 0;
  const positive = lastPnl >= 0;
  const series = [{
    name: 'Model (current bet rule)',
    type: 'area',
    data: points.map(p => ({ x: new Date(p.date).getTime(), y: p.pnl_cum })),
  }];
  const colors = [positive ? '#4dd17a' : '#f06262'];
  for (const ov of overlays) {
    if (!ov || !ov.points || !ov.points.length) continue;
    series.push({
      name: ov.name_en || ov.name,
      type: 'line',
      data: ov.points.map(p => ({ x: new Date(p.date).getTime(), y: p.cumulative_pnl })),
    });
    colors.push(ov.chart_color || '#888888');
  }
  return {
    ..._baseOpts(),
    chart: { ..._baseOpts().chart, type: 'line', height: 280, zoom: { enabled: false } },
    series,
    colors,
    stroke: { curve: 'straight', width: series.map((_, i) => i === 0 ? 2 : 1.5) },
    fill: { type: series.map((_, i) => i === 0 ? 'gradient' : 'solid'),
            gradient: { shadeIntensity: 1, opacityFrom: 0.35, opacityTo: 0, stops: [0, 95] } },
    dataLabels: { enabled: false },
    markers: { size: series.map((_, i) => i === 0 ? 3 : 0), hover: { sizeOffset: 3 } },
    xaxis: { type: 'datetime',
             labels: { datetimeUTC: false, format: 'MM-dd', style: { colors: '#8290a8' } },
             axisBorder: { color: 'rgba(42,49,64,0.6)' },
             axisTicks: { color: 'rgba(42,49,64,0.6)' } },
    yaxis: { labels: { formatter: v => '$' + v.toFixed(0), style: { colors: '#8290a8' } } },
    tooltip: { ..._baseOpts().tooltip,
               x: { format: 'yyyy-MM-dd' },
               y: { formatter: (v) => '$' + (v == null ? '?' : v.toFixed(0)) } },
    annotations: { yaxis: [{ y: 0, borderColor: '#8290a8', strokeDashArray: 0,
                             label: { borderColor: 'transparent', text: '' } }] },
    legend: { show: overlays.length > 0, position: 'top',
              labels: { colors: '#8290a8' } },
  };
}

function reliabilityChartOpts(bins) {
  // Two series in a 'line' chart:
  //   0) Bins — drawn as oversized markers only (line stroke = 0, so they
  //      visually act as scatter bubbles). Per-bin size encoded via
  //      markers.discrete (a flat numeric/array on markers.size does NOT
  //      do per-point sizing — that was the previous bug).
  //   1) Perfect-calibration diagonal — drawn as a dashed line from (0,0)
  //      to (100,100) with no markers.
  const scatterData = bins.map(b => ({
    x: +(b.predicted_mean * 100).toFixed(2),
    y: +(b.observed_rate * 100).toFixed(2),
  }));
  const maxN = Math.max(1, ...bins.map(b => b.n_samples));
  const _binMeta = bins.map(b => ({
    n: b.n_samples,
    x: +(b.predicted_mean * 100).toFixed(2),
    y: +(b.observed_rate * 100).toFixed(2),
  }));
  return {
    ..._baseOpts(),
    chart: { ..._baseOpts().chart, height: 300, type: 'line', zoom: { enabled: false } },
    series: [
      { name: t('預測機率區間', 'Bins'),               data: scatterData },
      { name: t('完美校準', 'Perfect calibration'),    data: [{x:0,y:0},{x:100,y:100}] },
    ],
    colors: ['#5ec0ff', '#8290a8'],
    stroke: { width: [0, 1.5], dashArray: [0, 5], curve: 'straight' },
    markers: {
      size: [8, 0],                              // default size per series
      strokeColors: '#5ec0ff', strokeWidth: 1.5,
      hover: { sizeOffset: 4 },
      // Per-bin bubble sizing — proportional to √sample count (so a bin
      // with 10× more samples is ~3× larger, not 10× — keeps small bins
      // visible alongside huge ones).
      discrete: bins.map((b, i) => ({
        seriesIndex: 0,
        dataPointIndex: i,
        size: 6 + 14 * Math.sqrt(b.n_samples / maxN),
        fillColor: '#5ec0ff',
        strokeColor: '#5ec0ff',
      })),
    },
    dataLabels: { enabled: false },
    xaxis: { type: 'numeric', min: 0, max: 100, tickAmount: 5,
             title: { text: t('預測機率 %', 'Predicted probability %'), style: { color: '#8290a8' } },
             labels: { formatter: v => Number(v).toFixed(0), style: { colors: '#8290a8' } } },
    yaxis: { min: 0, max: 100, tickAmount: 5,
             title: { text: t('觀察勝率 %', 'Observed win-rate %'), style: { color: '#8290a8' } },
             labels: { formatter: v => Number(v).toFixed(0), style: { colors: '#8290a8' } } },
    tooltip: { ..._baseOpts().tooltip,
               custom: ({ seriesIndex, dataPointIndex }) => {
                 if (seriesIndex !== 0) return '';
                 const m = _binMeta[dataPointIndex];
                 if (!m) return '';
                 return `<div class="apex-tip">
                   <div>${t('預測', 'predicted')}: <b>${m.x.toFixed(1)}%</b></div>
                   <div>${t('觀察', 'observed')}: <b>${m.y.toFixed(1)}%</b></div>
                   <div class="muted">n=${m.n}</div>
                 </div>`;
               } },
    legend: { position: 'top', horizontalAlign: 'right' },
  };
}

function oddsBucketsChartOpts(buckets) {

// ─── (deprecated) inline-SVG fallback renderers, kept as a backstop ─────────
function svgCumPnl(points) {
  if (!points.length) return `<div class="empty">${t('（尚無下注）', '(no placed bets)')}</div>`;
  const W = 480, H = 200, padL = 50, padR = 12, padT = 12, padB = 28;
  const xs = points.map((_, i) => i);
  const ys = points.map(p => p.pnl_cum);
  const yMin = Math.min(0, ...ys);
  const yMax = Math.max(0, ...ys);
  const yRange = (yMax - yMin) || 1;
  const xScale = i => padL + (i / Math.max(1, points.length - 1)) * (W - padL - padR);
  const yScale = v => padT + (1 - (v - yMin) / yRange) * (H - padT - padB);
  const zeroY = yScale(0);
  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xScale(i).toFixed(1)},${yScale(p.pnl_cum).toFixed(1)}`).join(' ');
  // Area fills above/below zero with positive/negative tints
  const areaUp = pathD + ` L${xScale(points.length - 1).toFixed(1)},${zeroY.toFixed(1)} L${xScale(0).toFixed(1)},${zeroY.toFixed(1)} Z`;
  // Y-axis ticks (3-5 evenly spaced)
  const yTicks = niceTicks(yMin, yMax, 4);
  const xTickStep = Math.max(1, Math.ceil(points.length / 6));
  const xTickIdx = points.map((_, i) => i).filter(i => i % xTickStep === 0 || i === points.length - 1);
  const lastPnl = ys[ys.length - 1];
  const lineColor = lastPnl >= 0 ? 'var(--good)' : 'var(--bad)';
  const fillColor = lastPnl >= 0 ? 'rgba(77,209,122,0.12)' : 'rgba(240,98,98,0.12)';
  return `
    <svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="none">
      <!-- y gridlines -->
      ${yTicks.map(v => `
        <line x1="${padL}" x2="${W - padR}" y1="${yScale(v).toFixed(1)}" y2="${yScale(v).toFixed(1)}"
              stroke="var(--border)" stroke-dasharray="2 3" stroke-width="0.5"/>
        <text x="${padL - 6}" y="${(yScale(v) + 3).toFixed(1)}" text-anchor="end"
              fill="var(--muted)" font-size="10" font-family="ui-monospace, monospace">$${v >= 0 ? '' : '-'}${Math.abs(v).toFixed(0)}</text>
      `).join('')}
      <!-- zero line emphasised -->
      <line x1="${padL}" x2="${W - padR}" y1="${zeroY.toFixed(1)}" y2="${zeroY.toFixed(1)}"
            stroke="var(--muted)" stroke-width="1"/>
      <!-- area + line -->
      <path d="${areaUp}" fill="${fillColor}" />
      <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- x ticks -->
      ${xTickIdx.map(i => {
        const d = points[i].date.slice(5); // MM-DD
        return `
          <line x1="${xScale(i).toFixed(1)}" x2="${xScale(i).toFixed(1)}" y1="${H - padB}" y2="${H - padB + 4}" stroke="var(--muted)" stroke-width="0.5"/>
          <text x="${xScale(i).toFixed(1)}" y="${H - padB + 16}" text-anchor="middle"
                fill="var(--muted)" font-size="10" font-family="ui-monospace, monospace">${d}</text>
        `;
      }).join('')}
      <!-- end-of-line value pill -->
      <text x="${(W - padR - 4).toFixed(1)}" y="${(yScale(lastPnl) - 6).toFixed(1)}" text-anchor="end"
            fill="${lineColor}" font-size="11" font-family="ui-monospace, monospace" font-weight="600">
        ${lastPnl >= 0 ? '+$' : '-$'}${Math.abs(lastPnl).toFixed(0)}
      </text>
    </svg>
  `;
}

function svgReliability(bins) {
  const W = 320, H = 280, padL = 40, padR = 12, padT = 12, padB = 30;
  const plot = (x) => padL + x * (W - padL - padR);
  const plotY = (y) => padT + (1 - y) * (H - padT - padB);
  // 4 ticks at 0, 0.25, 0.50, 0.75
  const ticks = [0, 0.25, 0.5, 0.75, 1];
  const maxN = Math.max(1, ...bins.map(b => b.n_samples));
  return `
    <svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="xMidYMid meet">
      <!-- diagonal reference -->
      <line x1="${plot(0)}" y1="${plotY(0)}" x2="${plot(1)}" y2="${plotY(1)}"
            stroke="var(--muted)" stroke-dasharray="3 3" stroke-width="1"/>
      <!-- axes -->
      ${ticks.map(t => `
        <line x1="${plot(t)}" x2="${plot(t)}" y1="${padT}" y2="${H - padB}" stroke="var(--border)" stroke-width="0.4"/>
        <line x1="${padL}" x2="${W - padR}" y1="${plotY(t)}" y2="${plotY(t)}" stroke="var(--border)" stroke-width="0.4"/>
        <text x="${plot(t)}" y="${H - padB + 14}" text-anchor="middle" fill="var(--muted)" font-size="9" font-family="ui-monospace, monospace">${(t*100).toFixed(0)}%</text>
        <text x="${padL - 6}" y="${(plotY(t) + 3).toFixed(1)}" text-anchor="end" fill="var(--muted)" font-size="9" font-family="ui-monospace, monospace">${(t*100).toFixed(0)}%</text>
      `).join('')}
      <!-- axis labels -->
      <text x="${(padL + (W-padL-padR)/2).toFixed(1)}" y="${H - 4}" text-anchor="middle" fill="var(--muted)" font-size="10">${t('預測機率', 'predicted probability')}</text>
      <text x="${12}" y="${(padT + (H-padT-padB)/2).toFixed(1)}" text-anchor="middle" fill="var(--muted)" font-size="10"
            transform="rotate(-90 12 ${(padT + (H-padT-padB)/2).toFixed(1)})">${t('觀察勝率', 'observed win-rate')}</text>
      <!-- bin points -->
      ${bins.map(b => {
        const cx = plot(b.predicted_mean);
        const cy = plotY(b.observed_rate);
        const r = 3 + 8 * Math.sqrt(b.n_samples / maxN);
        return `
          <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${r.toFixed(1)}"
                  fill="rgba(94,192,255,0.6)" stroke="var(--accent)" stroke-width="1">
            <title>${(b.predicted_mean*100).toFixed(1)}% → ${(b.observed_rate*100).toFixed(1)}%  (n=${b.n_samples})</title>
          </circle>
        `;
      }).join('')}
    </svg>
  `;
}

function svgOddsBuckets(buckets) {
  if (!buckets.length) return `<div class="empty">${t('（尚無下注）', '(no placed bets)')}</div>`;
  const W = 480, H = 220, padL = 40, padR = 50, padT = 12, padB = 50;
  const innerW = W - padL - padR;
  const bandW = innerW / buckets.length;
  const barW = bandW * 0.36;
  // Two side-by-side bars per bucket: win-rate (blue) and abs(ROI) coloured.
  // Win-rate axis 0-1 on left; ROI axis -1..+1 on right.
  const wrY = v => padT + (1 - v) * (H - padT - padB);
  const roiY = v => padT + (1 - (v + 1) / 2) * (H - padT - padB);
  const wrTicks = [0, 0.25, 0.5, 0.75, 1];
  const roiTicks = [-1, -0.5, 0, 0.5, 1];
  return `
    <svg viewBox="0 0 ${W} ${H}" class="chart-svg" preserveAspectRatio="xMidYMid meet">
      <!-- gridlines + left axis (win-rate) -->
      ${wrTicks.map(v => `
        <line x1="${padL}" x2="${W - padR}" y1="${wrY(v)}" y2="${wrY(v)}" stroke="var(--border)" stroke-dasharray="2 3" stroke-width="0.4"/>
        <text x="${padL - 6}" y="${(wrY(v) + 3).toFixed(1)}" text-anchor="end" fill="var(--accent)" font-size="9" font-family="ui-monospace, monospace">${(v*100).toFixed(0)}%</text>
      `).join('')}
      <!-- right axis (ROI) -->
      ${roiTicks.map(v => `
        <text x="${(W - padR + 6).toFixed(1)}" y="${(roiY(v) + 3).toFixed(1)}" text-anchor="start" fill="var(--good)" font-size="9" font-family="ui-monospace, monospace">${(v*100).toFixed(0)}%</text>
      `).join('')}
      <!-- bars -->
      ${buckets.map((b, i) => {
        const cx = padL + bandW * (i + 0.5);
        const wrTop = wrY(b.win_rate);
        const wrBot = wrY(0);
        const roiTop = roiY(Math.max(0, b.roi));
        const roiBot = roiY(Math.min(0, b.roi));
        const roiColor = b.roi >= 0 ? 'var(--good)' : 'var(--bad)';
        return `
          <rect x="${(cx - barW - 1).toFixed(1)}" y="${wrTop.toFixed(1)}"
                width="${barW.toFixed(1)}" height="${(wrBot - wrTop).toFixed(1)}"
                fill="rgba(94,192,255,0.55)" stroke="var(--accent)" stroke-width="0.5">
            <title>${(b.win_rate*100).toFixed(1)}% win-rate, ${b.n_wins}/${b.n_bets}</title>
          </rect>
          <rect x="${(cx + 1).toFixed(1)}" y="${roiTop.toFixed(1)}"
                width="${barW.toFixed(1)}" height="${(roiBot - roiTop).toFixed(1)}"
                fill="${roiColor}" opacity="0.7">
            <title>ROI ${(b.roi*100).toFixed(1)}%, stake $${b.stake}, payout $${b.payout}</title>
          </rect>
          <text x="${cx.toFixed(1)}" y="${(H - padB + 14).toFixed(1)}" text-anchor="middle"
                fill="var(--text)" font-size="10" font-family="ui-monospace, monospace">${b.lo}-${b.hi}</text>
          <text x="${cx.toFixed(1)}" y="${(H - padB + 26).toFixed(1)}" text-anchor="middle"
                fill="var(--muted)" font-size="9">n=${b.n_bets}</text>
        `;
      }).join('')}
      <!-- zero line for ROI bars -->
      <line x1="${padL}" x2="${W - padR}" y1="${roiY(0)}" y2="${roiY(0)}" stroke="var(--muted)" stroke-width="1"/>
      <!-- axis labels -->
      <text x="${(padL + innerW/2).toFixed(1)}" y="${H - 6}" text-anchor="middle" fill="var(--muted)" font-size="10">${t('賠率範圍', 'odds range')}</text>
      <text x="${padL - 28}" y="${padT - 2}" fill="var(--accent)" font-size="9">${t('勝率', 'win-rate')}</text>
      <text x="${W - padR + 6}" y="${padT - 2}" fill="var(--good)" font-size="9">ROI</text>
    </svg>
  `;
}

// "Nice" tick values that span [lo, hi] in N steps, snapped to round numbers.
function niceTicks(lo, hi, n = 4) {
  if (lo === hi) return [lo];
  const range = hi - lo;
  const rawStep = range / n;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  const niceNorm = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
  const step = niceNorm * mag;
  const start = Math.ceil(lo / step) * step;
  const out = [];
  for (let v = start; v <= hi + 1e-9; v += step) out.push(+v.toFixed(8));
  return out;
}

// Bet-strategy mini-card grid — one card per bet strategy with race-day
// coverage, total bets and ROI. Each card carries data-bid (the strategy id)
// and data-bmc-ctx (the calling page, "dash" or "race") so a single click
// handler in wire() can dispatch to the right state field + refresh.
function renderBetMiniCards(list, selectedId, ctx) {
  if (!list || !list.length) return '';
  const lang = state.lang;
  const cards = list.map(b => {
    const label = lang === 'zh' ? (b.name_zh || b.name) : (b.name_en || b.name);
    const roi = b.roi_pct ?? 0;
    const roiCls = roi > 0 ? 'pos' : roi < 0 ? 'neg' : '';
    const sign = roi > 0 ? '+' : '';
    const isSel = b.id == selectedId;
    return `
      <div class="bet-mini-card ${isSel ? 'selected' : ''}"
           data-bid="${b.id}" data-bmc-ctx="${ctx}"
           style="border-left:3px solid ${b.chart_color || 'var(--muted)'}">
        <div class="bmc-name">${escapeHtml(label)}</div>
        <div class="bmc-stats">
          <span class="bmc-cov">${b.race_days || 0} ${t('日', 'd')} · ${b.n_bets || 0} ${t('注', 'bets')}</span>
          <span class="bmc-roi ${roiCls}">${sign}${roi.toFixed(1)}%</span>
        </div>
      </div>`;
  }).join('');
  return `<div class="bet-mini-grid">${cards}</div>`;
}
