  // Strategy chooser (only relevant strategies that have any predictions)
  const stratPicker = `
    <label style="font-size:12px;color:var(--muted)">${t('策略', 'strategy')}:</label>
    <select id="raceStrat">
      <option value="">${t('（無策略過濾,只看結果）', '(no strategy — results only)')}</option>
      ${strategies.map(s => `
        <option value="${s.id}" ${s.id == sid ? 'selected' : ''}>${escapeHtml(s.name)}</option>
      `).join('')}
    </select>
  `;

  // Bet-strategy chooser: when set, highlights the selected strategy's
  // bet_ledger picks instead of the model's flat-top-1 default. Only
  // shown if the model has bet strategies attached.
  const betList = state.raceBetStrategies || [];
  const lang = state.lang;
  const bsid = state.raceBetStrategy || '';
  const betPicker = betList.length ? `
    <label style="font-size:12px;color:var(--muted);margin-left:12px">
      ${t('投注策略', 'bet strategy')}:
    </label>
    <select id="raceBetStrat">
      <option value="">${t('（模型預設 flat top-1）', '(default — flat top-1)')}</option>
      ${betList.map(b => {
        const label = lang === 'zh' ? (b.name_zh || b.name) : (b.name_en || b.name);
        return `<option value="${b.id}" ${b.id == bsid ? 'selected' : ''}>${escapeHtml(label)} · ${b.roi_pct.toFixed(0)}% ROI</option>`;
      }).join('')}
    </select>
  ` : '';

  // Cascading date picker: Year → Month → Race day. Each column is its own
  // scrollable list; later columns are empty until the previous one is chosen.
  const buckets = bucketDatesByYearMonth(dates);
  const years = Object.keys(buckets).sort().reverse();   // newest year first
  const yearBucket = state.raceYear ? buckets[state.raceYear] : null;
  const months = yearBucket ? Object.keys(yearBucket.months).sort().reverse() : [];
  const monthBucket = (yearBucket && state.raceMonth) ? yearBucket.months[state.raceMonth] : null;
  const monthDates = monthBucket ? monthBucket.dates : [];   // already sorted desc by API
  const monthName = (mo, lang) => {
    const zh = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const en = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const i = parseInt(mo, 10) - 1;
    return (lang === 'zh' ? zh : en)[i] ?? mo;
  };

  const datePicker = dates.length ? `
    <div class="date-cascade">
      <div class="cascade-col col-year">
        <div class="cascade-hdr">${t('年', 'Year')}</div>
        <div class="cascade-body">
          ${years.map(yr => {
            const b = buckets[yr];
            const cnt = b.has_pred ? `${b.predicted_total}/${b.races_total}` : `${b.dates.length}`;
            return `
              <span class="date-chip ${yr === state.raceYear ? 'active' : ''} ${b.has_pred ? 'has-pred' : ''}"
                    data-race-year="${yr}"
                    title="${t('場次', 'meetings')}: ${b.dates.length} · ${t('預測', 'predicted')}: ${b.predicted_total}">
                ${yr}<span class="meta">${cnt}</span>
              </span>
            `;
          }).join('')}
        </div>
      </div>

      <div class="cascade-col col-month">
        <div class="cascade-hdr">${t('月', 'Month')}</div>
        <div class="cascade-body">
          ${months.length === 0
            ? `<div class="empty" style="padding:4px 8px;font-size:11px">${t('先選年份', 'select year first')}</div>`
            : months.map(mo => {
                const mb = yearBucket.months[mo];
                const cnt = mb.has_pred ? `${mb.predicted_total}/${mb.races_total}` : `${mb.dates.length}`;
                return `
                  <span class="date-chip ${mo === state.raceMonth ? 'active' : ''} ${mb.has_pred ? 'has-pred' : ''}"
                        data-race-month="${mo}"
                        title="${t('場次', 'meetings')}: ${mb.dates.length} · ${t('預測', 'predicted')}: ${mb.predicted_total}">
                    ${monthName(mo, state.lang)}<span class="meta">${cnt}</span>
                  </span>
                `;
              }).join('')}
        </div>
      </div>

      <div class="cascade-col col-date">
        <div class="cascade-hdr">${t('賽事日', 'Race day')}</div>
        <div class="cascade-body">
          ${monthDates.length === 0
            ? `<div class="empty" style="padding:4px 8px;font-size:11px">${t('先選月份', 'select month first')}</div>`
            : monthDates.map(d => {
                // Year + month already chosen → just show day of month for compactness
                const day = d.date.slice(8, 10);
                const cnt = (d.predicted_races || 0) > 0
                  ? `${d.predicted_races}/${d.races}` : `${d.races}`;
                return `
                  <span class="date-chip ${d.date === state.raceDate ? 'active' : ''} ${(d.predicted_races || 0) > 0 ? 'has-pred' : ''}"
                        data-race-date="${d.date}"
                        title="${d.date} · ${t('場次', 'races')}: ${d.races} · ${t('結果', 'results')}: ${d.results} · ${t('預測', 'predictions')}: ${d.predicted_races || 0}">
                    ${day}<span class="meta">${cnt}</span>
                  </span>
                `;
              }).join('')}
        </div>
      </div>
    </div>
  ` : `<div class="empty">${t('（無賽事日期）', '(no race dates)')}</div>`;

  // Render race blocks
  const racesHtml = (data?.races || []).map(r => renderRaceBlock(r, data, sid)).join('')
    || `<div class="empty">${t('此日無賽事資料', 'no race data for this date')}</div>`;

  // Bets-only summary: one flat table across the meeting showing every horse
  // the strategy would have backed. Only renders when at least one race in the
  // current view has a prediction.
  const strat = (state.strategies || []).find(s => s.id == sid);
  const hasAnyPred = (data?.races || []).some(r => r.has_predictions);
  const betsHtml = (strat && hasAnyPred) ? renderBetsSummary(data, strat) : '';

  // Loading overlay: the SELECTORS (above) update instantly; everything
  // BELOW (bets summary + race blocks) gets dimmed + a spinner while
  // loadRaces() is in flight so the user sees their selection acknowledged.
  const loadingCls = state.racesLoading ? ' is-loading' : '';
  const loadingTxt = t('載入中…', 'loading…');
  main.innerHTML = `
    <div class="panel">
      <h2>${t('賽果', 'Races')} ${state.raceDate ? `· ${state.raceDate}` : ''}</h2>
      <div class="toolbar">
        ${stratPicker}
        ${betPicker}
        <div style="flex:1"></div>
        <span style="font-size:11px;color:var(--muted)">
          ${t('綠色 = 已有該策略預測', 'green = strategy has predictions')}
        </span>
      </div>
      ${datePicker}
    </div>
    <div class="races-loading-wrap${loadingCls}" data-loading-text="${loadingTxt}">
      ${betsHtml}
      ${racesHtml}
    </div>
  `;
  wireRaceControls();
}

function renderBetsSummary(data, strat) {
  const lang = state.lang;
  const fmtPct = (v) => v == null ? '—' : (v * 100).toFixed(1) + '%';
  const fmtNum = (v, dp = 2) => v == null ? '—' : Number(v).toFixed(dp);
  const fmtMoney = (v) => v == null ? '—' : (v >= 0 ? '$' : '-$') + Math.abs(v).toFixed(0);

  // Render mode depends on whether the user selected a bet strategy:
  //   - No bet strategy: one row per (race, horse) using model's default
  //     top-1 rule (legacy path).
  //   - Bet strategy: one row per bet_ledger entry — for exotic combos
  //     this becomes one row per COMBO (showing every brand in the combo)
  //     instead of one row per horse, so a quinella doesn't double-count
  //     the stake.
  const bsMeta = data.bet_strategy;
  return bsMeta
    ? _renderBetsSummaryFromLedger(data, bsMeta, lang)
    : _renderBetsSummaryFromModel(data, strat, lang);
}

function _renderBetsSummaryFromModel(data, strat, lang) {
  const fmtPct = (v) => v == null ? '—' : (v * 100).toFixed(1) + '%';
  const fmtNum = (v, dp = 2) => v == null ? '—' : Number(v).toFixed(dp);
  const fmtMoney = (v) => v == null ? '—' : (v >= 0 ? '$' : '-$') + Math.abs(v).toFixed(0);
  const rows = [];
  let totalStake = 0, totalPnl = 0, settled = 0;
  for (const r of (data.races || [])) {
    if (!r.has_predictions) continue;
    const topBrand = (r.horses || [])
      .filter(h => h.calibrated_prob != null)
      .sort((a, b) => b.calibrated_prob - a.calibrated_prob)[0]?.brand;
    for (const h of (r.horses || [])) {
      const a = analyseHorse(h, strat, lang, h.brand === topBrand);
      if (!a.bet) continue;
      rows.push({ r, h, a });
      if (a.stake != null) totalStake += a.stake;
      if (a.pnl   != null) { totalPnl += a.pnl; settled++; }
    }
  }
  if (rows.length === 0) {
    return `<div class="race-block"><div class="race-hdr">
      <span class="race-num">${t('本日下注', 'Today\'s Bets')}</span>
      <span class="meta">${t('此日無建議下注', 'no recommended bets for this date')}</span>
    </div></div>`;
  }

  const roi = totalStake > 0 ? (totalPnl / totalStake * 100) : null;
  const pnlCls = totalPnl > 0 ? 'pnl-win' : (totalPnl < 0 ? 'pnl-lose' : '');

  const body = rows.map(({ r, h, a }) => {
    const won = h.position == 1 || h.position === '1';
    const placed = h.position && (parseInt(h.position) || 99) <= 3;
    const cls = won ? 'winner' : (placed ? 'placed' : '');
    const reason = lang === 'zh' ? a.reasonZh : a.reasonEn;
    const mkt = h.odds && h.odds > 0 ? 1.0 / h.odds : null;
    const pnlCls = a.pnl == null ? '' : (a.pnl > 0 ? 'pnl-win' : (a.pnl < 0 ? 'pnl-lose' : ''));
    return `
      <tr class="${cls}">
        <td class="num"><b>${escapeHtml(r.course)} R${r.race_no}</b></td>
        <td class="num">${h.position == null ? '—' : escapeHtml(String(h.position))}</td>
        <td class="h-name">${escapeHtml(h.horse_name || '')} <code style="color:var(--muted)">${escapeHtml(h.brand || '')}</code></td>
        <td>${escapeHtml(localiseName(h.jockey, lang, 'jockey'))}</td>
        <td class="num">${h.draw ?? '—'}</td>
        <td class="num">${fmtNum(h.odds, 2)}</td>
        <td class="num">${fmtPct(mkt)}</td>
        <td class="num">${fmtPct(h.calibrated_prob)}</td>
        <td class="num">${h.edge == null ? '—' : fmtNum(h.edge, 2)}</td>
        <td class="num" style="font-family:var(--mono);font-size:11px">${escapeHtml(formatFinishTime(h.finish_time))}</td>
        <td class="bet">✓</td>
        <td class="assessment" title="${escapeHtml(String(reason).replace(/<[^>]+>/g, ''))}">${reason}</td>
        <td class="num">${a.stake == null ? '—' : fmtMoney(a.stake)}</td>
        <td class="num ${pnlCls}">${a.pnl == null ? '—' : fmtMoney(a.pnl)}</td>
      </tr>
    `;
  }).join('');

  return `
    <div class="race-block">
      <div class="race-hdr">
        <span class="race-num">${t('本日下注', 'Today\'s Bets')}</span>
        <span>${rows.length} ${t('注', 'bets')}</span>
        <span>${t('總投注', 'stake')}: ${fmtMoney(totalStake)}</span>
        <span class="${pnlCls}">${t('總盈虧', 'pnl')}: ${settled ? fmtMoney(totalPnl) : '—'}</span>
        ${roi != null && settled ? `<span class="${pnlCls}">${t('回報率', 'ROI')}: ${roi.toFixed(1)}%</span>` : ''}
      </div>
      <div class="race-body">
        <table>
          <thead><tr>
            <th>${t('場次', 'race')}</th>
            <th>${t('實際', 'actual')}</th>
            <th>${t('馬', 'horse')}</th>
            <th>${t('騎師', 'jockey')}</th>
            <th>${t('閘', 'dr')}</th>
            <th>${t('賠率', 'odds')}</th>
            <th>${t('市場', 'mkt p')}</th>
            <th>${t('模型', 'cal p')}</th>
            <th>edge</th>
            <th>${t('時間', 'time')}</th>
            <th>${t('決策', 'bet')}</th>
            <th>${t('評估', 'assessment')}</th>
            <th class="num">${t('投注', 'stake')}</th>
            <th class="num">${t('盈虧', 'pnl')}</th>
          </tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    </div>
  `;
}

// Bets summary keyed by bet_ledger ENTRIES (one row per recorded bet). For
// exotic combos this is one row per ticket showing the full combo —
// avoids the double-counting that happens if we iterate horses for a
// quinella / dutch / trifecta bet.
function _renderBetsSummaryFromLedger(data, bsMeta, lang) {
  const fmtMoney = (v) => v == null ? '—' : (v >= 0 ? '$' : '-$') + Math.abs(v).toFixed(0);
  const items = [];     // {r, bet, comboHtml, won, payout, pnl}
  let totalStake = 0, totalPnl = 0, settled = 0, anyWonCount = 0;
  for (const r of (data.races || [])) {
    for (const bet of (r.bets || [])) {
      const horseByBrand = {};
      for (const h of (r.horses || [])) horseByBrand[h.brand] = h;
      const ordered = String(bet.brand || '').includes('>');
      const sep = ordered ? '>' : ',';
      const parts = String(bet.brand || '').split(sep);
      const arrow = ordered
        ? '<span style="color:var(--muted)"> → </span>'
        : '<span style="color:var(--muted)"> + </span>';
      const comboHtml = parts.map(p => {
        const h = horseByBrand[p];
        if (!h) return `<code>${escapeHtml(p)}</code>`;
        const placed = h.position && (parseInt(h.position) || 99) <= 3;
        const won = h.position == 1 || h.position === '1';
        const tag = won ? '🥇' : (placed ? `(${h.position})` : '');
        return `<span title="${escapeHtml(h.brand)}">${escapeHtml(h.horse_name || h.brand)} ${tag}</span>`;
      }).join(arrow);
      items.push({ r, bet, comboHtml });
      totalStake += bet.stake || 0;
      if (bet.won === 1 || bet.won === 0) {
        settled++;
        totalPnl += bet.pnl || 0;
        if (bet.won === 1) anyWonCount++;
      }
    }
  }
  if (items.length === 0) {
    return `<div class="race-block"><div class="race-hdr">
      <span class="race-num">${t('本日下注', 'Today\'s Bets')}</span>
      <span class="meta">${escapeHtml(bsMeta.name_zh || bsMeta.name)} · ${t('此日無下注', 'no bets this date')}</span>
    </div></div>`;
  }
  const roi = totalStake > 0 ? (totalPnl / totalStake * 100) : null;
  const pnlCls = totalPnl > 0 ? 'pnl-win' : (totalPnl < 0 ? 'pnl-lose' : '');
  // Index post-mortem rows by bet_id for chip rendering.
  const pmByBet = {};
  for (const r of (data.races || [])) {
    for (const pm of (r.post_mortem || [])) {
      if (pm.bet_id != null) pmByBet[pm.bet_id] = pm;
    }
  }
  const body = items.map(({ r, bet, comboHtml }) => {
    const won = bet.won === 1;
    const rowPnlCls = bet.pnl == null ? '' : (bet.pnl > 0 ? 'pnl-win' : (bet.pnl < 0 ? 'pnl-lose' : ''));
    const cls = won ? 'winner' : '';
    // Pick the "primary" horse for the eval-reason fetch — singles use the
    // sole horse; for combos we use the first listed (top-1 in any-order
    // bets, or 1st-placed pick for ordered bets).
    const primaryBrand = String(bet.brand || '').split(/[,>]/)[0] || '';
    const ordered = String(bet.brand || '').includes('>');
    const positions = String(bet.brand || '').split(ordered ? '>' : ',').map(b => {
      const h = (r.horses || []).find(x => x.brand === b);
      return h && h.position != null ? String(h.position) : '?';
    }).join(ordered ? ' → ' : ' / ');
    const pm = pmByBet[bet.id] || null;
    const tagChips = pm && pm.tags && pm.tags.length
      ? '<div class="pm-chips" style="margin-top:4px;display:flex;flex-wrap:wrap;gap:3px">'
        + pm.tags.slice(0, 4).map(tag => {
            const lbl = lang === 'zh' ? tag.label_zh : tag.label_en;
            const desc = lang === 'zh' ? tag.description_zh : tag.description_en;
            const color = tag.severity === 'positive' ? '#1e7b3a'
                       : tag.severity === 'negative' ? '#b3271a'
                       : '#6b7280';
            return `<span class="pm-chip" title="${escapeHtml(desc)}"
              style="background:${color};color:white;font-size:11px;padding:1px 6px;border-radius:4px">
              ${escapeHtml(lbl)}</span>`;
          }).join('')
        + '</div>'
      : '';
    return `
      <tr class="${cls}">
        <td class="num"><b>${escapeHtml(r.course)} R${r.race_no}</b></td>
        <td><span class="pill" style="background:${escapeHtml(bsMeta.chart_color || '#888')};color:white">${escapeHtml(_poolLabel(bet.pool, lang))}</span></td>
        <td class="h-name">${comboHtml}</td>
        <td class="num">${bet.odds_at_bet == null ? '—' : Number(bet.odds_at_bet).toFixed(1)}</td>
        <td class="num">${escapeHtml(positions)}</td>
        <td class="num">${fmtMoney(bet.stake)}</td>
        <td class="num">${fmtMoney(bet.payout)}</td>
        <td class="num ${rowPnlCls}">${fmtMoney(bet.pnl)}</td>
        <td>${won
          ? `<span class="pill good">${t('命中', 'WON')}</span>`
          : (bet.won === 0
              ? `<span class="pill muted">${t('失敗', 'lost')}</span>`
              : `<span class="pill muted">${t('未派彩', 'pending')}</span>`)}</td>
        <td class="assessment small" style="max-width:380px;color:var(--muted)">
          <div class="eval-cell" data-eval-race="${r.id}"
               data-eval-brand="${escapeHtml(primaryBrand)}" data-eval-source="">
            ${t('（載入馬評中…）', '(loading commentary…)')}
          </div>
          ${tagChips}
        </td>
      </tr>`;
  }).join('');
  const ruleLabel = lang === 'zh' ? (bsMeta.name_zh || bsMeta.name)
                                  : (bsMeta.name_en || bsMeta.name);
  return `
    <div class="race-block">
      <div class="race-hdr">
        <span class="race-num">${t('本日下注', 'Today\'s Bets')}</span>
        <span><span class="pill" style="background:${escapeHtml(bsMeta.chart_color || '#888')};color:white">${escapeHtml(ruleLabel)}</span></span>
        <span>${items.length} ${t('注', 'bets')}</span>
        <span>${t('總投注', 'stake')}: ${fmtMoney(totalStake)}</span>
        <span class="${pnlCls}">${t('總盈虧', 'pnl')}: ${settled ? fmtMoney(totalPnl) : '—'}</span>
        ${roi != null && settled ? `<span class="${pnlCls}">${t('回報率', 'ROI')}: ${roi.toFixed(1)}%</span>` : ''}
        ${settled ? `<span class="meta">${anyWonCount}/${settled} ${t('命中', 'wins')}</span>` : ''}
      </div>
      <div class="race-body">
        <table>
          <thead><tr>
            <th>${t('場次', 'race')}</th>
            <th>${t('彩池', 'pool')}</th>
            <th>${t('組合', 'combination')}</th>
            <th class="num">${t('賠率', 'odds')}</th>
            <th class="num">${t('實際名次', 'finish')}</th>
            <th class="num">${t('投注', 'stake')}</th>
            <th class="num">${t('派彩', 'payout')}</th>
            <th class="num">${t('盈虧', 'pnl')}</th>
            <th>${t('結果', 'result')}</th>
            <th>${t('馬評', 'commentary')}</th>
          </tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    </div>
  `;
}

// Shared layman-betting analysis. Used by both the per-race tables AND the

function formatDriverVal(v) {
  if (typeof v !== 'number' || !isFinite(v)) return '—';
  if (Math.abs(v) >= 1) return v.toFixed(2);
  return v.toFixed(3);
}

// HKJC race-meta + pool-name localisation. When language is Chinese the
// race header reads "沙田 / Class 4 → 第四班 / Good → 好" and the dividend
// row shows 連贏 / 位置Q / 順序連贏 / 三重彩 / 四重彩 / 四連環 / 單T
// instead of the English codes.
const _COURSE_ZH = { ST: '沙田', HV: '跑馬地', CH: '從化' };
function _courseLabel(code, lang) {
  if (!code) return '';
  return (lang === 'zh' ? _COURSE_ZH[code] : null) || code;
}
function _classLabel(raw, lang) {
  if (!raw) return '';
  const s = String(raw).trim().toUpperCase();
  if (s.startsWith('G1')) return lang === 'zh' ? '一級賽 (G1)' : 'G1';
  if (s.startsWith('G2')) return lang === 'zh' ? '二級賽 (G2)' : 'G2';
  if (s.startsWith('G3')) return lang === 'zh' ? '三級賽 (G3)' : 'G3';
  if (s.indexOf('LISTED') >= 0) return lang === 'zh' ? '表列賽' : 'Listed';
  const m = s.replace('CLASS', '').replace('C', '').trim();
  const n = parseInt(parseFloat(m));
  if (n >= 1 && n <= 5) {
    return lang === 'zh' ? `第 ${n} 班` : `Class ${n}`;
  }
  return raw;
}
function _goingLabel(raw, lang) {
  if (!raw) return '';
  const s = String(raw).trim();
  if (lang !== 'zh') return s;
  const map = {
    'Good': '好', 'Good To Yielding': '好至黏軟', 'Good To Firm': '好至快',
    'Yielding': '黏軟', 'Soft': '軟', 'Heavy': '大爛',
    'Fast': '快', 'Wet Fast': '濕快', 'Wet Slow': '濕慢',
    'Sloppy': '泥濘', 'Muddy': '爛地', 'Frozen': '凍地',
  };
  return map[s] || s;
}
const _POOL_ZH = {
  'WIN': '獨贏', 'PLACE': '位置', 'QIN': '連贏', 'QPL': '位置Q',
  'EXA': '順序連贏', 'TRI': '三重彩', 'TRIO': '單T',
  'F4': '四重彩', 'QTT': '四連環',
  'CWA': 'CWA', 'CWB': 'CWB', 'CWC': 'CWC', 'IWN': 'IWN',
};
function _poolLabel(pool, lang) {
  if (!pool) return '';
  return (lang === 'zh' ? _POOL_ZH[pool] : null) || pool;
}

// Bidirectional jockey / trainer name lookup. The DB stores whichever
// language HKJC's results page happened to use at scrape time — some
// races came back English ("Z Purton", "D J Hall"), others Chinese
// ("潘頓", "賀賢"). Auto-detect by checking for any CJK code-point in
// the input, then map to the requested side using the lazily-built
// reverse map.
const _JOCKEY_ZH_EN = Object.fromEntries(
  Object.entries(JOCKEY_EN_ZH).map(([en, zh]) => [zh, en])
);
const _TRAINER_ZH_EN = Object.fromEntries(
  Object.entries(TRAINER_EN_ZH).map(([en, zh]) => [zh, en])
);
const _CJK_RE = /[一-鿿]/;
function localiseName(name, lang, kind) {
  if (!name) return '';
  const core = String(name).split('(')[0].trim();  // strip overweight markers
  const isCJK = _CJK_RE.test(core);
  // Caller wants Chinese
  if (lang === 'zh') {
    if (isCJK) return name;  // already CJK — pass through
    const map = kind === 'jockey' ? JOCKEY_EN_ZH : TRAINER_EN_ZH;
    return map[core] || name;
  }
  // Caller wants English
  if (!isCJK) return name;  // already English — pass through
  const rev = kind === 'jockey' ? _JOCKEY_ZH_EN : _TRAINER_ZH_EN;
  return rev[core] || name;
}
function formatFinishTime(v) {
  if (v == null || v === '') return '';
  const n = typeof v === 'number' ? v : parseFloat(String(v));
  if (!isFinite(n)) return String(v);
  return n.toFixed(2);
}
function analyseHorse(h, strat, lang, isTopPick) {
  if (!strat || h.calibrated_prob == null || h.odds == null) {
    return { bet: false, reasonZh: '—', reasonEn: '—', stake: null, pnl: null };
  }
  const p = h.calibrated_prob, o = h.odds;
  const edgeV = p * o;
  const minP = strat.min_prob ?? 0.05;
  const minO = strat.bet_min_odds ?? 2.5;
  const maxO = strat.bet_max_odds ?? 25;

  // Rule: every race bets on its top-edge horse. The non-top-edge gate is the
  // only blocker — safety rails (min/max odds, min prob) are advisory under
  // this strategy and don't veto the bet.
  const blocks = [];
  if (!isTopPick) blocks.push({ zh: '非本場最高 edge — 每場只下注 edge 最高的馬', en: 'not top edge — one bet per race rule (highest prob × odds)' });

  const drivers = h.feature_drivers || { top: [], bottom: [] };
  const driverLine = (arr, arrow) => arr.map(d => {
    const nm = lang === 'zh' ? d.name_zh : d.name_en;
    const num = (typeof d.value === 'number' && typeof d.field_mean === 'number')
      ? ` (${formatDriverVal(d.value)} vs ${formatDriverVal(d.field_mean)})`
      : '';
    return `${arrow}${String(nm ?? '')}${num}`;
  }).join('、');

  // Assessment cells: just the top tailwind + top headwind in layman
  // terms. The Skip/Bet preamble and the long multi-driver list were
  // noise — _laymanDrivers caps at one per side for scannability.
  const reasonZh = _laymanDrivers(h, 'zh');
  const reasonEn = _laymanDrivers(h, 'en');
  if (blocks.length) {
    return { bet: false, reasonZh, reasonEn, stake: null, pnl: null };
  }

  const kellyF = (p * o - 1) / (o - 1);
  const kFrac = strat.kelly_fraction ?? 0.25;
  const bankCap = (strat.kelly_max_bankroll_pct ?? 0.05) * RACE_BANKROLL;
  const rawStake = kFrac === 0 ? bankCap : Math.max(0, kellyF * kFrac * RACE_BANKROLL);
  const stake = Math.min(rawStake, bankCap);
  let pnl = null;
  const posInt = parseInt(h.position);
  if (h.position != null && !Number.isNaN(posInt)) {
    pnl = posInt === 1 ? stake * (o - 1) : -stake;
  } else if (h.position != null) {
    pnl = 0;
  }
  const mktPct = (1 / o * 100).toFixed(1);
  const modelPct = (p * 100).toFixed(1);
  const driversZh = [
    drivers.top.length    ? `上揚因素：${driverLine(drivers.top, '↑')}`    : '',
    drivers.bottom.length ? `下挫因素：${driverLine(drivers.bottom, '↓')}` : '',
  ].filter(Boolean).join(' · ');
  const driversEn = [
    drivers.top.length    ? `Tailwinds: ${driverLine(drivers.top, '↑')}`    : '',
    drivers.bottom.length ? `Headwinds: ${driverLine(drivers.bottom, '↓')}` : '',
  ].filter(Boolean).join(' · ');
  // Same simplification for bet rows: drop the "Bet — model 36% vs
  // market 11% edge 4.1×" preamble. The bet tick column already conveys
  // "this is the bet"; the assessment text is just the top tailwind +
  // top headwind in layman terms.
  return {
    bet: true,
    reasonZh,
    reasonEn,
    stake, pnl,
  };
}

// When a bet strategy is selected on the Races page we don't run the JS
// decision logic — the server-side bet_runner already produced the
// bet_ledger. This helper takes a horse + the race's ledger rows + the
// bet-strategy meta and returns {bet, reasonZh/En, stake, pnl}.
//
// Reasons are PURE layman drivers (top tailwind / top headwind) for every
// horse — the bet tick column already conveys "this is the bet"; the
// "非 X 投注 / not bet by X" label was noise and is dropped.
function _analyseFromLedger(h, ledgerBets, bsMeta, lang) {
  // Always compute the layman driver line (top 1 tailwind, top 1 headwind).
  const reasonZh = _laymanDrivers(h, 'zh');
  const reasonEn = _laymanDrivers(h, 'en');

  const involved = ledgerBets.filter(b => {
    for (const part of String(b.brand || '').split(/[,>]/)) {
      if (part === h.brand) return true;
    }
    return false;
  });
  if (!involved.length) {
    return { bet: false, reasonZh, reasonEn, stake: null, pnl: null };
  }
  // Sum stake/pnl across all bets this horse is part of.
  let stake = 0, pnl = 0;
  for (const b of involved) {
    stake += (b.stake || 0);
    pnl += (b.pnl || 0);
  }
  return { bet: true, reasonZh, reasonEn, stake, pnl };
}

// Auto-load 馬評 commentary for every .eval-cell currently in the DOM.
// Fans out 3-wide so DeepSeek isn't hammered; the server-side cache makes
// repeats free. The source flag is recorded on the cell (data-eval-source
// attr) but NOT displayed — user wants the text only.
async function _autoLoadEvalCells() {
  const cells = Array.from(document.querySelectorAll('.eval-cell[data-eval-race]'));
  if (!cells.length) return;
  const lang = state.lang || 'zh';
  const CONCURRENCY = 3;
  let i = 0;
  async function worker() {
    while (i < cells.length) {
      const cell = cells[i++];
      const rid = cell.dataset.evalRace;
      const brand = cell.dataset.evalBrand;
      if (!rid || !brand) continue;
      try {
        const r = await api(`/api/horse_eval/${rid}/${encodeURIComponent(brand)}?lang=${lang}`);
        cell.dataset.evalSource = r.source || '';
        cell.style.color = 'var(--text)';
        cell.textContent = r.text;
      } catch (e) {
        cell.style.color = 'var(--muted)';
        cell.textContent = '(' + (e.message || 'eval load failed') + ')';
      }
    }
  }
  await Promise.all(Array.from({length: CONCURRENCY}, () => worker()));
}

// Driver line per horse — lists EVERY tailwind and headwind the backend
// returned (currently up to 3 each), with each factor's strength
// normalised to an integer score in [-9, +9] for at-a-glance comparison.
//
// The raw `z` is the field-relative standardised score (this horse's
// feature value minus race field mean / race field stdev). Typical
// z-scores fall in [-3, +3]; we map z=3 → +9 (max) by multiplying ×3
// and clamping. That keeps the number space tidy and visually
// comparable across rows without exposing raw decimals.
//
// Returns RAW HTML (consumers must NOT escapeHtml it). The ↑ 上揚 /
// Tailwinds prefix is wrapped in a green span and the ↓ 下挫 /
// Headwinds prefix in a red span — labels only, factor text stays the
// default cell colour.
function _laymanDrivers(h, lang) {
  const drivers = h.feature_drivers || { top: [], bottom: [] };
  if (!drivers.top.length && !drivers.bottom.length) return '—';
  const fmt = (d) => {
    const nm = lang === 'zh' ? (d.name_zh || d.name_en || d.feature_id)
                             : (d.name_en || d.name_zh || d.feature_id);
    let score = 0;
    if (typeof d.z === 'number' && isFinite(d.z)) {
      score = Math.max(-9, Math.min(9, Math.round(d.z * 3)));
    }
    const sign = score > 0 ? '+' : '';
    return `${escapeHtml(String(nm))} (${sign}${score})`;
  };
  const topAll = drivers.top.map(fmt);
  const botAll = drivers.bottom.map(fmt);
  const upLabel = lang === 'zh' ? '↑ 上揚' : '↑ Tailwinds';
  const dnLabel = lang === 'zh' ? '↓ 下挫' : '↓ Headwinds';
  const parts = [];
  if (topAll.length) {
    parts.push(`<span style="color:#4dd17a;font-weight:600">${upLabel}:</span> ${topAll.join(', ')}`);
  }
  if (botAll.length) {
    parts.push(`<span style="color:#f06262;font-weight:600">${dnLabel}:</span> ${botAll.join(', ')}`);
  }
  return parts.join(' · ');
}

function renderRaceBlock(r, data, sid) {
  const fmtPct = (v) => v == null ? '—' : (v * 100).toFixed(1) + '%';
  const fmtNum = (v, dp = 2) => v == null ? '—' : Number(v).toFixed(dp);
  const fmtMoney = (v) => v == null ? '—' : (v >= 0 ? '$' : '-$') + Math.abs(v).toFixed(0);
  const strat = (state.strategies || []).find(s => s.id == sid);

  // If user selected a bet strategy, the server has attached r.bets — the
  // actual recorded bet_ledger picks. Otherwise fall back to the model's
  // default "top calibrated_prob" rule via analyseHorse.
  const bsMeta = data.bet_strategy;
  const ledgerBets = r.bets || [];
  // Build a set of "bet brands" across all combos (split exotics on , or >)
  const betBrands = new Set();
  for (const b of ledgerBets) {
    for (const part of String(b.brand || '').split(/[,>]/)) {
      if (part) betBrands.add(part);
    }
  }

  // Default-rule pick (used when no bet strategy selected): top calibrated_prob.
  const topBrand = (r.horses || [])
    .filter(h => h.calibrated_prob != null)
    .sort((a, b) => b.calibrated_prob - a.calibrated_prob)[0]?.brand;
  const analyse = (h) => {
    if (bsMeta) {
      // Override: this horse is a bet iff it appears in bet_ledger for this race.
      return _analyseFromLedger(h, ledgerBets, bsMeta, state.lang);
    }
    return analyseHorse(h, strat, state.lang, h.brand === topBrand);
  };

  const lang = state.lang;
  const dividends = (data.dividends || []).filter(d => d.course === r.course && d.race_no === r.race_no);
  const divChunks = dividends.map(d =>
    `<span><b>${escapeHtml(_poolLabel(d.pool, lang))}</b> ${escapeHtml(d.combination)}: $${d.dividend}</span>`
  );

  // Predicted rank = position the model gave this horse (1 = top pick),
  // computed per race over horses that have a calibrated_prob. Horses
  // without a prediction get null.
  const predRank = {};
  const ranked = (r.horses || [])
    .filter(h => h.calibrated_prob != null)
    .sort((a, b) => b.calibrated_prob - a.calibrated_prob);
  ranked.forEach((h, i) => { predRank[h.brand] = i + 1; });
  return `
    <div class="race-block">
      <div class="race-hdr">
        <span class="race-num">${escapeHtml(_courseLabel(r.course, lang))} R${r.race_no}</span>
        <span>${r.distance}${lang === 'zh' ? '米' : 'm'}</span>
        <span>${escapeHtml(_classLabel(r.class, lang))}</span>
        <span>${escapeHtml(_goingLabel(r.going, lang))}</span>
        ${r.post_time ? `<span class="meta">${escapeHtml(r.post_time)}</span>` : ''}
        ${r.race_name ? `<span class="meta">${escapeHtml(r.race_name)}</span>` : ''}
        ${r.has_predictions ? `<span class="pill good">${t('已預測', 'predicted')}</span>` : ''}
        ${r.has_results ? `<span class="pill muted">${t('已完賽', 'finished')}</span>` : ''}
      </div>
      <div class="race-body">
        <table>
          <thead><tr>
            <th>${t('實際', 'actual')}</th>
            <th>${t('預測', 'pred')}</th>
            <th>${t('馬', 'horse')}</th>
            <th>${t('騎師', 'jockey')}</th>
            <th>${t('練馬師', 'trainer')}</th>
            <th>${t('閘', 'dr')}</th>
            <th>${t('賠率', 'odds')}</th>
            <th>${t('市場', 'mkt p')}</th>
            <th>${t('模型', 'cal p')}</th>
            <th>edge</th>
            <th>${t('時間', 'time')}</th>
            <th>${t('頭馬距離', 'lbw')}</th>
            <th>${t('沿途走位', 'running')}</th>
            <th>${t('決策', 'bet')}</th>
            <th>${t('評估', 'assessment')}</th>
            <th class="num">${t('投注', 'stake')}</th>
            <th class="num">${t('盈虧', 'pnl')}</th>
          </tr></thead>
          <tbody>${(r.horses || []).map(h => {
            const won = h.position == 1 || h.position === '1';
            const placed = h.position && (parseInt(h.position) || 99) <= 3;
            const cls = won ? 'winner' : (placed ? 'placed' : '');
            const a = analyse(h);
            const reason = lang === 'zh' ? a.reasonZh : a.reasonEn;
            const mkt = h.odds && h.odds > 0 ? 1.0 / h.odds : null;
            const pnlCls = a.pnl == null ? '' : (a.pnl > 0 ? 'pnl-win' : (a.pnl < 0 ? 'pnl-lose' : ''));
            // Visual tag for prediction quality: green if model's top pick
            // won, blue if winner was in model's top-3, plain otherwise.
            const pr = predRank[h.brand];
            const isActualWinner = won;
            const isTopPick = pr === 1;
            const predCls = pr == null ? '' :
              (isActualWinner && isTopPick) ? 'pred-hit' :
              (isActualWinner && pr <= 3)   ? 'pred-near' : '';
            const lbwTxt = h.lbw == null || h.lbw === ''
              ? (h.position === 1 || h.position === '1' ? '—' : '')
              : escapeHtml(String(h.lbw));
            const runTxt = escapeHtml(String(h.running_style || h.running || '').trim() || '');
            return `
              <tr class="${cls}">
                <td class="num">${h.position == null ? '—' : escapeHtml(String(h.position))}</td>
                <td class="num ${predCls}">${pr == null ? '—' : pr}</td>
                <td class="h-name">${escapeHtml(h.horse_name || '')} <code style="color:var(--muted)">${escapeHtml(h.brand || '')}</code></td>
                <td>${escapeHtml(localiseName(h.jockey, lang, 'jockey'))}</td>
                <td>${escapeHtml(localiseName(h.trainer, lang, 'trainer'))}</td>
                <td class="num">${h.draw ?? '—'}</td>
                <td class="num">${fmtNum(h.odds, 2)}</td>
                <td class="num">${fmtPct(mkt)}</td>
                <td class="num">${fmtPct(h.calibrated_prob)}</td>
                <td class="num">${h.edge == null ? '—' : fmtNum(h.edge, 2)}</td>
                <td class="num" style="font-family:var(--mono);font-size:11px">${escapeHtml(formatFinishTime(h.finish_time))}</td>
                <td class="num small">${lbwTxt}</td>
                <td class="small" style="font-family:var(--mono)">${runTxt}</td>
                <td class="${a.bet ? 'bet' : ''}">${a.bet ? '✓' : ''}</td>
                <td class="assessment" title="${escapeHtml(String(reason).replace(/<[^>]+>/g, ''))}">${reason}</td>
                <td class="num">${a.stake == null ? '—' : fmtMoney(a.stake)}</td>
                <td class="num ${pnlCls}">${a.pnl == null ? '—' : fmtMoney(a.pnl)}</td>
              </tr>
            `;
          }).join('')}</tbody>
        </table>
      </div>
      ${divChunks.length ? `<div class="dividends">${divChunks.join('')}</div>` : ''}
    </div>
  `;
}

function wireRaceControls() {
  const sel = document.getElementById('raceStrat');
  if (sel) sel.addEventListener('change', () => {
    state.raceStrategy = sel.value === '' ? null : parseInt(sel.value);
    state.raceBetStrategy = null;    // new model = stale bet selection
    saveUi({ raceStrategy: state.raceStrategy, raceBetStrategy: null });
    loadRaces();
  });
  const betSel = document.getElementById('raceBetStrat');
  if (betSel) betSel.addEventListener('change', () => {
    state.raceBetStrategy = betSel.value === '' ? null : parseInt(betSel.value);
    saveUi({ raceBetStrategy: state.raceBetStrategy });
    loadRaces();
  });
  // 馬評 commentary: lazy-fetch DeepSeek (or rule-based) text in place of
  // the placeholder. First call may take ~3s when DeepSeek is invoked;
  // subsequent calls are cached server-side.
  // Auto lazy-fetch the 馬評 for every visible bet row. We fan out at most
  // 3 in flight at a time so we don't hammer DeepSeek; the backend cache
  // makes repeat renders instant. If a cached entry is rule-based and
  // DeepSeek is configured server-side, /api/horse_eval upgrades it
  // automatically (silent — no badge, no button per user request).
  _autoLoadEvalCells();
  // Year click: clear month + date so the user makes a fresh choice; render
  // only (no API call) since the month list comes from data we already have.
  document.querySelectorAll('[data-race-year]').forEach(el => {
    el.addEventListener('click', () => {
      state.raceYear = el.dataset.raceYear;
      state.raceMonth = null;
      state.raceDate = null;
      state.raceData = null;
      saveUi({ raceYear: state.raceYear, raceMonth: null, raceDate: null });
      render();
    });
  });
  // Month click: clear date; render only.
  document.querySelectorAll('[data-race-month]').forEach(el => {
    el.addEventListener('click', () => {
      state.raceMonth = el.dataset.raceMonth;
      state.raceDate = null;
      state.raceData = null;
      saveUi({ raceMonth: state.raceMonth, raceDate: null });
      render();
    });
  });
  // Date click: this is the only one that needs the server fetch.
  document.querySelectorAll('[data-race-date]').forEach(el => {
    el.addEventListener('click', () => {
      state.raceDate = el.dataset.raceDate;
      saveUi({ raceDate: state.raceDate });
      loadRaces();
    });
  });
}

function renderFeatures() {
  const main = document.getElementById('main');
  const lang = state.lang;
  const q = (state.featSearch || '').trim().toLowerCase();
  const cats = state.features?.categories || [];
  const biblioItems = state.bibliography?.items || [];

  const filterFeat = (f) => {
    if (!q) return true;
    const hay = [f.id, f[`name_${lang}`], f[`display_name_${lang}`], f.description_zh,
                 f.description_en, f.notes_zh, f.notes_en, (f.all_sources || []).join(' ')]
      .filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  };

  const tabs = `
    <div class="toolbar" style="border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px">
      <button class="btn ${state.featTab === 'catalog' ? '' : 'ghost'}" data-feat-tab="catalog">${t('特徵目錄', 'Catalog')} · ${state.features?.total ?? 0}</button>
      <button class="btn ${state.featTab === 'bibliography' ? '' : 'ghost'}" data-feat-tab="bibliography">${t('文獻', 'Bibliography')} · ${biblioItems.length}</button>
    </div>
  `;

  if (state.featTab === 'bibliography') {
    main.innerHTML = `
      <div class="panel">
        <h2>${t('文獻', 'Bibliography')} · ${biblioItems.length} ${t('條', 'sources')}</h2>
        ${tabs}
        ${biblioItems.map(b => `
          <div class="biblio-row">
            <span class="bid">${b.id}</span>
            <span class="author">${escapeHtml(b.author || '')}</span>
            ${b.year ? `<span class="year">(${b.year})</span>` : ''}
            <div class="title">${escapeHtml(b.title || '')}</div>
            ${b.url ? `<a href="${escapeHtml(b.url)}" target="_blank" rel="noopener">${escapeHtml(b.url)}</a>` : ''}
          </div>
        `).join('')}
      </div>
    `;
    wireFeatureControls();
    return;
  }

  // Default category to the first one with features, the first time the user opens this tab.
  if (state.featCat == null && cats.length) {
    state.featCat = cats[0].id;
    saveUi({ featCat: state.featCat });
  }
  // Search mode: when there's a query we show matches across ALL categories
  // (overriding the active category). Counts in the tab strip update too.
  const isSearch = !!q;

  // Per-category match counts so the tabs show "12. 交互特徵 (3)" when filtering
  const catCounts = {};
  for (const cat of cats) {
    catCounts[cat.id] = cat.features.filter(filterFeat).length;
  }

  // Build the tab strip — one tab per category, with optional match-count badge
  const catTabs = `
    <div class="cat-tabs">
      ${cats.map(cat => {
        const matched = catCounts[cat.id];
        const isActive = !isSearch && cat.id === state.featCat;
        const showZero = isSearch && matched === 0;
        return `
          <button class="cat-tab ${isActive ? 'active' : ''} ${showZero ? 'dim' : ''}"
                  data-feat-cat="${cat.id}"
                  title="${cat.count} ${t('項特徵', 'features')}${isSearch ? ' · ' + matched + ' ' + t('符合', 'matches') : ''}">
            ${escapeHtml(cat[`name_${lang}`])}
          </button>
        `;
      }).join('')}
    </div>
  `;

  // Decide which categories' cards to render
  let activeCats;
  if (isSearch) {
    activeCats = cats.map(cat => ({ ...cat, features: cat.features.filter(filterFeat) }))
                     .filter(c => c.features.length > 0);
  } else {
    const active = cats.find(c => c.id === state.featCat) || cats[0];
    activeCats = active ? [active] : [];
  }

  const grids = activeCats.map(cat => `
    ${isSearch ? `<h3 class="cat-grid-hdr">${cat.id}. ${escapeHtml(cat[`name_${lang}`])} <span class="cat-count">${cat.features.length}</span></h3>` : ''}
    <div class="feature-grid">
      ${cat.features.map(f => renderFeatureCard(f, lang)).join('')}
    </div>
  `).join('');

  main.innerHTML = `
    <div class="panel">
      <h2>${t('特徵目錄', 'Feature catalog')} · ${state.features?.total ?? 0} ${t('項特徵, 共', 'features in')} ${cats.length} ${t('類別', 'categories')}</h2>
      ${tabs}
      <div class="toolbar">
        <input class="feature-search" id="featSearch" placeholder="${t('搜尋名稱、id、來源、內容…', 'search by name, id, source, content…')}" value="${escapeHtml(q)}">
        <button id="featExpandAll" class="btn ghost">${t('全部展開', 'expand all')}</button>
        <button id="featCollapseAll" class="btn ghost">${t('全部收起', 'collapse all')}</button>
      </div>
      ${cats.length === 0
        ? `<div class="empty">${t('（載入中…）', '(loading…)')}</div>`
        : catTabs + grids}
      ${isSearch && activeCats.length === 0 ? `<div class="empty">${t('（無符合搜尋的特徵）', '(no features match the search)')}</div>` : ''}
    </div>
  `;
  wireFeatureControls();
}

function renderFeatureCard(f, lang) {
  const primary = (f.sources_expanded || [])[0];
  const sources = f.sources_expanded || [];
  const enabled = f.enabled_default
    ? ''
    : `<span class="pill muted">${t('停用', 'disabled')}</span>`;
  const notes = f[`notes_${lang}`];
  const hasNotes = !!notes;
  const hasSources = sources.length > 0;
  // Show the chevron whenever there's anything to reveal (notes OR source links).
  const hasCollapsibleContent = hasNotes || hasSources;
  const open = state.featOpen.has(f.id);
  return `
    <div class="feature-card ${open ? 'open' : ''}" data-fid="${f.id}">
      <div class="fc-head">
        <span class="fid">${f.id}</span>
        <span class="name">${escapeHtml(f[`name_${lang}`])}</span>
        ${primary ? `<span class="src" title="${escapeHtml(primary.title || '')}">${escapeHtml(primary.compact || primary.id)}</span>` : ''}
        ${enabled}
        ${hasCollapsibleContent ? `
          <button class="fc-toggle" data-feat-toggle="${f.id}"
                  title="${open ? t('收起', 'collapse') : t('展開詳細', 'expand details')}">${open ? '▴' : '▾'}</button>
        ` : ''}
      </div>
      <div class="fc-desc">${escapeHtml(f[`description_${lang}`] || '')}</div>
      ${hasNotes ? `<div class="fc-notes">${escapeHtml(notes)}</div>` : ''}
      ${hasSources ? `
        <div class="fc-sources">
          ${sources.map(s => `
            <a href="${escapeHtml(s.url || '#')}" target="_blank" rel="noopener" title="${escapeHtml(s.title || '')}">
              ${s.id} · ${escapeHtml(s.compact || '')}
            </a>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
}


function wireFeatureControls() {
  // catalog / bibliography sub-tab
  document.querySelectorAll('[data-feat-tab]').forEach(el => {
    el.addEventListener('click', () => {
      state.featTab = el.dataset.featTab;
      saveUi({ featTab: state.featTab });
      render();
    });
  });
  // per-category tab
  document.querySelectorAll('[data-feat-cat]').forEach(el => {
    el.addEventListener('click', () => {
      state.featCat = parseInt(el.dataset.featCat);
      saveUi({ featCat: state.featCat });
      render();
    });
  });
  // per-card collapse toggle (chevron in upper right)
  document.querySelectorAll('[data-feat-toggle]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const fid = el.dataset.featToggle;
      if (state.featOpen.has(fid)) state.featOpen.delete(fid);
      else state.featOpen.add(fid);
      saveUi({ featOpen: [...state.featOpen] });
      // Lightweight: toggle class + flip arrow without a full re-render
      const card = document.querySelector(`.feature-card[data-fid="${fid}"]`);
      if (card) card.classList.toggle('open');
      el.textContent = state.featOpen.has(fid) ? '▴' : '▾';
      el.title = state.featOpen.has(fid) ? t('收起', 'collapse') : t('展開詳細', 'expand details');
    });
  });
  // expand all / collapse all (operate on whatever the current view shows)
  const eAll = document.getElementById('featExpandAll');
  if (eAll) eAll.addEventListener('click', () => {
    (state.features?.categories || []).forEach(cat =>
      cat.features.forEach(f => state.featOpen.add(f.id)));
    saveUi({ featOpen: [...state.featOpen] });
    render();
  });
  const cAll = document.getElementById('featCollapseAll');
  if (cAll) cAll.addEventListener('click', () => {
    state.featOpen.clear();
    saveUi({ featOpen: [] });
    render();
  });
  // search box (debounced)
  const fs = document.getElementById('featSearch');
  if (fs) {
    let timer = null;
    fs.addEventListener('input', (e) => {
      clearTimeout(timer);
      const v = e.target.value;
      timer = setTimeout(() => {
        state.featSearch = v;
        saveUi({ featSearch: v });
        render();
      }, 150);
    });
    fs.focus();
    const v = fs.value; fs.setSelectionRange(v.length, v.length);
  }
}

function renderSchema() {
  const main = document.getElementById('main');
  const tables = state.schemaInfo?.tables || {};

    <div class="panel">
      <h2>${t('資料庫結構', 'DB schema')} · ${escapeHtml(state.schemaInfo?.db_path || '')}</h2>
      ${Object.keys(tables).length === 0 ? `<div class="empty">${t('（無資料表）', '(none)')}</div>` : `
        <table>
          <thead><tr><th>${t('資料表', 'table')}</th><th>${t('筆數', 'rows')}</th></tr></thead>
          <tbody>${Object.entries(tables).map(([name, n]) => `
            <tr><td><code>${escapeHtml(name)}</code></td><td class="num">${n.toLocaleString()}</td></tr>
          `).join('')}</tbody>
        </table>
      `}
    </div>

// ─── Event wiring ───────────────────────────────────────────────────────────
function wire() {
  const loginBtn = document.getElementById('loginBtn');
  if (loginBtn) {
    // Lang toggle in the login view (header doesn't exist yet).
    document.querySelectorAll('.login [data-lang]').forEach(el => {
      el.addEventListener('click', () => {
        state.lang = el.dataset.lang;
        saveUi({ lang: state.lang });
        render();
      });
    });
    const pw = document.getElementById('pw');
    const err = document.getElementById('loginErr');
    const remember = document.getElementById('rememberPw');
    const submit = async () => {
      try {
        await login(pw.value);
        // Persist (or clear) the password depending on the checkbox.
        if (remember && remember.checked) {
          saveUi({ rememberedPw: pw.value });
        } else {
          saveUi({ rememberedPw: null });
        }
        pushLog(`[auth] ${t('登入成功', 'login ok')}`);
        connectWs();
        switchTab(state.tab || 'dashboard');
      } catch (e) { err.textContent = e.message; }
    };
    loginBtn.addEventListener('click', submit);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    return;
  }
  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) logoutBtn.addEventListener('click', logout);
  // Global language toggle lives in the header — works on every tab.
  document.querySelectorAll('header [data-lang]').forEach(el => {
    el.addEventListener('click', () => {
      state.lang = el.dataset.lang;
      saveUi({ lang: state.lang });
      render();
    });
  });
  document.querySelectorAll('nav button[data-tab]').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });
  const ksToggle = document.getElementById('ksToggle');
  if (ksToggle) ksToggle.addEventListener('click', toggleKillSwitch);
  const lmToggle = document.getElementById('lmToggle');
  if (lmToggle) lmToggle.addEventListener('click', toggleLiveMode);

  // Bet-strategies panel wire-up: toggle = enable/disable + reload curves,
  // delete = wipe ledger + remove, add form = POST a new bet strategy and
  // immediately run it.
  document.querySelectorAll('.bet-toggle').forEach(cb => {
    cb.addEventListener('change', () => toggleBetStrategy(parseInt(cb.dataset.bid), cb.checked));
  });
  document.querySelectorAll('.bet-delete').forEach(btn => {
    btn.addEventListener('click', () => deleteBetStrategy(parseInt(btn.dataset.bid)));
  });
  const af2 = document.getElementById('betStrategyAddForm');
  if (af2) af2.addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(af2);
    const body = {
      name: fd.get('name'),
      name_en: fd.get('name_en') || undefined,
      name_zh: fd.get('name_zh') || undefined,
      rule_kind: fd.get('rule_kind'),
      chart_color: fd.get('chart_color'),
    };
    try { body.params = fd.get('params') ? JSON.parse(fd.get('params')) : {}; }
    catch (err) { alert('Invalid JSON in params: ' + err); return; }
    createBetStrategy(body);
  });
  document.querySelectorAll('[data-strat]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      loadStrategyDetail(parseInt(el.dataset.strat));
    });
  });
  const af = document.getElementById('auditFrom');
  if (af) af.addEventListener('change', e => {
    state.auditFrom = e.target.value; saveUi({ auditFrom: state.auditFrom });
  });
  const at = document.getElementById('auditTo');
  if (at) at.addEventListener('change', e => {
    state.auditTo = e.target.value; saveUi({ auditTo: state.auditTo });
  });
  const runAudit = document.getElementById('runAudit');
  if (runAudit) runAudit.addEventListener('click',
    () => runStrategyAudit(state.selectedStrategy.id));
  document.querySelectorAll('[data-run]').forEach(el => {
    el.addEventListener('click', () => {
      const slug = el.dataset.run;
      const argvEl = document.querySelector(`[data-argv-slug="${slug}"]`);
      const argv = (argvEl?.value || '').split(/\s+/).filter(Boolean);
      runScraper(slug, argv);
    });
  });
  document.querySelectorAll('[data-sched-run]').forEach(el => {
    el.addEventListener('click', async () => {
      const id = el.dataset.schedRun;
      try {
        const r = await api(`/api/schedules/${id}/run`, { method: 'POST' });
        pushLog(`[sched ${id.slice(0,6)}] ${r.status} ${r.reason || ''}`);
      } catch (e) { pushLog(`[sched ${id.slice(0,6)}] error: ${e.message}`); }
    });
  });
  document.querySelectorAll('[data-sched-del]').forEach(el => {
    el.addEventListener('click', async () => {
      if (!confirm('Delete this schedule?')) return;
      await api(`/api/schedules/${el.dataset.schedDel}`, { method: 'DELETE' });
      loadSchedules();
    });
  });
  const createSched = document.getElementById('createSched');
  if (createSched) createSched.addEventListener('click', async () => {
    const body = {
      name: document.getElementById('schedName').value.trim(),
      cron: document.getElementById('schedCron').value.trim(),
      action: document.getElementById('schedAction').value.trim(),
      args: (() => {
        try { return JSON.parse(document.getElementById('schedArgs').value || '{}'); }
        catch { return {}; }
      })(),
      enabled: true,
    };
    if (!body.name || !body.cron || !body.action) return alert('name, cron, action required');
    try {
      await api('/api/schedules', { method: 'POST', body: JSON.stringify(body) });
      loadSchedules();
    } catch (e) { alert(`create failed: ${e.message}`); }
  });
}

function switchTab(tab) {
  state.tab = tab;
  saveUi({ tab });
  render();
  if (tab === 'dashboard')  loadDashboard();
  if (tab === 'strategies') loadStrategies();
  if (tab === 'races')      loadRaces();
  if (tab === 'features')   loadFeatures();
  if (tab === 'scrapers')   loadScrapers();
  if (tab === 'schedules')  loadSchedules();
  if (tab === 'schema')     loadSchema();
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ─── Boot ───────────────────────────────────────────────────────────────────
(async function boot() {
  // If we don't have a token but the user opted into "remember password",
  // try the silent auto-login before painting the login view. Saves them
  // a click after a server restart.
  if (!getToken() && loadUi().rememberedPw) {
    await ensureLoggedIn();
  }
  render();
  if (getToken()) {
    connectWs();
    // Re-enter the user's last tab so they land where they left off after a
    // server restart / auto-login round-trip — not always on the Dashboard.
    switchTab(state.tab || 'dashboard');
    setInterval(async () => {
      try {
        const h = await api('/api/health');
        if (h.startup_id && state.health?.startup_id && h.startup_id !== state.health.startup_id) {
          pushLog(`[lifecycle] server restarted (new startup_id ${h.startup_id}); reloading`);
          setTimeout(() => location.reload(), 1000);
        }
        state.health = h;
        const st = document.querySelector('header .status');
        if (st) st.outerHTML = `<span class="status ok"><span class="dot"></span>${h.status} · pid ${h.pid}</span>`;
      } catch (e) {}
    }, 15000);
  }
})();
</script>
