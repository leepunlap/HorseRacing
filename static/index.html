// Renders one strategy card. Action buttons differ by tab:
//   Enabled tab → Activate / Active badge + Disable
//   Available tab → Enable + Delete-backtest
function _renderModelCard(m){
  const s=m.summary||{};
  const st=m.stale||{};
  const dates_run = s.dates_run||0;
  const hasRun    = dates_run > 0;
  const needsRerun=st.needs_rerun, needsRetally=st.needs_retally;
  const isAvailable = _modelListTab === 'available';
  // In the Available tab, no model is "active visually" — they're all hidden from nav.
  const showActive = m.active && !isAvailable;
  const bg = showActive ? '#1a3a5c' : (isAvailable ? '#fafafa' : '#fff');
  const fg = showActive ? '#fff'    : '#333';
  const sub= showActive ? 'rgba(255,255,255,0.65)' : '#888';
  const cardOpacity = isAvailable ? '0.85' : '1';
  const statusBadge = needsRerun
    ? `<span style="font-size:7pt;background:#f0f0f0;color:#999;padding:1px 6px;border-radius:8px;margin-left:4px">📭 ${T('無有效數據','no valid data')}</span>`
    : needsRetally
    ? `<span style="font-size:7pt;background:#fff3cd;color:#856404;padding:1px 6px;border-radius:8px;margin-left:4px">🔄 ${T('待重新計算','needs retally')}</span>`
    : hasRun
    ? `<span style="font-size:7pt;background:#d4edda;color:#155724;padding:1px 6px;border-radius:8px;margin-left:4px">${T(`已執行 ${dates_run}日`,`ran ${dates_run} days`)}</span>`
    : `<span style="font-size:7pt;background:#fff3cd;color:#856404;padding:1px 6px;border-radius:8px;margin-left:4px">${T('未執行','not run')}</span>`;
  const acc = needsRerun ? '—' : (s.top1_pct!=null?`${s.top1_pct.toFixed(1)}%`:'—');
  const roiVal = needsRerun ? null : s.roi_units;
  const roi = roiVal!=null ? (roiVal>=0?'+':'')+roiVal.toFixed(2)+'u'+(needsRetally?' ⚠':'') : '—';
  const roiColor = needsRerun?'#bbb':(roiVal>=0?'#27ae60':'#e74c3c');
  const label = pickName(m);
  const desc  = lang === 'en' ? (m.description_en || m.description || '') : (m.description || '');
  const notes = lang === 'en' ? (m.notes_en || m.notes || '')             : (m.notes || '');
  const parentLbl = lang === 'en' ? (m.parent_en || m.parent || '')       : (m.parent || '');
  const safe = m.name.replace(/'/g,"\\'");

  // Action button block. Active strategy can't be disabled; the rest can.
  let actions = '';
  if(isAvailable){
    actions = `
      <button onclick="enableModel('${safe}')" style="margin-top:6px;font-size:8pt;padding:3px 10px;background:#27ae60;color:#fff;border:none;border-radius:3px;cursor:pointer">${T('啟用','Enable')}</button>
      <button onclick="deleteModelBacktest('${safe}')" ${hasRun?'':'disabled'} style="margin-top:6px;font-size:8pt;padding:3px 10px;background:${hasRun?'#c0392b':'#ccc'};color:#fff;border:none;border-radius:3px;cursor:${hasRun?'pointer':'not-allowed'};margin-left:4px" title="${T('刪除全部回測結果（保留設定）','Delete all backtest output (config kept)')}">${T('刪除回測','Delete backtest')}</button>`;
  } else if(m.active){
    actions = `<span style="display:inline-block;margin-top:6px;font-size:7.5pt;padding:3px 10px;background:#d4edda;color:#155724;border-radius:10px;font-weight:600;border:1px solid #c3e6cb">✓ ${T('使用中','Active')}</span>`;
  } else {
    actions = `
      <button onclick="activateModel('${safe}')" style="margin-top:6px;font-size:8pt;padding:3px 10px;background:#1a3a5c;color:#fff;border:none;border-radius:3px;cursor:pointer">${T('設為使用中','Activate')}</button>
      <button onclick="disableModel('${safe}')" style="margin-top:6px;font-size:8pt;padding:3px 10px;background:#f0f0f0;color:#555;border:1px solid #ccc;border-radius:3px;cursor:pointer;margin-left:4px" title="${T('從導覽列中隱藏（設定保留）','Hide from nav (config kept)')}">${T('停用','Disable')}</button>`;
  }

  return `      <div style="display:inline-block;margin:0 8px 8px 0;padding:10px 14px;background:${bg};color:${fg};opacity:${cardOpacity};border:1px solid ${needsRerun?'#ddd':needsRetally?'#f0c040':(isAvailable?'#bbb':'#ddd')};border-radius:8px;font-size:10pt;max-width:320px;vertical-align:top">
      <div style="font-weight:bold;font-size:11pt">${label}${showActive?' ✓':''}${statusBadge}</div>
      <div style="font-size:8pt;color:${sub};margin:2px 0">${m.strategy_type||''} v${m.version||'?'}</div>
      <div style="font-size:8pt;color:${sub};margin:2px 0">${desc}</div>
      ${notes?`<div style="font-size:8pt;color:${sub};font-style:italic;margin:2px 0">📝 ${notes}</div>`:''}
      ${parentLbl?`<div style="font-size:8pt;color:${sub};margin:2px 0">⬆ ${T('派生自','derived from')}: ${parentLbl}</div>`:''}
      <div style="font-size:8pt;margin-top:4px">${T('準確率','Accuracy')}: <b>${acc}</b> &ensp; ROI: <b style="color:${roiColor}">${roi}</b> &ensp; ${T('下注','Bets')}: ${needsRerun?'—':(s.bets_placed||'—')+T('場','')}</div>
      ${actions}
    </div>`;
}

async function enableModel(name){
  const r=await fetch('/api/models/'+encodeURIComponent(name)+'/enable',
    {method:'POST',headers:{'Authorization':'Bearer '+token}});
  if(!r.ok){ alert(T('啟用失敗','Enable failed')); return; }
  _invalidateModelsCache();
  await loadModelPage();
}

async function disableModel(name){
  if(!confirm(T(`確認停用「${name}」？停用後將從儀表板與賽事頁的選單中隱藏。`,
                `Disable "${name}"? It will be hidden from the Dashboard and Races strategy selectors.`))) return;
  const r=await fetch('/api/models/'+encodeURIComponent(name)+'/disable',
    {method:'POST',headers:{'Authorization':'Bearer '+token}});
  if(!r.ok){
    const msg = (await r.json().catch(()=>({}))).detail || T('停用失敗','Disable failed');
    alert(msg); return;
  }
  _invalidateModelsCache();
  await loadModelPage();
}

async function deleteModelBacktest(name){
  if(!confirm(T(`確認刪除「${name}」的全部回測結果？此操作不可復原（設定保留，可重新執行回測）。`,
                `Delete all backtest results for "${name}"? This cannot be undone (the config is kept; you can re-run the backtest).`))) return;
  const r=await fetch('/api/models/'+encodeURIComponent(name)+'/results',
    {method:'DELETE',headers:{'Authorization':'Bearer '+token}});
  if(!r.ok){ alert(T('刪除失敗','Delete failed')); return; }
  _invalidateModelsCache();
  await loadModelPage();
}

async function loadModelConfig(name){
  const dsEl=document.getElementById('modelDescSection');
  const invEl=document.getElementById('modelInventory');
  if(dsEl) dsEl.innerHTML=_loadingHtml(T('載入模型描述…','Loading model description…'));
  if(invEl) invEl.innerHTML=_loadingHtml(T('載入回測覆蓋率…','Loading backtest coverage…'));
  const [d, inv] = await Promise.all([
    api('/api/model-config/'+name),
    api('/api/model-inventory/'+encodeURIComponent(name)),
  ]);
  if(!d)return;
  modelConfigCache=d;
  renderModelDescSection(d);
  renderFeatureNotes(name);
  renderModelFeatures(d);
  renderModelXGB(d.config);
  renderModelPace(d.config);
  renderModelGoing(d.config);
  renderModelLayoff(d.config);
  if(inv) renderModelInventory(inv, d.stale||{});
  else if(invEl) invEl.innerHTML='';
  loadJobsPane();
}

               en:'Ad-hoc jockey replacements with no shared history; visiting jockeys (no pairing data); early season with frequent jockey moves; isolating horse ability from jockey-noise.'},
    limitations:{zh:'頂級賽事中騎師是關鍵勝負因素（如知名騎師固定配搭）；有深厚騎師×馬匹默契記錄的老組合被低估；失去部分對弱勢騎師的懲罰訊號。',
                 en:'Top races where the jockey is decisive (star riders with established pairings); under-rates long-standing J×H combinations; loses the penalty signal for weak jockeys.'},
    bet_style:{zh:'同均衡基礎策略，值博率1.0，賠率1.0至6.5倍。',
               en:'Same as Balanced — edge ≥ 1.0, odds 1.0–6.5×.'},
  },
  '黑馬獵手策略':{
    overview:{zh:'只下注賠率6至15倍的長賠馬，且要求值博率達1.4（模型認為真實勝率比市場賠率高出40%以上才出手）。策略接受很低的命中率（大約每10注中1注），但一旦命中回報豐厚。平滑強度與基礎策略相同，給少見配對組合保留足夠的估值空間。',
              en:'Only bets longshots in the 6-15× range and requires edge ≥ 1.4 (model thinks true WR is 40%+ above market). Accepts very low hit rate (~1 in 10) for high payout when it lands. Shrinkage matches baseline so rare pairings retain estimation space.'},
    strengths:{zh:'大場賽事（12匹以上，長賠馬更多）；特殊場地狀況（鬆軟地）令熱門馬發揮失常；大外閘但步速配合絕佳的馬；馬廄突發熱度而市場未反應；評分大幅下調後的復出馬。',
               en:'Big fields (12+ runners, more longshots); unusual going (soft) that derails favourites; wide draws with perfect pace fit; sudden stable hot streaks the market hasn\'t priced; comeback horses after big rating drops.'},
    limitations:{zh:'熱門馬主導的小場賽（賠率普遍不夠高）；短途賽閘位和步速主導結果、不確定性低；賽日只有1至2場達標，資金分配難度高；長期需要大量賽事才能驗證正期望值。',
                 en:'Small favourite-dominated fields (no high enough odds); sprints where draw/pace settle it predictably; only 1-2 qualifying races per meet day (hard bankroll sizing); needs a large sample to verify positive EV.'},
    bet_style:{zh:'值博率1.4，賠率6.0至15.0倍，出手頻率極低，屬於高風險高回報的長線策略。',
               en:'Edge ≥ 1.4, odds 6.0–15.0×, very low bet frequency; a high-risk / high-reward long-game strategy.'},
  },
};
function _se(field){
  if(field == null) return '';
  if(typeof field === 'string') return field;
  return lang === 'en' ? (field.en || field.zh || '') : (field.zh || field.en || '');
}

function _loadingHtml(msg){
  return`<div style="background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:18px 20px;display:flex;align-items:center;gap:10px;color:#888;font-size:10pt"><div class="spinner-border spinner-border-sm text-secondary" role="status" aria-hidden="true"></div><span>${msg}</span></div>`;
}

function _featureFormula(f,cfg){
  const n=f.name, lay=cfg.layoff||{}, pm=cfg.pace_match||{}, chri=cfg.chri||{};
  const en = lang === 'en';
  switch(n){
    case 'draw_inner':       return en?`Trigger: draw ≤ <b>${cfg.draw_inner_max??'?'}</b>`:`啟動條件：閘號 ≤ <b>${cfg.draw_inner_max??'?'}</b>`;
    case 'draw_outer':       return en?`Trigger: draw ≥ <b>${cfg.draw_outer_min??'?'}</b>`:`啟動條件：閘號 ≥ <b>${cfg.draw_outer_min??'?'}</b>`;
    case 'wide_draw':        return en?`Trigger: draw ≥ <b>${cfg.draw_outer_min??'?'}</b> (same threshold as draw_outer; used independently inside CHRI)`:`啟動條件：閘號 ≥ <b>${cfg.draw_outer_min??'?'}</b>（與 draw_outer 相同門檻，在 CHRI 中獨立使用）`;
    case 'weight_allow':     return en?`Formula: (heaviest weight in race − this horse's weight) ÷ <b>${cfg.weight_allow_divisor??'?'}</b>`:`計算：(場內最重磅 − 本馬負磅) ÷ <b>${cfg.weight_allow_divisor??'?'}</b>`;
    case 'cold_stable_season':return en?`Rolling window: trainer WR over <b>${cfg.trainer_form_days??'?'}</b> days`:`滾動窗口：<b>${cfg.trainer_form_days??'?'}</b> 天內勝率`;
    case 'days_since':       return en?`Max layoff days: <b>${lay.max_days??'?'}</b>`:`休賽天數上限：<b>${lay.max_days??'?'}</b> 天`;
    case 'layoff_penalty':
      return en?`Long &gt; <b>${lay.long_days??'?'}</b> d → <b>${lay.long_penalty??'?'}</b>&ensp;|&ensp;Medium &gt; <b>${lay.medium_days??'?'}</b> d → <b>${lay.medium_penalty??'?'}</b>&ensp;|&ensp;Short penalty <b>${lay.short_penalty??'?'}</b>`
              :`長休 &gt; <b>${lay.long_days??'?'}</b> 天 → <b>${lay.long_penalty??'?'}</b>&ensp;|&ensp;中休 &gt; <b>${lay.medium_days??'?'}</b> 天 → <b>${lay.medium_penalty??'?'}</b>&ensp;|&ensp;短休懲罰 <b>${lay.short_penalty??'?'}</b>`;
    case 'rating_trend':     return en?`Window: last <b>${cfg.rating_trend_window??'?'}</b> races rating average − early average`:`窗口：近 <b>${cfg.rating_trend_window??'?'}</b> 場評分均值 − 初期均值`;
    case 'pace_style_match':
      return en?`Leader×slow <b>${pm.leader_slow??'?'}</b>&ensp;Closer×fast <b>${pm.closer_fast??'?'}</b>&ensp;Stalker×slow <b>${pm.stalker_slow??'?'}</b>&ensp;Default <b>${pm.default??'?'}</b>`
              :`慢賽領跑 <b>${pm.leader_slow??'?'}</b>&ensp;快賽追後 <b>${pm.closer_fast??'?'}</b>&ensp;慢賽跟跑 <b>${pm.stalker_slow??'?'}</b>&ensp;預設 <b>${pm.default??'?'}</b>`;
    case 'cold_stable_x_wide':
      return en?`Trigger: trainer 12-mo WR &lt; <b>${cfg.cold_stable_threshold??'?'}</b> AND draw ≥ <b>${cfg.draw_outer_min??'?'}</b>`
              :`啟動條件：練馬師12月勝率 &lt; <b>${cfg.cold_stable_threshold??'?'}</b> 且 閘號 ≥ <b>${cfg.draw_outer_min??'?'}</b>`;
    case 'chri_score':
      return`CHRI = weight_allow × <b>${chri.weight_allow??'?'}</b> + wide_draw × <b>${chri.wide_draw??'?'}</b> + cold_stable_x_wide × <b>${chri.cold_stable_x_wide??'?'}</b>`;
    case 'going_num':        return en?`See "Going Code" tab for the going map`:`場地編碼詳見「場地編碼」分頁`;
    case 'pace_draw_bonus':  return en?`See "Pace × Draw" tab for the matrix`:`閘位×步速矩陣詳見「步速×檔位矩陣」分頁`;
    default:                 return null;
  }
}

async function renderFeatureNotes(strategyName){
  const safeId = strategyName.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById('featureNotes_'+safeId);

  const notes = await loadValidationNotes();
  const fn = (notes.features||{})[strategyName]||{};
  el.innerHTML = fn.status||fn.notes

    : '';

function renderModelInventory(inv, stale){
  const el=document.getElementById('modelInventory');
  if(!el)return;
  const modelName=modelConfigCache?.config?.name||'';
  const st=stale||{};
  const needsRerun=st.needs_rerun, needsRetally=st.needs_retally;
  const done=inv.backtested||[], staleDates=inv.stale||[], pending=inv.not_backtested||[];
  const pct=inv.total_available>0?Math.round((inv.total_backtested)/inv.total_available*100):0;
  const barW=Math.min(pct,100);
  const barCol=needsRerun?'#e74c3c':needsRetally?'#d4a017':(pct>=80?'#27ae60':pct>=40?'#f0a030':'#e74c3c');

  const chips=(dates,cls,clickable,invalid)=>dates.map(d=>{
    const chipStyle=invalid?'background:#fce4e4;color:#a00;border-color:#e74c3c;':needsRetally?'border-color:#d4a017;':'';
    return clickable
      ?`<span class="date-chip ${cls}" style="${chipStyle}cursor:pointer" onclick="_goRaceDate('${d}','${modelName}')">${d}</span>`
      :`<span class="date-chip ${cls}" style="${chipStyle}">${d}</span>`;
  }).join('');

  const staleNote=needsRerun
    ?`<div style="font-size:9pt;color:#a00;background:#fce4e4;border:1px solid #e74c3c;border-radius:4px;padding:5px 10px;margin-bottom:8px">⚠ ${T(`模型參數已更改，以下 ${staleDates.length} 個回測日期已失效，需重新執行完整回測`, `Model parameters changed — the ${staleDates.length} backtested date(s) below are now stale; a full re-run is required`)}</div>`
    :needsRetally
    ?`<div style="font-size:9pt;color:#856404;background:#fff3cd;border:1px solid #d4a017;border-radius:4px;padding:5px 10px;margin-bottom:8px">🔄 ${T('下注參數已更改，下注分析需重新計算（預測準確率仍有效）', 'Bet parameters changed — bet analysis needs to be retallied (prediction accuracy is still valid)')}</div>`
    :'';

  const dayU=T('日',' day(s)');
  const coverageStr = needsRerun
    ? `${inv.total_backtested} ${T('有效','valid')} + ${inv.total_stale} ${T('已失效','stale')} / ${inv.total_available}${dayU}`
    : `${inv.total_backtested} / ${inv.total_available}${dayU}`;

  el.innerHTML=`
    <div style="background:#fff;border:1px solid ${needsRerun?'#e74c3c':needsRetally?'#d4a017':'#dee2e6'};border-radius:6px;padding:14px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
        <b style="font-size:11pt;color:#1a3a5c">${T('回測覆蓋率','Backtest coverage')}</b>
        <span style="font-size:10pt;color:#555">${coverageStr}</span>
        <div style="flex:1;min-width:120px;max-width:260px;background:#eee;border-radius:6px;height:8px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${barCol};border-radius:6px;transition:.3s"></div>
        </div>
        <span style="font-size:10pt;font-weight:bold;color:${barCol}">${pct}%${needsRerun?' '+T('(已失效)','(stale)'):needsRetally?' '+T('(待更新)','(needs retally)'):''}</span>
      </div>
      ${staleNote}
      ${done.length?`<div class="inv-section">
        <h6>✅ ${T('已回測','Backtested')} (${done.length})</h6>
        <div class="date-chips">${chips(done,'done',true,false)}</div>
      </div>`:''}
      ${staleDates.length?`<div class="inv-section">
        <h6>⚠ ${T('已失效','Stale')} (${staleDates.length})</h6>
        <div class="date-chips">${chips(staleDates,'stale',true,true)}</div>
      </div>`:''}
      ${pending.length?`<div class="inv-section">
        <h6>⬜ ${T('未回測','Not backtested')} (${pending.length})</h6>
        <div class="date-chips">${chips(pending,'pending')}</div>
      </div>`:`<div style="font-size:9pt;color:#27ae60;margin-top:4px">✓ ${T('所有可用日期均已回測','All available dates have been backtested')}</div>`}
    </div>`;
}

function showModelTab(tab){
  modelTabActive=tab;
  // Match by the onclick handler's tab argument — language-agnostic.
  document.querySelectorAll('#modelTabs .nav-link').forEach(a=>{
    const onClick = a.getAttribute('onclick') || '';
    a.classList.toggle('active', onClick.includes(`showModelTab('${tab}')`));
  });
  const panels={features:'mTab-features',xgb:'mTab-xgb',pace:'mTab-pace',going:'mTab-going',layoff:'mTab-layoff'};
  document.getElementById('modelTabContent').innerHTML=`<div id="${panels[tab]}"></div>`;
  renderActiveTab(tab);
}

function renderActiveTab(tab){
  if(!modelConfigCache.config)return;
  const d=modelConfigCache;
  if(tab==='features')renderModelFeatures(d);
  else if(tab==='xgb')renderModelXGB(d.config);
  else if(tab==='pace')renderModelPace(d.config);
  else if(tab==='going')renderModelGoing(d.config);
  else if(tab==='layoff')renderModelLayoff(d.config);
}

function renderModelFeatures(d){
  const el=document.getElementById('mTab-features');if(!el)return;
  const cats=d.categories||[];
  const catZh=d.category_zh||{};
  const features=d.features||[];
  const cfg=d.config||{};
  const hyps=d.hyp_catalogue||{};
  const disabled=new Set(cfg.features_disabled||[]);
  let h=`<p style="font-size:9pt;color:#888">${T('共','Total')} ${features.filter(f=>!disabled.has(f.name)).length} ${T('個啟用特徵 /','active features /')} ${features.length} ${T('個總特徵','features')}</p>`;
  cats.forEach(cat=>{
    const fs=features.filter(f=>f.category===cat);
    if(!fs.length)return;
    const catLabel = lang === 'en' ? cat : (catZh[cat]||cat);
    h+=`<h6 style="color:#1a3a5c;margin-top:12px;border-bottom:1px solid #eee;padding-bottom:4px">${catLabel}</h6>`;
    h+=`<table style="width:100%;table-layout:fixed;font-size:9pt;margin-bottom:8px"><thead><tr>
      <th style="width:110px;background:#f5f5f5;color:#333;padding:5px 6px">${T('特徵','Feature')}</th>
      <th style="width:22%;background:#f5f5f5;color:#333;text-align:left;padding:5px 6px">${T('說明','Description')}</th>
      <th style="background:#f5f5f5;color:#333;text-align:left;padding:5px 6px">${T('假設','Hypotheses')}</th>
      <th style="width:175px;background:#f5f5f5;color:#333;padding:5px 6px">${T('可調參數','Tunable')}</th>
      <th style="width:52px;background:#f5f5f5;color:#333;padding:5px 6px">${T('狀態','State')}</th>
    </tr></thead><tbody>`;
    fs.forEach(f=>{
      const on=!disabled.has(f.name);
      const nameLbl = pickName(f);
      const descTxt = lang === 'en' ? (f.description || '') : (f.description_zh || '');
      const descZh  = descTxt ? `<div style="color:#444;line-height:1.45">${descTxt}</div>` : '';
      const hypCards=(f.hypotheses||[]).map(hid=>{
        const hh=hyps[hid];
        // Attribution is data-driven: pull source from hh.source. When we
        // don't have a hit in the catalogue (legacy ID), source is unknown.
        const src = hh?.source || '';
        const tag = src ? `${src} ${hid}` : hid;
        if(!hh)return`<div style="display:inline-flex;align-items:baseline;gap:3px;padding:2px 7px;background:#f5f8ff;border:1px solid #dae3f0;border-radius:10px;font-size:8pt"><span class="hyp-pill">${tag}</span></div>`;
        const hText = lang === 'en' ? (hh.text_en || hh.text) : (hh.text || hh.text_en);
        return`<div style="display:inline-flex;align-items:baseline;gap:4px;padding:3px 8px;background:#f5f8ff;border:1px solid #dae3f0;border-radius:10px;font-size:8pt;line-height:1.45"><span class="hyp-pill" style="flex-shrink:0">${tag}</span><span class="hyp-pill ver-pill" style="flex-shrink:0">${hh.version}</span><span style="color:#444">${hText}</span></div>`;
      }).join('');
      h+=`<tr${on?'':' style="opacity:0.45"'}>
        <td style="background:#f9f9f9;vertical-align:top;padding:6px">
          <div style="font-weight:600;font-size:9pt;color:#1a3a5c">${nameLbl}</div>
        </td>
        <td style="vertical-align:top;padding:6px">${descZh}</td>
        <td style="vertical-align:top;padding:6px"><div style="display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start">${hypCards||'<span style="color:#ddd;font-size:8pt">—</span>'}</div></td>
        <td style="vertical-align:top;padding:6px">${_tunableCell(f.name,cfg)}</td>
        <td style="vertical-align:top;padding:6px;text-align:center;color:${on?'#27ae60':'#e74c3c'};font-weight:bold">${on?'✅':'OFF'}</td>
      </tr>`;
    });
    h+='</tbody></table>';
  });
  el.innerHTML=h;
}

function renderModelXGB(cfg){
  const el=document.getElementById('mTab-xgb');if(!el)return;
  const xgb=cfg.xgb||{};
  const rows=[];
  Object.entries(xgb).forEach(([k,v])=>{
    const info=XGB_PARAM_INFO[k];
    if(info) rows.push({k,v,info});
    else rows.push({k,v,info:null});
  });
  rows.push({k:'num_boost_rounds',v:cfg.num_boost_rounds||100,info:XGB_PARAM_INFO['num_boost_rounds']});
  const tHdrParam=T('參數','Parameter'), tHdrVal=T('值','Value'), tHdrExp=T('說明','Description');
  let h=`<table style="width:100%;font-size:9pt;border-collapse:collapse"><thead><tr>
    <th style="width:110px;text-align:left;padding:5px 8px;border-bottom:2px solid #c5d5e8;background:#f0f4fa;color:#1a3a5c">${tHdrParam}</th>
    <th style="width:72px;text-align:center;padding:5px 8px;border-bottom:2px solid #c5d5e8;background:#f0f4fa;color:#1a3a5c">${tHdrVal}</th>
    <th style="text-align:left;padding:5px 8px;border-bottom:2px solid #c5d5e8;background:#f0f4fa;color:#1a3a5c">${tHdrExp}</th>
  </tr></thead><tbody>`;
  rows.forEach(({k,v,info},i)=>{
    const bg=i%2===0?'#fff':'#f9f9f9';
    if(!info){
      h+=`<tr><td style="padding:5px 8px;background:${bg}">${k}</td><td style="text-align:center;padding:5px 8px;background:${bg}">${v}</td><td style="background:${bg}"></td></tr>`;
      return;
    }
    const lbl=_lbl(info.label);
    const expl=_lbl(info.explain);
    const valCell=info.key
      ?`<span style="font-weight:600;color:#1a3a5c;cursor:pointer;border-bottom:1px dashed #a0b4cc;padding:0 2px" onclick="editParam('${info.key}','${lbl}','${info.type}',this)">${v}</span>`
      :`<span style="color:#555">${v}</span>`;
    h+=`<tr>
      <td style="padding:5px 8px;background:${bg};font-weight:600;color:#1a3a5c;white-space:nowrap">${lbl}</td>
      <td style="text-align:center;padding:5px 8px;background:${bg}">${valCell}</td>
      <td style="padding:5px 8px;background:${bg};color:#555;line-height:1.55">${expl}</td>
    </tr>`;
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}

function _fmtElapsed(secs){
  if(secs==null||secs<0)return'—';
  if(secs<60)return lang==='en'?`${secs}s`:`${secs}秒`;
  const m=Math.floor(secs/60),s=secs%60;
  if(m<60)return lang==='en'?`${m}m${s.toString().padStart(2,'0')}s`:`${m}分${s.toString().padStart(2,'0')}秒`;
  return lang==='en'?`${Math.floor(m/60)}h${(m%60).toString().padStart(2,'0')}m`:`${Math.floor(m/60)}時${(m%60).toString().padStart(2,'0')}分`;
}
function _fmtETA(elapsed,done,total){
  if(!done||done<=0)return'—';
  const perItem=elapsed/done;
  const remaining=(total-done)*perItem;
  return _fmtElapsed(Math.round(remaining));
}

function fmtRunning(raw){
  if(!raw) return '-';
  let s = String(raw).trim();
  if(!s || s==='None') return '-';
  // Already has separators (spaces or hyphens from scraped HTML)
  if(/[\s-]/.test(s)) return s.replace(/\s+/g,'-');
  // Lumped digits from CSV (e.g. "121091" → "12-10-9-1")
  // Greedy parse: positions are 1-14, try 2-digit then 1-digit
  let i = 0, parts = [];
  while(i < s.length){
    let pos = parseInt(s.substring(i,i+2));
    if(s.length - i >= 2 && pos >= 1 && pos <= 14){
      parts.push(pos);
      i += 2;
    } else {
      parts.push(parseInt(s[i]));
      i += 1;
    }
  }
  return parts.join('-');
}

  const sourceLabel = sourceSet.length ? sourceSet.join(' · ') : '';
  let h=`<div style="margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="font-size:9.5pt;color:#555">${T('共','Total')} <b>${total}</b> ${T('條假設','hypotheses')}${sourceLabel?` — ${T('來源','sources')}: ${sourceLabel}`:''}</span>
    <span style="display:flex;gap:6px;align-items:center;font-size:8pt">
      ${_ericCatPill(T('特徵類別','Category'))} ${T('特徵類別','Category')}&ensp;${_ericFeatPill(T('特徵名稱','Feature'))} ${T('特徵名稱','Feature')}
    </span>
  </div>
  <div>`;

  sections.forEach(sec=>{
    const secTotal=sec.groups.reduce((s,g)=>s+g.hypotheses.length,0);
    const sourceBadge = sec.source
      ? `<span style="font-size:8pt;color:#fff;background:#1a3a5c;padding:1px 7px;border-radius:8px;font-weight:700">${sec.source}</span>` : '';
    h+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:baseline;gap:8px;padding:7px 12px;background:#f0f4ff;border-left:4px solid #1a3a5c;border-radius:0 4px 4px 0;margin-bottom:6px">
        ${sourceBadge}
        <span style="font-size:10.5pt;font-weight:700;color:#1a3a5c">${sec.version}</span>
        ${sec.subtitle?`<span style="font-size:8.5pt;color:#666">${sec.subtitle}</span>`:''}
        <span style="font-size:8pt;color:#aaa;margin-left:auto">${secTotal} ${T('條','items')}</span>
      </div>`;

    sec.groups.forEach(grp=>{
      if(grp.label){
        h+=`<div style="font-size:9pt;font-weight:700;color:#555;margin:10px 0 4px 4px;padding-left:8px;border-left:3px solid #c5d5e8">${grp.label}</div>`;
      }
      grp.hypotheses.forEach(hyp=>{
        // category_zh on features is only set when the API attaches it; fall back
        // to the bilingual feature dicts (now inline).
        const catKey = lang === 'en' ? 'category' : 'category_zh';
        const cats=[...new Set(hyp.features.map(f => f[catKey] || f.category))];
        const feats=[...new Set(hyp.features.map(f => pickName(f)))];
        const pills=(cats.length||feats.length)
          ?`<span style="display:inline-flex;flex-wrap:wrap;gap:3px;margin-left:6px;vertical-align:middle">${cats.map(_ericCatPill).join('')}${feats.map(_ericFeatPill).join('')}</span>`
          :'';
        const currentNote=hypNotes[hyp.id];
        const noteHtml=_noteDisplay('hyp',hyp.id,currentNote);
        const hypText = lang === 'en' ? (hyp.text_en || hyp.text) : (hyp.text || hyp.text_en);
        const hypVal  = lang === 'en' ? (hyp.validation_en || hyp.validation) : (hyp.validation || hyp.validation_en);
        const validationHtml=hypVal
          ?`<div style="margin-top:3px;font-size:8pt;color:#555;line-height:1.5;background:#fafafa;border-left:3px solid #ccc;padding:4px 8px;border-radius:0 3px 3px 0">${hypVal.replace(/\n/g,'<br>')}</div>`
          :'';
        h+=`<div style="display:flex;gap:6px;padding:4px 6px;border-bottom:1px solid #f3f3f3;align-items:flex-start">
          <span class="hyp-pill" style="flex-shrink:0;margin-top:2px">${hyp.source || ''} ${hyp.id}</span>
          <div style="flex:1;min-width:0">
            <span style="font-size:9.5pt;color:#333;line-height:1.55">${hypText}${pills}</span>
            ${validationHtml}
            ${noteHtml}
          </div>
        </div>`;
      });
    });

    h+=`</div>`;
  });

  h+='</div>';
  el.innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════════════════
//  Scheduler page
//
//  Lists schedules from /api/schedules, lets the user add/toggle/delete and
//  trigger one immediately. Cron expressions are 5-field (min hr dom mon dow).
//  Each fire result is broadcast over /ws/progress as 'schedule_fired' — the
//  WS handler logs it; we also re-fetch the list on every fire to refresh
//  the last_fired_at column.
// ═══════════════════════════════════════════════════════════════════════════
let _schedCache = null;
let _schedActions = [];

async function loadSchedules(){
  const el = document.getElementById('schedContent');
  if(!el) return;
  el.innerHTML = _loadingHtml(T('載入排程…','Loading schedules…'));
  const d = await api('/api/schedules');
  if(!d) return;
  _schedCache = d.schedules || [];
  _schedActions = d.available_actions || [];
  _renderSchedules();
}

function _schedStatusBadge(s){
  const st = s.last_fire_status;
  if(!st) return `<span style="font-size:8pt;color:#aaa">${T('未執行','never')}</span>`;
  const map = {
    ok:      ['#d4edda','#155724','✓'],
    skipped: ['#fff3cd','#856404','⊝'],
    error:   ['#f8d7da','#721c24','✗'],
  };
  const [bg, fg, icon] = map[st] || ['#eee','#555','?'];
  return `<span style="display:inline-block;font-size:8pt;padding:1px 6px;border-radius:8px;background:${bg};color:${fg};font-weight:600" title="${s.last_skip_reason||''}">${icon} ${st}</span>`;
}

function _renderSchedules(){
  const el = document.getElementById('schedContent');
  if(!el) return;
  const rows = _schedCache.map(s => {
    const args = Object.entries(s.args||{}).map(([k,v])=>`${k}=${v}`).join(', ') || '—';
    const lastAt = s.last_fired_at || '—';
    const safeId = s.id.replace(/'/g,"\\'");
    return `<tr style="${s.enabled?'':'opacity:0.55'}">
      <td style="padding:5px 8px">${s.name}</td>
      <td style="padding:5px 8px;font-family:monospace;font-size:9pt">${s.cron}</td>
      <td style="padding:5px 8px;font-family:monospace;font-size:9pt;color:#555">${s.action}</td>
      <td style="padding:5px 8px;font-size:8.5pt;color:#777">${args}</td>
      <td style="padding:5px 8px;text-align:center">${_schedStatusBadge(s)}</td>
      <td style="padding:5px 8px;font-size:8.5pt;color:#888">${lastAt}</td>
      <td style="padding:5px 8px;text-align:right;white-space:nowrap">
        <button onclick="_runSchedNow('${safeId}')" style="font-size:8.5pt;padding:2px 8px;border:1px solid #1a3a5c;background:#fff;color:#1a3a5c;border-radius:3px;cursor:pointer" title="${T('立即執行','Run now')}">▶</button>
        <button onclick="_toggleSched('${safeId}',${!s.enabled})" style="font-size:8.5pt;padding:2px 8px;border:1px solid #888;background:#fff;color:#555;border-radius:3px;cursor:pointer;margin-left:3px">${s.enabled?T('停用','Off'):T('啟用','On')}</button>
        <button onclick="_deleteSched('${safeId}','${s.name.replace(/'/g,"\\'")}')" style="font-size:8.5pt;padding:2px 8px;border:1px solid #c0392b;background:#fff;color:#c0392b;border-radius:3px;cursor:pointer;margin-left:3px">${T('刪除','Delete')}</button>
      </td>
    </tr>`;
  }).join('');

  const actionOptions = _schedActions.map(a=>`<option value="${a}">${a}</option>`).join('');

  el.innerHTML = `
    <div style="background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:14px;margin-bottom:14px">
      <h5 style="font-size:11pt;color:#1a3a5c;margin-bottom:10px">${T('新增排程','Add schedule')}</h5>
      <div style="display:grid;grid-template-columns:1.5fr 1.2fr 1fr 2fr auto;gap:8px;align-items:end">
        <div>
          <label style="font-size:8pt;color:#888;display:block;margin-bottom:2px">${T('名稱','Name')}</label>
          <input id="schedName" type="text" placeholder="${T('例：每晚抓賽果','e.g. Nightly results scrape')}" style="width:100%;padding:5px 8px;font-size:9pt;border:1px solid #ddd;border-radius:3px">
        </div>
        <div>
          <label style="font-size:8pt;color:#888;display:block;margin-bottom:2px">Cron <span style="font-size:7pt;color:#aaa">(min hr dom mon dow)</span></label>
          <input id="schedCron" type="text" placeholder="30 23 * * *" style="width:100%;padding:5px 8px;font-size:9pt;font-family:monospace;border:1px solid #ddd;border-radius:3px">
        </div>
        <div>
          <label style="font-size:8pt;color:#888;display:block;margin-bottom:2px">${T('動作','Action')}</label>
          <select id="schedAction" onchange="_renderSchedArgsHint()" style="width:100%;padding:5px 8px;font-size:9pt;border:1px solid #ddd;border-radius:3px">${actionOptions}</select>
        </div>
        <div>
          <label style="font-size:8pt;color:#888;display:block;margin-bottom:2px">${T('參數 (JSON)','Args (JSON)')}</label>
          <input id="schedArgs" type="text" placeholder='{}' style="width:100%;padding:5px 8px;font-size:9pt;font-family:monospace;border:1px solid #ddd;border-radius:3px">
        </div>
        <button onclick="_addSched()" style="padding:6px 14px;background:#1a3a5c;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:9pt;white-space:nowrap">${T('新增','Add')}</button>
      </div>
      <div id="schedArgsHint" style="font-size:8pt;color:#888;margin-top:6px"></div>
      <div style="font-size:8pt;color:#888;margin-top:4px">${T('Cron 範例','Cron examples')}: <code>30 23 * * *</code> = ${T('每日 23:30','daily at 23:30')}; <code>*/15 * * * *</code> = ${T('每 15 分鐘','every 15 min')}; <code>0 18 * * 3,6</code> = ${T('週三、六 18:00','Wed/Sat at 18:00')}</div>
    </div>

    <div style="background:#fff;border:1px solid #dee2e6;border-radius:6px;overflow:hidden">
      <table style="width:100%;font-size:9.5pt">
        <thead><tr style="background:#f0f4fa;color:#1a3a5c">
          <th style="padding:7px 8px;text-align:left">${T('名稱','Name')}</th>
          <th style="padding:7px 8px;text-align:left">Cron</th>
          <th style="padding:7px 8px;text-align:left">${T('動作','Action')}</th>
          <th style="padding:7px 8px;text-align:left">${T('參數','Args')}</th>
          <th style="padding:7px 8px;text-align:center">${T('上次','Last')}</th>
          <th style="padding:7px 8px;text-align:left">${T('時間','At')}</th>
          <th style="padding:7px 8px;text-align:right">${T('操作','Actions')}</th>
        </tr></thead>
        <tbody>${rows || `<tr><td colspan="7" style="padding:18px;text-align:center;color:#888">${T('尚無排程 — 在上方新增','No schedules yet — add one above')}</td></tr>`}</tbody>
      </table>
    </div>`;
  _renderSchedArgsHint();
}

function _renderSchedArgsHint(){
  const act = document.getElementById('schedAction')?.value;
  const hints = {
    scraper:         T('不需參數','No args needed'),
    batch_backtest:  T("需 model；可選 dates: {\"model\":\"均衡基礎策略\"}", 'needs model; optional dates: {"model":"均衡基礎策略"}'),
    single_backtest: T("需 model 和 date: {\"model\":\"...\",\"date\":\"2026-06-01\"}", 'needs model and date: {"model":"...","date":"2026-06-01"}'),
  };
  const el = document.getElementById('schedArgsHint');
  if(el) el.textContent = hints[act] || '';
}

async function _addSched(){
  const name   = document.getElementById('schedName').value.trim();
  const cron   = document.getElementById('schedCron').value.trim();
  const action = document.getElementById('schedAction').value;
  const argsRaw= document.getElementById('schedArgs').value.trim() || '{}';
  if(!name || !cron || !action){ alert(T('請填寫名稱、Cron 與動作','Name, cron and action are required')); return; }
  let args;
  try{ args = JSON.parse(argsRaw); }
  catch(e){ alert(T('參數必須為合法 JSON：','Args must be valid JSON: ')+e.message); return; }
  const r = await fetch('/api/schedules',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({name,cron,action,args,enabled:true}),
  });
  if(!r.ok){
    const j = await r.json().catch(()=>({}));
    alert(T('新增失敗：','Add failed: ')+(j.detail||r.status));
    return;
  }
  document.getElementById('schedName').value = '';
  document.getElementById('schedCron').value = '';
  document.getElementById('schedArgs').value = '';
  await loadSchedules();
}

async function _toggleSched(id, enabled){
  await fetch('/api/schedules/'+encodeURIComponent(id),{
    method:'PATCH',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
    body:JSON.stringify({enabled}),
  });
  await loadSchedules();
}

async function _deleteSched(id, name){
  if(!confirm(T(`確認刪除排程「${name}」？`,`Delete schedule "${name}"?`))) return;
  await fetch('/api/schedules/'+encodeURIComponent(id),{
    method:'DELETE',
    headers:{'Authorization':'Bearer '+token},
  });
  await loadSchedules();
}

async function _runSchedNow(id){
  document.getElementById('runLog').classList.add('active');
  const r = await fetch('/api/schedules/'+encodeURIComponent(id)+'/run',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token},
  });
  // The WS handler will surface success in the run log; just refresh the table.
  if(!r.ok){
    const j = await r.json().catch(()=>({}));
    const det = (typeof j.detail === 'object') ? (j.detail.reason||j.detail.status) : j.detail;
    appendRunLog('✗ '+T('排程失敗: ','Schedule failed: ')+det, 'err');
  }
  setTimeout(loadSchedules, 600);
}

// ═══════════════════════════════════════════════════════════════════════════
//  Dashboard — Model Analytics
//
//  State
//  ─────
//    dashModel    currently selected model name (independent of Races page)
//    dashData     last fetched /api/model-stats response
//    dashChart*   ECharts instances — disposed before each re-render
//
//  Model nav uses the shared renderModelNav() + _ensureModels() system.

// ═══════════════════════════════════════════════════════════════════════════
let dashModel=null, dashData=null;
let dashChartPnl=null, dashChartCumPnl=null, dashChartAcc=null;

// ── Dashboard nav ──────────────────────────────────────────────────────────
async function initDashNav(){
  await _ensureModels();
  if(!dashModel&&_activeModelName) dashModel=_activeModelName;
  renderModelNav('dashModelNav',dashModel,'selectDashModel');
}

async function selectDashModel(name){
  dashModel=name;
  await _ensureModels();
  renderModelNav('dashModelNav',dashModel,'selectDashModel');
  await _fetchAndRenderDash();
}

function switchToActiveModel(){
  if(!_activeModelName)return;
  selectDashModel(_activeModelName);
}

async function loadDashboard(){
  await initDashNav();
  await _fetchAndRenderDash();
}

async function _fetchAndRenderDash(){
  if(!dashModel)return;
  document.getElementById('dashInfo').textContent='';
  const data=await api('/api/model-stats/'+encodeURIComponent(dashModel));
  if(!data)return;
  dashData=data;
  _renderDashStatus(data);
  _renderDashStatCards(data);
  _renderDashCharts(data);
  _renderDashIssues(data);
  _fetchAndRenderBetAudit(dashModel);
}

async function _fetchAndRenderBetAudit(model){
  const el=document.getElementById('dashBetAudit');
  if(!el)return;
  el.innerHTML=`<div style="font-size:9pt;color:#888;padding:8px">${T('載入賠率上限分析…','Loading odds-cap analysis…')}</div>`;
  const d=await api('/api/models/'+encodeURIComponent(model)+'/bet-audit');
  if(!d){el.innerHTML='';return;}
  if(dashModel!==model)return;   // user navigated away
  _renderBetAudit(d);
}

function _renderBetAudit(d){
  const el=document.getElementById('dashBetAudit');
  if(!el)return;
  const p=d.placed||{}, b=d.blocked||{};
  const cap=d.bet_max_odds_current;

  // Find optimal cap from sweep (highest ROI, with at least 30 bets for stat sig)
  let best=null;
  (d.sweep||[]).forEach(s=>{
    if(s.count>=30 && (!best || s.roi>best.roi)) best=s;
  });

  const roiCls = roi => roi>=0?'color:#27ae60;font-weight:bold' : roi>=-0.1?'color:#856404' : 'color:#e74c3c';
  const pct = v => (v*100).toFixed(1)+'%';
  const sgn = v => (v>=0?'+':'')+v.toFixed(2);

  // Verdict
  let verdict = '';
  if(!b.count){
    verdict = `<span style="color:#27ae60">✓ ${T('此上限沒有攔截任何下注','This cap blocked no bets')}</span>`;
  } else if(b.roi < p.roi - 0.05){
    verdict = `<span style="color:#27ae60">✓ ${T(`上限合理 — 攔截宗 ROI (${pct(b.roi)}) 顯著差於下注宗 (${pct(p.roi)})`,`Cap looks right — blocked-bet ROI (${pct(b.roi)}) is materially worse than placed-bet ROI (${pct(p.roi)})`)}</span>`;
  } else if(b.roi > p.roi + 0.05){
    verdict = `<span style="color:#e74c3c">⚠ ${T(`上限可能過嚴 — 攔截宗 ROI (${pct(b.roi)}) 反而優於下注宗 (${pct(p.roi)})`,`Cap may be too strict — blocked-bet ROI (${pct(b.roi)}) is actually better than placed-bet ROI (${pct(p.roi)})`)}</span>`;
  } else {
    verdict = `<span style="color:#856404">≈ ${T('攔截宗與下注宗 ROI 相近，調整上限可能影響不大','Blocked and placed ROI are similar; adjusting the cap likely has little effect')}</span>`;
  }

  const sweepRows = (d.sweep||[]).map(s=>{
    const isBest = best && Math.abs(s.max_odds-best.max_odds)<0.01 && best.max_odds!=null;
    const isCur  = s.current;
    const badge = isCur && isBest ? ' '+T('★當前/最佳','★ current / best') : isCur ? ' '+T('(當前)','(current)') : isBest ? ' '+T('★最佳','★ best') : '';
    const bgCol = isCur ? '#fff3cd' : isBest ? '#d4edda' : '';
    return `<tr style="background:${bgCol}">
      <td style="padding:4px 8px;font-weight:${isCur||isBest?'bold':'normal'}">${s.label}${badge}</td>
      <td style="padding:4px 8px;text-align:right">${s.count}</td>
      <td style="padding:4px 8px;text-align:right">${s.winners}</td>
      <td style="padding:4px 8px;text-align:right">${pct(s.hit_rate)}</td>
      <td style="padding:4px 8px;text-align:right;${roiCls(s.roi)}">${pct(s.roi)}</td>
      <td style="padding:4px 8px;text-align:right;${roiCls(s.units_net)}">${sgn(s.units_net)}</td>
    </tr>`;
  }).join('');

  const bucketRows = (d.buckets||[]).map(bk=>`<tr>
    <td style="padding:4px 8px">${bk.range}</td>
    <td style="padding:4px 8px;text-align:right">${bk.count}</td>
    <td style="padding:4px 8px;text-align:right">${bk.winners}</td>
    <td style="padding:4px 8px;text-align:right">${pct(bk.hit_rate)}</td>
    <td style="padding:4px 8px;text-align:right;${roiCls(bk.roi)}">${pct(bk.roi)}</td>
    <td style="padding:4px 8px;text-align:right;${roiCls(bk.units_net)}">${sgn(bk.units_net)}</td>
  </tr>`).join('');

  const sampleRows = (d.sample_blocked||[]).slice(0,10).map(s=>`<tr>
    <td style="padding:3px 8px;font-size:8.5pt">${s.date}</td>
    <td style="padding:3px 8px;font-size:8.5pt">R${s.race}</td>
    <td style="padding:3px 8px;font-size:8.5pt">${s.name||s.brand}</td>
    <td style="padding:3px 8px;font-size:8.5pt;text-align:right">${s.odds}x</td>
    <td style="padding:3px 8px;font-size:8.5pt;text-align:right">${s.edge.toFixed(2)}</td>
    <td style="padding:3px 8px;font-size:8.5pt;text-align:center">${s.won?'<span style="color:#27ae60">✓</span>':''}</td>
  </tr>`).join('');

  const tCount=T('注數','Bets'), tHit=T('命中','Hits'), tHitR=T('命中率','Hit %'), tNet=T('淨 (u)','Net (u)');
  const tBetsSfx=T(' 注',' bets'), tHitW=T('命中','Won');
  el.innerHTML = `
    <div style="background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <b style="font-size:11pt;color:#1a3a5c">${T('高賠率攔截審計','High-odds block audit')}</b>
        <span style="font-size:9pt;color:#666">${T('當前','Current')} bet_max_odds = <b>${cap}x</b> · ${T('edge 閾值','edge threshold')} = <b>${d.bet_edge_threshold}</b></span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div style="background:#f8f9fa;padding:10px;border-radius:4px;border-left:3px solid #1a3a5c">
          <div style="font-size:8.5pt;color:#666">${T('已下注','Placed')} (≤${cap}x)</div>
          <div style="font-size:14pt;font-weight:bold">${p.count}${tBetsSfx}</div>
          <div style="font-size:8.5pt">${tHitW} ${p.winners} (${pct(p.hit_rate||0)}) · ROI <span style="${roiCls(p.roi||0)}">${pct(p.roi||0)}</span> · ${sgn(p.units_net||0)}u</div>
        </div>
        <div style="background:#f8f9fa;padding:10px;border-radius:4px;border-left:3px solid #856404">
          <div style="font-size:8.5pt;color:#666">${T('攔截','Blocked')} (>${cap}x)</div>
          <div style="font-size:14pt;font-weight:bold">${b.count}${tBetsSfx}</div>
          <div style="font-size:8.5pt">${tHitW} ${b.winners} (${pct(b.hit_rate||0)}) · ROI <span style="${roiCls(b.roi||0)}">${pct(b.roi||0)}</span> · ${sgn(b.units_net||0)}u</div>
        </div>
      </div>

      <div style="font-size:9.5pt;margin-bottom:14px;padding:8px;background:#f8f9fa;border-radius:4px">${verdict}</div>

      <div style="margin-bottom:14px">
        <b style="font-size:10pt;color:#1a3a5c">${T('上限敏感性分析','Cap sensitivity sweep')}</b>
        <div style="font-size:8.5pt;color:#888;margin-bottom:6px">${T('假設 bet_max_odds 設為不同值，所有歷史候選下注的 ROI 模擬','Simulated ROI for all historical candidate bets under different bet_max_odds caps')}</div>
        <table style="width:100%;font-size:9pt;border-collapse:collapse">
          <thead><tr style="background:#f0f0f0">
            <th style="padding:4px 8px;text-align:left">${T('上限','Cap')}</th>
            <th style="padding:4px 8px;text-align:right">${tCount}</th>
            <th style="padding:4px 8px;text-align:right">${tHit}</th>
            <th style="padding:4px 8px;text-align:right">${tHitR}</th>
            <th style="padding:4px 8px;text-align:right">ROI</th>
            <th style="padding:4px 8px;text-align:right">${tNet}</th>
          </tr></thead>
          <tbody>${sweepRows}</tbody>
        </table>
      </div>

      ${bucketRows ? `
      <div style="margin-bottom:14px">
        <b style="font-size:10pt;color:#1a3a5c">${T('攔截賠率分布','Blocked odds distribution')}</b>
        <table style="width:100%;font-size:9pt;border-collapse:collapse;margin-top:6px">
          <thead><tr style="background:#f0f0f0">
            <th style="padding:4px 8px;text-align:left">${T('賠率區間','Odds range')}</th>
            <th style="padding:4px 8px;text-align:right">${tCount}</th>
            <th style="padding:4px 8px;text-align:right">${tHit}</th>
            <th style="padding:4px 8px;text-align:right">${tHitR}</th>
            <th style="padding:4px 8px;text-align:right">ROI</th>
            <th style="padding:4px 8px;text-align:right">${tNet}</th>
          </tr></thead>
          <tbody>${bucketRows}</tbody>
        </table>
      </div>` : ''}

      ${sampleRows ? `
      <div>
        <b style="font-size:10pt;color:#1a3a5c">${T('攔截樣本 (最高賠率)','Blocked samples (highest odds)')}</b>
        <table style="width:100%;font-size:9pt;border-collapse:collapse;margin-top:6px">
          <thead><tr style="background:#f0f0f0">
            <th style="padding:3px 8px;text-align:left">${T('日期','Date')}</th>
            <th style="padding:3px 8px;text-align:left">${T('場','Race')}</th>
            <th style="padding:3px 8px;text-align:left">${T('馬','Horse')}</th>
            <th style="padding:3px 8px;text-align:right">${T('賠率','Odds')}</th>
            <th style="padding:3px 8px;text-align:right">Edge</th>
            <th style="padding:3px 8px;text-align:center">${T('中','Won')}</th>
          </tr></thead>
          <tbody>${sampleRows}</tbody>
        </table>
      </div>` : ''}
    </div>`;
}

// ── Status card ──────────────────────────────────────────────────────────
function _renderDashStatus(data){
  const s=data.summary||{};
  const datesRun=s.dates_run||0;
  const lastDate=s.per_date?.length?s.per_date[s.per_date.length-1].date:null;
  const activeBadge=data.active
    ?`<span style="background:#d4edda;color:#155724;padding:2px 9px;border-radius:12px;font-size:8.5pt;margin-left:6px">● ${T('使用中','Active')}</span>`
    :`<span style="background:#e2e3e5;color:#555;padding:2px 9px;border-radius:12px;font-size:8.5pt;margin-left:6px">○ ${T('未使用','Inactive')}</span>`;
  const st=data.stale||{};
  const effectiveRun = st.needs_rerun ? 0 : datesRun;
  const safeId=data.name.replace(/[^a-zA-Z0-9]/g,'_');
  const staleBar = st.stale ? `<div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:5px;margin-bottom:8px;background:${st.needs_rerun?'#f5f5f5':'#fff3cd'};border:1px solid ${st.needs_rerun?'#ddd':'#f0c040'}">
    <span style="font-size:10pt;color:${st.needs_rerun?'#999':'#856404'}">${st.needs_rerun?'📭':'🔄'}</span>
    <span style="font-size:9.5pt;flex:1;color:${st.needs_rerun?'#999':'#856404'}">${st.needs_rerun?T('回測數據已失效，請重新執行完整回測','Backtest data is stale — please re-run the full backtest'):st.reason}</span>
    ${st.needs_retally?`<button id="retallyBtn_${safeId}" class="retally-btn" onclick="runRetally('${data.name.replace(/'/g,"\\'")}')">${T('重新計算','Recalculate')}</button>`:''}
  </div>` : '';
  const meta=[
    `${T('已執行','Runs')}: <b>${effectiveRun}</b> ${T('日','d')}${st.needs_rerun?` <span style="font-size:8pt;color:#999">(${T(`共${datesRun}日已失效`,`${datesRun} day(s) total are stale`)})</span>`:''}`,
    lastDate?`${T('最後執行','Last run')}: <b>${lastDate}</b>`:null,
    data.bet_edge_threshold!=null?`${T('下注閾值','Bet threshold')}: <b>${data.bet_edge_threshold}</b>`:null,
    data.bet_max_odds!=null?`${T('最高賠率','Max odds')}: <b>${data.bet_max_odds}x</b>`:null,
    data.features_disabled?.length?`<span style="color:#e74c3c">${T('停用特徵','Disabled features')}: ${data.features_disabled.length}${T('個','')}</span>`:null,
    data.parent?`${T('派生自','Derived from')}: <b>${data.parent}</b>`:null,
    data.created?`${T('建立','Created')}: ${data.created}`:null,
  ].filter(Boolean);
  const switchBtn = (!data.active && _activeModelName)
    ? `<button onclick="switchToActiveModel()" style="padding:3px 11px;font-size:8.5pt;background:#1a3a5c;color:#fff;border:none;border-radius:4px;cursor:pointer;margin-left:4px" title="${T('切換至','Switch to')} ${_activeModelName}">↩ ${T('切換至使用中策略','Switch to active strategy')}</button>`
    : '';
  document.getElementById('dashStatus').innerHTML=`<div class="dash-status">
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:5px">
      <b style="font-size:13pt;color:#1a3a5c">${data.name}</b>${activeBadge}
      <span style="font-size:9pt;color:#888">v${data.version||'?'} · ${data.strategy_type||''}</span>
      ${switchBtn}
    </div>
    <div style="font-size:10pt;color:#555;margin-bottom:5px">${lang==='en'?(data.description_en||data.description||''):(data.description||data.description_en||'')}</div>
    ${(data.notes||data.notes_en)?`<div style="font-size:9pt;color:#888;font-style:italic;margin-bottom:4px">📝 ${lang==='en'?(data.notes_en||data.notes||''):(data.notes||data.notes_en||'')}</div>`:''}
    ${staleBar}
    <div style="font-size:9pt;color:#888;display:flex;gap:14px;flex-wrap:wrap">${meta.map(m=>`<span>${m}</span>`).join('')}</div>
  </div>`;
}

// ── Stat cards ───────────────────────────────────────────────────────────
function _renderDashStatCards(data){
  const s=data.summary||{};
  const st=data.stale||{};
  if(st.needs_rerun){
    document.getElementById('dashStats').innerHTML=
      `<div style="grid-column:1/-1;text-align:center;color:#999;padding:20px;font-size:11pt;background:#f8f8f8;border-radius:6px;border:1px solid #e0e0e0">
        ${T('暫無有效數據 — 請重新執行完整回測','No valid data — please re-run the full backtest')}
      </div>`;
    return;
  }
  if(!s.dates_run){
    document.getElementById('dashStats').innerHTML=
      `<div style="grid-column:1/-1;text-align:center;color:#bbb;padding:20px;font-size:11pt">
        ${T('尚未執行任何回測','No backtest has been run yet')}
      </div>`;
    return;
  }
  const staleWarn=st.needs_retally?` <span style="font-size:8pt;color:#856404;font-weight:normal">${T('(待更新)','(needs retally)')}</span>`:'';
  const acc=s.top1_pct!=null?s.top1_pct.toFixed(1)+'%':'—';
  const accCls=s.top1_pct!=null?(s.top1_pct>=35?'good':s.top1_pct>=25?'':'bad'):'';
  const roi=s.roi_units!=null?(s.roi_units>=0?'+':'')+s.roi_units.toFixed(2):'—';
  const roiCls=st.needs_retally?'':(s.roi_units!=null?(s.roi_units>0?'good':'bad'):'');
  const betsWon=s.bets_won||0, betsPlaced=s.bets_placed||0;
  const winPct=betsPlaced?(betsWon/betsPlaced*100).toFixed(1)+'%':'—';
  const winCls=st.needs_retally?'':(betsPlaced?(betsWon/betsPlaced>=0.20?'good':''):'');
  const perDayRoi=s.dates_run>1?((s.roi_units||0)/s.dates_run).toFixed(2):null;
  document.getElementById('dashStats').innerHTML=`
    <div class="stat-card ${accCls}">
      <div class="stat-label">${T('預測命中率','Prediction hit rate')}</div>
      <div class="stat-value">${acc}</div>
      <div class="stat-sub">${T('首選馬奪冠比率','Top-1 pick winning %')}</div>
    </div>
    <div class="stat-card ${roiCls}">
      <div class="stat-label">${T('累計盈虧（單位）','Cumulative P&L (u)')}${staleWarn}</div>
      <div class="stat-value" style="${st.needs_retally?'color:#856404':''}">${roi}</div>
      <div class="stat-sub">${s.units_staked?T('投注 ','Staked ')+s.units_staked.toFixed(0)+T(' 單位',' u'):''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">${T('下注場次','Bets placed')}${staleWarn}</div>
      <div class="stat-value" style="${st.needs_retally?'color:#856404':''}">${betsPlaced}</div>
      <div class="stat-sub">${s.dates_run} ${T('日回測','day backtest')}</div>
    </div>
    <div class="stat-card ${winCls}">
      <div class="stat-label">${T('下注命中率','Bet hit rate')}${staleWarn}</div>
      <div class="stat-value" style="${st.needs_retally?'color:#856404':''}">${winPct}</div>
      <div class="stat-sub">${betsWon} ${T('勝','wins')} / ${betsPlaced} ${T('注','bets')}</div>
    </div>
    ${perDayRoi!=null?`<div class="stat-card ${!st.needs_retally&&parseFloat(perDayRoi)>=0?'good':!st.needs_retally?'bad':''}">
      <div class="stat-label">${T('平均每日盈虧','Average daily P&L')}${staleWarn}</div>
      <div class="stat-value" style="${st.needs_retally?'color:#856404':''}">${parseFloat(perDayRoi)>=0?'+':''}${perDayRoi}</div>
      <div class="stat-sub">${T('單位 / 日','u / day')}</div>
    </div>`:''}`;
}

// ── Charts ───────────────────────────────────────────────────────────────
function _renderDashCharts(data){
  // Dispose any live instances first — prevents ghost listeners when re-rendering
  [['dashChartPnl','chartPnl'],['dashChartCumPnl','chartCumPnl'],['dashChartAcc','chartAccuracy']].forEach(([v,id])=>{
    if(window[v]){window[v].dispose();window[v]=null;}
  });
  if(dashChartPnl){dashChartPnl.dispose();dashChartPnl=null;}
  if(dashChartCumPnl){dashChartCumPnl.dispose();dashChartCumPnl=null;}
  if(dashChartAcc){dashChartAcc.dispose();dashChartAcc=null;}

  const st=data.stale||{};
  const perDate=(data.summary||{}).per_date||[];
  const noData='<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:10pt">'+T('暫無數據','No data')+'</div>';
  const invalidData='<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:10pt">'+T('暫無有效數據','No valid data')+'</div>';
  if(st.needs_rerun){
    document.getElementById('chartPnl').innerHTML=invalidData;
    document.getElementById('chartCumPnl').innerHTML=invalidData;
    document.getElementById('chartAccuracy').innerHTML=invalidData;
    return;
  }
  if(!perDate.length){
    document.getElementById('chartPnl').innerHTML=noData;
    document.getElementById('chartCumPnl').innerHTML=noData;
    document.getElementById('chartAccuracy').innerHTML=noData;
    return;
  }

  const dates=perDate.map(d=>d.date);
  const pnls=perDate.map(d=>+(d.units_net||0).toFixed(2));

  // Cumulative P&L
  let cum=0;
  const cumPnls=pnls.map(v=>{cum+=v;return +cum.toFixed(2);});

  const accs=perDate.map(d=>{
    const r=d.top1_races||d.races||0;
    return r>0?+((d.top1_correct||0)/r*100).toFixed(1):null;
  });

  const gridBase={left:48,right:12,top:10,bottom:50};
  const axLabel={fontSize:8,rotate:30};

  // Greyed colours for needs_retally P&L (predictions valid, bet analysis stale)
  const pnlColor=st.needs_retally?(v=>v>=0?'#a8d5b5':'#f0a0a0'):(v=>v>=0?'#27ae60':'#e74c3c');
  const lineCol=st.needs_retally?'#aaa':(cumPnls[cumPnls.length-1]>=0?'#27ae60':'#e74c3c');
  const retallySuffix=st.needs_retally?' '+T('(待更新)','(needs retally)'):'';
  const unitsLbl=T('單位','u');

  // Per-date P&L bars
  dashChartPnl=echarts.init(document.getElementById('chartPnl'));
  dashChartPnl.setOption({
    tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>${p[0].value>=0?'+':''}${p[0].value} ${unitsLbl}${retallySuffix}`},
    xAxis:{type:'category',data:dates,axisLabel:axLabel},
    yAxis:{type:'value',axisLabel:{fontSize:9}},
    series:[{type:'bar',data:pnls.map(v=>({value:v,itemStyle:{color:pnlColor(v)}}))}],
    grid:gridBase,
  });
  dashChartPnl.on('click',p=>p.name&&_goRaceDate(p.name));

  // Cumulative P&L line
  const lastCum=cumPnls[cumPnls.length-1];
  dashChartCumPnl=echarts.init(document.getElementById('chartCumPnl'));
  dashChartCumPnl.setOption({
    tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>${T('累計','Cum')}: ${p[0].value>=0?'+':''}${p[0].value} ${unitsLbl}${retallySuffix}`},
    xAxis:{type:'category',data:dates,axisLabel:axLabel},
    yAxis:{type:'value',axisLabel:{fontSize:9}},
    series:[{type:'line',data:cumPnls,smooth:true,
      lineStyle:{color:lineCol,width:2},
      areaStyle:{opacity:0.08,color:lineCol},
      symbol:'circle',symbolSize:4,
      itemStyle:{color:lineCol}}],
    grid:gridBase,
  });
  dashChartCumPnl.on('click',p=>p.name&&_goRaceDate(p.name));

  // Per-date accuracy bars (always valid regardless of stale type)
  dashChartAcc=echarts.init(document.getElementById('chartAccuracy'));
  dashChartAcc.setOption({
    tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>${T('命中率','Hit %')}: ${p[0].value??'—'}%`},
    xAxis:{type:'category',data:dates,axisLabel:axLabel},
    yAxis:{type:'value',axisLabel:{fontSize:9},max:100,min:0},
    series:[{type:'bar',data:accs.map(v=>v==null?{value:0,itemStyle:{color:'#eee'}}:{value:v,itemStyle:{color:v>=35?'#27ae60':v>=20?'#f0a030':'#e74c3c'}})}],
    grid:{...gridBase,bottom:50},
  });
  dashChartAcc.on('click',p=>p.name&&_goRaceDate(p.name));
}

function _goRaceDate(dateStr,modelName){
  if(modelName){
    racesModel=modelName;
    activeModel=modelName;
  }
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.querySelector('[data-page="races"]')?.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('page-races')?.classList.add('show');
  document.getElementById('pageTitle').textContent=T('賽事','Races');
  setCookie('last_page','races',365);
  setCookie('race_date',dateStr,365);
  loadRaces(dateStr);
}

// ── Issues / diagnostic warnings ─────────────────────────────────────────
function _renderDashIssues(data){
  const s=data.summary||{};
  const st=data.stale||{};
  const perDate=s.per_date||[];
  const issues=[];

  // Staleness is always the primary issue
  if(st.needs_rerun){
    issues.push({lvl:'error',icon:'🔴',text:T(`模型參數已更改，所有回測結果已失效。${st.reason||''} 請重新執行完整回測。`,`Model parameters changed — all backtest results are stale. ${st.reason||''} Please re-run the full backtest.`)});
  } else if(st.needs_retally){
    issues.push({lvl:'warn',icon:'⚠️',text:T(`下注參數已更改，下注盈虧分析待重新計算。${st.reason||''} 預測準確率仍有效。`,`Bet parameters changed — bet P&L analysis needs to be recalculated. ${st.reason||''} Prediction accuracy is still valid.`)});
  }

  if(st.needs_rerun){
    // Don't show any metric-based issues for fully invalidated models
  } else if(!s.dates_run){
    issues.push({lvl:'error',icon:'🔴',text: T(
      '此策略尚未執行任何回測。請前往「賽事」頁面選擇此策略並執行。',
      'This strategy has not been backtested yet. Open the Races page, pick this strategy, and run a backtest.')});
  } else {
    if(!st.needs_retally){
      if((s.roi_units||0)<0)
        issues.push({lvl:'error',icon:'🔴',text: T(
          `ROI 為負 (${s.roi_units.toFixed(2)} 單位)，策略在回測期間虧損。`,
          `Negative ROI (${s.roi_units.toFixed(2)} u) — strategy lost during the backtest period.`)});
      else
        issues.push({lvl:'ok',icon:'✅',text: T(
          `ROI 為正 (+${(s.roi_units||0).toFixed(2)} 單位)，策略在回測期間盈利。`,
          `Positive ROI (+${(s.roi_units||0).toFixed(2)} u) — strategy profitable over backtest period.`)});
    }

    if(s.top1_pct!=null&&s.top1_pct<25)
      issues.push({lvl:'warn',icon:'⚠️',text: T(
        `命中率偏低 (${s.top1_pct.toFixed(1)}%)，首選馬奪冠比率低於 25%。`,
        `Low top-1 hit rate (${s.top1_pct.toFixed(1)}%) — picks win less than 25% of the time.`)});
    else if(s.top1_pct!=null&&s.top1_pct>=35)
      issues.push({lvl:'ok',icon:'✅',text: T(
        `命中率良好 (${s.top1_pct.toFixed(1)}%)。`,
        `Good top-1 hit rate (${s.top1_pct.toFixed(1)}%).`)});

    if(s.dates_run<5)
      issues.push({lvl:'warn',icon:'⚠️',text: T(
        `回測日數不足 (${s.dates_run} 日)，統計意義有限，建議執行更多回測後再評估。`,
        `Sample size is small (${s.dates_run} day(s)) — run more backtests before relying on these numbers.`)});

    if(!st.needs_retally){
      const betsPlaced=s.bets_placed||0, betsWon=s.bets_won||0;
      if(betsPlaced>0&&betsWon/betsPlaced<0.15)
        issues.push({lvl:'warn',icon:'⚠️',text: T(
          `下注命中率偏低 (${(betsWon/betsPlaced*100).toFixed(1)}%)。`,
          `Bet hit rate is low (${(betsWon/betsPlaced*100).toFixed(1)}%).`)});
    }

    if(perDate.length){
      const daysSince=Math.floor((Date.now()-new Date(perDate[perDate.length-1].date).getTime())/86400000);
      if(daysSince>30)
        issues.push({lvl:'info',icon:'ℹ️',text: T(
          `最後回測距今 ${daysSince} 天 (${perDate[perDate.length-1].date})，考慮補跑最新日期。`,
          `Last backtest was ${daysSince} days ago (${perDate[perDate.length-1].date}); consider running on more recent dates.`)});
    }
  }

  if(!data.active)
    issues.push({lvl:'info',icon:'ℹ️',text: T(
      '此策略目前不是使用中策略。如需設為使用中，請前往「策略」頁面操作。',
      'This is not the active strategy. Activate it from the Strategy page.')});

  if(data.features_disabled?.length){
    const namesLocalised = lang === 'en' ? data.features_disabled_en : data.features_disabled_zh;
    const names = (namesLocalised?.length === data.features_disabled.length)
      ? namesLocalised : data.features_disabled;
    const sep = lang === 'en' ? ', ' : '、';
    const msg = lang === 'en'
      ? `This strategy disables ${data.features_disabled.length} feature(s): ${names.join(sep)}`
      : `此策略停用了 ${data.features_disabled.length} 個特徵: ${names.join(sep)}`;
    issues.push({lvl:'info',icon:'ℹ️',text: msg});
  }

  document.getElementById('dashIssues').innerHTML=issues.length
    ?`<div style="font-size:10pt;font-weight:bold;color:#1a3a5c;margin-bottom:7px">${T('狀態診斷','Diagnostics')}</div>
       <ul class="issue-list">${issues.map(i=>`<li class="issue-item ${i.lvl}"><span>${i.icon}</span><span>${i.text}</span></li>`).join('')}</ul>`
    :'';
}
</script>
