# nginx vhost for horseracing.privatedns.org — proxies to the racing.service
# (app.py --port 8006). Install: copy to /etc/nginx/sites-available/horseracing,
# symlink into sites-enabled, `nginx -t`, `systemctl reload nginx`.
#
# WebSocket upgrade headers are required for Socket.IO (the live dashboard).
# TLS uses the shared lvoyage.aero multi-domain cert which includes
# horseracing.privatedns.org as a SAN (managed by Certbot).
server {
    root /var/www/horseracing/static;
    index index.html;
    server_name horseracing.privatedns.org;

    location / {
        proxy_pass http://127.0.0.1:8006;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/lvoyage.aero/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/lvoyage.aero/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = horseracing.privatedns.org) {
        return 301 https://$host$request_uri;
    }
    server_name horseracing.privatedns.org;
    listen 80;
    return 404;
}
